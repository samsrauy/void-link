<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID-LINK // OS</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/sync.js"></script>
    <script src="js/datasworn.js"></script>
    
    <style>
        :root { --neon: #00ff9d; --bg: #050508; --panel: #0b0d12; --border: #1a1c23; }
        body { margin: 0; background: var(--bg); color: #e0e0e0; font-family: monospace; overflow: hidden; }
        
        /* LOGIN SCREEN */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .login-box { border: 1px solid var(--neon); padding: 40px; background: var(--panel); text-align: center; }
        .login-box input { background: #161922; border: 1px solid #454d5d; color: var(--neon); padding: 10px; margin: 15px 0; width: 250px; text-align: center; }
        .login-box button { background: var(--neon); color: #000; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; }
        
        /* TERMINAL GRID */
        #terminal-grid { display: none; grid-template-columns: 380px 1fr; grid-template-rows: 60px 1fr 350px; height: 100vh; gap: 2px; background: var(--border); }
        .header-bar { grid-column: 1 / -1; background: var(--panel); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--neon); }
        .module-frame { background: var(--panel); overflow-y: auto; }
        #frame-char { grid-row: 2 / 4; }
        #frame-map { grid-column: 2; grid-row: 2; }
        #frame-journal { grid-column: 2; grid-row: 3; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <div style="color: var(--neon); letter-spacing: 2px; margin-bottom: 10px;">VOID-LINK UPLINK</div>
            <input type="text" id="callsign-input" placeholder="ENTER CALLSIGN" autocomplete="off" />
            <br>
            <input type="text" id="server-url-input" placeholder="GM SERVER URL (OPTIONAL)" autocomplete="off" style="font-size: 10px;" />
            <br>
            <button onclick="login()">CONNECT</button>
        </div>
    </div>

    <div id="terminal-grid">
        <div class="header-bar">
            <div id="char-display" style="font-weight: bold; color: var(--neon);">PILOT: ---</div>
            <div style="letter-spacing: 3px;">VOID-LINK // NAV-OS v4.0</div>
        </div>
        <div id="frame-char" class="module-frame"></div>
        <div id="frame-map" class="module-frame"></div>
        <div id="frame-journal" class="module-frame"></div>
    </div>

    <script>
        // GLOBAL VARIABLE SETUP
        const urlParams = new URLSearchParams(window.location.search);
        window.charId = urlParams.get('id');

        // Boot if ID exists in URL
        if (window.charId) {
            bootTerminal(window.charId);
        }

        function login() {
            const name = document.getElementById('callsign-input').value.trim();
            const server = document.getElementById('server-url-input').value.trim();
            if (name) {
                // Save the server URL to local browser storage
                if (server) localStorage.setItem('voidLinkServer', server);
                
                // Reload the page with the ID in the URL
                window.location.href = `?id=${encodeURIComponent(name)}`;
            }
        }

        async function loadModule(id, path) {
            try {
                const response = await fetch(`modules/${path}`);
                const html = await response.text();
                const target = document.getElementById(id);
                target.innerHTML = html;
                
                // Standard revival for same-domain module scripts
                Array.from(target.querySelectorAll('script')).forEach(old => {
                    const n = document.createElement('script');
                    if (old.src) n.src = old.src;
                    else n.textContent = old.textContent;
                    document.body.appendChild(n);
                });
            } catch (e) {
                console.error("Failed to load", path, e);
            }
        }

        async function bootTerminal(id) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('terminal-grid').style.display = 'grid';
            document.getElementById('char-display').innerText = `PILOT: ${id.toUpperCase()}`;

            // Fetch modules
            await Promise.all([
                loadModule('frame-char', 'character-sheet/character-sheet.html'),
                loadModule('frame-map', 'map/map.html'),
                loadModule('frame-journal', 'journal/journal.html')
            ]);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captain's Log - Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --term-green: #00ff9d;
            --term-dim: #00ff9d88;
            --term-bg: #020204;
            --term-red: #ff0055;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--term-bg);
            color: var(--term-green);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* --- TERMINAL HEADER --- */
        #terminal-header {
            background: rgba(11, 13, 18, 0.95); border-bottom: 2px solid var(--term-green);
            padding: 10px 20px; font-size: 0.9rem; letter-spacing: 2px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 10;
        }
        .header-status { color: var(--term-dim); font-size: 0.7rem; animation: blink 2s infinite; }

        /* --- TERMINAL OUTPUT (THE SCROLLING TEXT) --- */
        #terminal-output {
            flex-grow: 1; padding: 20px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 15px;
            scroll-behavior: smooth;
        }
        
        /* Custom Sci-Fi Scrollbars */
        #terminal-output::-webkit-scrollbar { width: 8px; }
        #terminal-output::-webkit-scrollbar-track { background: #0b0d12; border-left: 1px solid #1a1c23; }
        #terminal-output::-webkit-scrollbar-thumb { background: var(--term-dim); border-radius: 2px; }

        /* Log Entry Styling */
        .log-entry { line-height: 1.5; font-size: 0.95rem; text-shadow: 0 0 5px rgba(0,255,153,0.3); }
        .log-meta { color: #aab; font-size: 0.8rem; display: block; margin-bottom: 2px;}
        .log-id { color: #3b82f6; font-size: 0.75rem; }
        .log-text { color: var(--term-green); margin-left: 15px; border-left: 2px solid var(--term-dim); padding-left: 10px; white-space: pre-wrap; }
        .sys-text { color: var(--term-red); text-shadow: 0 0 5px rgba(255,0,85,0.3); }

        /* --- TERMINAL INPUT ROW --- */
        #terminal-input-row {
            display: flex; align-items: center;
            padding: 15px 20px; background: rgba(11, 13, 18, 0.95);
            border-top: 1px solid #1a1c23; z-index: 10;
        }
        #prompt { color: var(--term-green); margin-right: 10px; font-weight: bold; }
        #log-input {
            flex-grow: 1; background: transparent; border: none; outline: none;
            color: #fff; font-family: 'Share Tech Mono', monospace; font-size: 1rem;
            text-shadow: 0 0 5px rgba(255,255,255,0.3);
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="terminal-header">
        <span>VOID-LINK SECURE SHELL v2.4</span>
        <span class="header-status" id="uplink-status">UPLINK: STANDBY</span>
    </div>

    <div id="terminal-output">
        <div class="log-entry sys-text">
            > INITIALIZING WEAVE PROTOCOL...<br>
            > ENCRYPTION HANDSHAKE VERIFIED.<br>
            > AWAITING CAPTAIN'S LOG INPUT...
        </div>
    </div>

    <div id="terminal-input-row">
        <span id="prompt">user@void-link.weave:~$</span>
        <input type="text" id="log-input" placeholder="Type transmission here... (Press ENTER to send)" autocomplete="off">
    </div>

    <script>
        // Wrapping everything in a timeout ensures your injection engine finishes attaching the HTML to the DOM first
        setTimeout(() => {
            const outputContainer = document.getElementById('terminal-output');
            const inputField = document.getElementById('log-input');
            const promptSpan = document.getElementById('prompt');
            const statusSpan = document.getElementById('uplink-status');
            const maxLines = 50; 
            
            let charID = "UNKNOWN";
            let charName = "Pilot";

            if (window.charId) {
                charID = window.charId;
                charName = window.charName || window.charId;
            }
            
            // Format the prompt string dynamically
            if (promptSpan) {
                const safeId = charID.replace(/\s+/g, '_').toLowerCase();
                promptSpan.innerText = safeId + "@void-link.weave:~$";
            }
            
            // Show online status
            if (statusSpan) {
                statusSpan.innerText = "UPLINK: ACTIVE";
                statusSpan.style.color = "var(--term-green)";
            }

            if (inputField) {
                inputField.focus();
                inputField.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        submitLog();
                    }
                });
            }

            function submitLog() {
                if (!inputField || !outputContainer) return;
                
                const text = inputField.value.trim();
                if (text === "") return; 

                const now = new Date();
                const dateStr = now.toLocaleDateString(); 
                const timeStr = now.toLocaleTimeString(); 
                
                const isoDate = now.toISOString().split('T')[0];
                const isoTime = now.toTimeString().split(' ')[0];

                // 1. Build the payload for Google Docs. Code.gs handles the rest.
                const payloadString = `[ID: ${charID.toUpperCase()} | ${isoDate} ${isoTime}]\n${text}`;

                // 2. Print locally immediately for immersion
                appendTerminalEntry(dateStr, timeStr, isoDate, isoTime, text);

                // 3. Push to Google Docs via sync.js
                pushToGoogleDocs(payloadString);

                // 4. Clear input
                inputField.value = '';
                inputField.focus();
            }

            function appendTerminalEntry(dateStr, timeStr, isoDate, isoTime, text) {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                
                entry.innerHTML = `
                    <span class="log-meta">[${dateStr}, ${timeStr}] ${charName}: <span class="log-id">[ID: ${charID.toUpperCase()} | ${isoDate} ${isoTime}]</span></span>
                    <div class="log-text">${text}</div>
                `;
                
                outputContainer.appendChild(entry);
                outputContainer.scrollTop = outputContainer.scrollHeight;

                if (outputContainer.children.length > maxLines) {
                    outputContainer.removeChild(outputContainer.children[1]); 
                }
            }

            async function pushToGoogleDocs(payloadString) {
                try {
                    // Call the exact function name found in your sync.js file
                    if (window.gLink && typeof window.gLink.logServer === 'function') {
                        await window.gLink.logServer(charID, payloadString);
                        console.log("Transmission securely logged to Void-Link.");
                    } else {
                        console.error("window.gLink.logServer not found. Ensure sync.js is fully loaded.");
                    }
                } catch (error) {
                    console.error("Void-Link Sync Error:", error);
                    appendSystemMessage("ERROR: Uplink interrupted. Transmission failed.");
                }
            }

            function appendSystemMessage(msg) {
                const entry = document.createElement('div');
                entry.className = 'log-entry sys-text';
                entry.innerText = `> ${msg}`;
                outputContainer.appendChild(entry);
                outputContainer.scrollTop = outputContainer.scrollHeight;
            }
        }, 500);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #050508; color: #e0e0e0; font-family: 'Exo 2', sans-serif; padding: 10px; }
        .journal-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; height: 95vh; }
        
        /* Narrative Section */
        .journal-wrap { flex: 1; display: flex; flex-direction: column; min-height: 200px; }
        textarea { 
            flex: 1; width: 100%; background: rgba(0,0,0,0.3); 
            color: #d1d5db; border: 1px solid #333; border-radius: 4px;
            padding: 12px; font-family: 'Exo 2', sans-serif; resize: none;
            line-height: 1.6; outline: none; transition: 0.3s;
        }
        textarea:focus { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.02); }
        
        /* Log Section */
        .log-wrap { flex: 1; display: flex; flex-direction: column; min-height: 250px; }
        .log-area { 
            flex: 1; border: 1px solid #222; border-radius: 4px; 
            background: #000; overflow-y: auto; padding: 10px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        .log-entry { 
            font-family: 'Courier New', monospace; font-size: 0.8rem; 
            padding: 6px 0; border-bottom: 1px solid #111;
            animation: slideIn 0.3s ease-out;
        }
        .log-time { opacity: 0.3; margin-right: 8px; font-size: 0.65rem; }
        .log-text { color: #aaa; }
        
        /* Hit Highlights */
        .strong-hit { color: #4ade80; font-weight: bold; text-shadow: 0 0 5px rgba(74, 222, 128, 0.3); }
        .weak-hit { color: #fbbf24; }
        .miss { color: #f87171; text-transform: uppercase; font-weight: bold; }
        .match { color: #a855f7; font-style: italic; }
        .system-msg { color: var(--accent); opacity: 0.8; font-weight: bold; }

        label { font-size: 0.6rem; opacity: 0.5; letter-spacing: 2px; margin-bottom: 5px; display: block; text-transform: uppercase; }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(-10px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        /* Custom Scrollbar for Terminal look */
        .log-area::-webkit-scrollbar { width: 4px; }
        .log-area::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="journal-container">
        <div class="journal-wrap">
            <label>Captain's Log / Narrative</label>
            <textarea id="journal-input" placeholder="The void is silent today..." onblur="saveJournal()"></textarea>
        </div>

        <div class="log-wrap">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <label>Neural Link Activity</label>
                <button onclick="refreshLog()" style="font-size: 0.5rem; background: none; border: 1px solid #333; color: #555; cursor: pointer; padding: 2px 5px; border-radius: 3px;">FORCE SYNC</button>
            </div>
            <div id="log-list" class="log-area">
                <div class="log-entry"><span class="log-time">--:--</span> <span class="log-text">Initializing neural interface...</span></div>
            </div>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const game = params.get('game') || 'starforged';

        async function init() {
            document.body.classList.add(`theme-${game}`);
            
            // 1. Initial Narrative Load
            const saved = await loadStats(charId);
            if (saved && saved.journal) {
                document.getElementById('journal-input').value = saved.journal;
            }
            
            // 2. Start Sync Heartbeat (Sync log every 10s for responsiveness)
            startHeartbeat(refreshLog, 10000);
            refreshLog();
        }

        async function saveJournal() {
            const text = document.getElementById('journal-input').value;
            await saveStat(charId, "journal", text);
        }

        async function refreshLog() {
            const saved = await loadStats(charId);
            if(saved && saved.history) {
                renderLog(saved.history);
            }
        }

        function renderLog(historyStr) {
            const container = document.getElementById('log-list');
            const currentScroll = container.scrollTop;
            const isAtBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + 1;

            container.innerHTML = '';
            
            try {
                const history = JSON.parse(historyStr);
                // Keep the order chronologically for a log-look, or reverse if you prefer
                history.forEach(entry => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    
                    let styledText = entry.text
                        .replace(/STRONG HIT/g, '<span class="strong-hit">STRONG HIT</span>')
                        .replace(/WEAK HIT/g, '<span class="weak-hit">WEAK HIT</span>')
                        .replace(/MISS/g, '<span class="miss">MISS</span>')
                        .replace(/MATCH!/g, '<span class="match">MATCH!</span>')
                        .replace(/COMM-LOG:|ROLL/g, '<span class="system-msg">$&</span>');

                    div.innerHTML = `<span class="log-time">${entry.time || 'NOW'}</span> <span class="log-text">${styledText}</span>`;
                    container.appendChild(div);
                });

                // Auto-scroll to bottom if they were already there
                if (isAtBottom) {
                    container.scrollTop = container.scrollHeight;
                }
            } catch (e) {
                console.error("Log Parse Error", e);
            }
        }

        init();
    </script>
</body>
</html>

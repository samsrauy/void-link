<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .journal-container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Narrative Section */
        textarea { 
            width: 100%; height: 150px; background: rgba(255,255,255,0.03); 
            color: var(--text); border: 1px solid var(--border); border-radius: 4px;
            padding: 10px; font-family: 'Exo 2', sans-serif; resize: vertical;
        }
        
        /* Log Section */
        .log-area { 
            border: 1px solid var(--border); border-radius: 4px; 
            background: #00000044; height: 250px; overflow-y: auto; padding: 10px;
        }
        .log-entry { 
            font-family: 'Courier New', monospace; font-size: 0.85rem; 
            padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.5s ease;
        }
        .log-time { opacity: 0.4; margin-right: 8px; font-size: 0.7rem; }
        .log-text { color: var(--text); }
        .strong-hit { color: #4ade80; font-weight: bold; }
        .weak-hit { color: #facc15; }
        .miss { color: #f87171; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="journal-container">
        <div>
            <label style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 1px;">SESSION JOURNAL</label>
            <textarea id="journal-input" placeholder="Record your truths here..." onblur="saveJournal()"></textarea>
        </div>

        <div>
            <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px;">
                <label style="font-size: 0.7rem; opacity: 0.6; letter-spacing: 1px;">ACTION LOG</label>
                <button onclick="refreshLog()" style="font-size: 0.6rem; padding: 2px 8px;">Refresh Log</button>
            </div>
            <div id="log-list" class="log-area">
                <div class="log-entry">Loading history...</div>
            </div>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const game = params.get('game') || 'starforged';

        /**
         * INITIALIZATION
         */
        async function init() {
            // 1. Theme
            document.body.classList.add(`theme-${game}`);
            
            // 2. Initial Narrative Load
            // We do a manual fetch once here just for the text area
            const saved = await loadStats(charId);
            if (saved.journal) {
                document.getElementById('journal-input').value = saved.journal;
            }
            
            // 3. Start Sync Heartbeat for the Log
            // startHeartbeat (from sync.js) will call refreshLog immediately, 
            // then every 35 seconds with random jitter.
            startHeartbeat(refreshLog, 35000);
        }

        /**
         * SAVE JOURNAL TEXT
         * Triggered when the user clicks out of the textarea
         */
        async function saveJournal() {
            const text = document.getElementById('journal-input').value;
            await saveStat(charId, "journal", text);
        }

        /**
         * REFRESH LOG
         * This is our "Heartbeat" function
         */
        async function refreshLog() {
            const saved = await loadStats(charId);
            renderLog(saved.history);
        }

        /**
         * UI RENDERING
         */
        function renderLog(historyStr) {
            const container = document.getElementById('log-list');
            container.innerHTML = '';
            
            if (!historyStr) {
                container.innerHTML = '<div class="log-entry">No logs recorded yet.</div>';
                return;
            }

            try {
                const history = JSON.parse(historyStr);
                // Show newest rolls at the top
                history.reverse().forEach(entry => {
                    const div = document.createElement('div');
                    div.className = 'log-entry';
                    
                    // Apply hit styling
                    let styledText = entry.text
                        .replace(/Strong Hit/g, '<span class="strong-hit">Strong Hit</span>')
                        .replace(/Weak Hit/g, '<span class="weak-hit">Weak Hit</span>')
                        .replace(/Miss/g, '<span class="miss">Miss</span>');

                    div.innerHTML = `<span class="log-time">${entry.time}</span> <span class="log-text">${styledText}</span>`;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML = '<div class="log-entry">Error parsing history.</div>';
            }
        }

        // Execute
        init();
    </script>
</body>
</html>

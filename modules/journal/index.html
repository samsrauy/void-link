<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #e2e4e9; padding: 15px; font-family: 'Exo 2', sans-serif; display: flex; flex-direction: column; height: 90vh; }
        .journal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .status-light { width: 8px; height: 8px; border-radius: 50%; background: #444; display: inline-block; margin-right: 5px; }
        .status-active { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
        
        textarea { 
            flex-grow: 1; background: #161922; color: #bcdee7; border: 1px solid #454d5d; 
            padding: 15px; font-family: 'Share Tech Mono', monospace; font-size: 0.9rem; 
            line-height: 1.5; outline: none; resize: none; border-radius: 4px;
        }
        textarea:focus { border-color: var(--accent); }
        
        .controls { margin-top: 10px; display: flex; gap: 10px; }
        .save-btn { background: var(--accent); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; flex-grow: 1; text-transform: uppercase; letter-spacing: 1px; }
        .save-btn:hover { filter: brightness(1.2); }
        .save-btn:disabled { background: #444; cursor: not-allowed; }
    </style>
</head>
<body class="theme-starforged">
    <div class="journal-header">
        <div style="font-size: 0.7rem; letter-spacing: 2px;">
            <span id="sync-indicator" class="status-light"></span> 
            ENCRYPTED LOG CHANNEL
        </div>
        <div id="last-saved" style="font-size: 0.6rem; opacity: 0.5;">Awaiting Link...</div>
    </div>

    <textarea id="journal-input" placeholder="Begin transmission..."></textarea>

    <div class="controls">
        <button id="save-button" class="save-btn" onclick="manualSave()">Commit to Archive</button>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const textarea = document.getElementById('journal-input');
        const indicator = document.getElementById('sync-indicator');
        const saveBtn = document.getElementById('save-button');
        const timestamp = document.getElementById('last-saved');

        async function initJournal() {
            // Neural Link Guard: Wait for sync.js discovery
            if (!GAS_URL) {
                console.log("Journal: Establishing uplink...");
                setTimeout(initJournal, 1000);
                return;
            }

            indicator.classList.add('status-active');
            
            // Load existing notes from the 'journal' column in the Sheet
            const stats = await loadStats(charId);
            if (stats && stats.journal) {
                textarea.value = stats.journal;
                timestamp.innerText = "LOCAL CACHE LOADED";
            } else {
                timestamp.innerText = "NEW LOG INITIALIZED";
            }
        }

        async function manualSave() {
            if (!GAS_URL) return;
            
            saveBtn.disabled = true;
            saveBtn.innerText = "UPLOADING...";
            
            const content = textarea.value;
            
            // Primary save to the journal column
            await saveStat(charId, "journal", content);
            
            // Unified history update
            await saveStat(charId, "history_entry", "LOG: Archive entry committed.");

            const now = new Date();
            timestamp.innerText = "LAST SYNC: " + now.toLocaleTimeString();
            saveBtn.disabled = false;
            saveBtn.innerText = "Commit to Archive";
        }

        // Auto-save: Every 5 minutes if content has changed
        let lastValue = "";
        setInterval(() => {
            if (textarea.value !== lastValue && textarea.value !== "") {
                lastValue = textarea.value;
                manualSave();
            }
        }, 300000); 

        initJournal();
    </script>
</body>
</html>

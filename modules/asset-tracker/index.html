<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: transparent; color: #e2e8f0; font-family: 'Exo 2', sans-serif; padding: 10px; }
        .asset-interface { display: flex; flex-direction: column; height: 95vh; }
        
        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 10px; border-bottom: 1px solid #4ade8044; }
        .tab { padding: 5px 15px; cursor: pointer; background: #111; font-size: 0.7rem; border: 1px solid #4ade8022; border-bottom: none; color: #4ade80; }
        .tab.active { background: #4ade80; color: #000; font-weight: bold; }

        /* Search & List */
        #asset-search { width: 100%; background: #000; border: 1px solid #4ade8044; color: #fff; padding: 8px; margin-bottom: 10px; font-size: 0.8rem; outline: none; }
        .asset-list { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr; gap: 10px; }
        
        /* Card Styling */
        .asset-card { 
            background: rgba(0,0,0,0.8); border: 1px solid #4ade8044; 
            padding: 12px; border-radius: 4px; position: relative;
            transition: border-color 0.2s;
        }
        .asset-card:hover { border-color: #4ade80; }
        .asset-type { font-size: 0.6rem; color: #4ade80; text-transform: uppercase; letter-spacing: 1px; }
        .asset-name { font-size: 1rem; font-weight: bold; margin: 4px 0; color: #fff; }
        .ability { font-size: 0.75rem; line-height: 1.4; margin-bottom: 8px; color: #94a3b8; border-bottom: 1px solid #ffffff11; padding-bottom: 5px; }
        .ability.locked { opacity: 0.4; }
        
        /* Interactive Elements */
        .track { display: flex; gap: 5px; margin-top: 10px; }
        .track-box { width: 20px; height: 20px; border: 1px solid #4ade80; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; cursor: pointer; }
        .track-box.marked { background: #4ade80; color: #000; }
        
        .add-btn { background: #4ade80; color: #000; border: none; padding: 5px 10px; font-size: 0.6rem; font-weight: bold; cursor: pointer; float: right; }
        .delete-btn { color: #ef4444; background: none; border: none; font-size: 0.6rem; cursor: pointer; position: absolute; top: 10px; right: 10px; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #4ade8044; }
    </style>
</head>
<body>

    <div class="asset-interface">
        <div class="tabs">
            <div id="tab-mine" class="tab active" onclick="switchTab('mine')">MY ASSETS</div>
            <div id="tab-lib" class="tab" onclick="switchTab('lib')">LIBRARY</div>
        </div>

        <div id="library-controls" style="display:none;">
            <input type="text" id="asset-search" placeholder="Search Assets (e.g. Starship, Tech, Path...)" onkeyup="filterLibrary()">
        </div>

        <div id="asset-display" class="asset-list">
            </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        let myAssets = [];
        let fullLibrary = [];
        let currentTab = 'mine';

        // Load data on start
        async function init() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/rsek/datasworn/master/datasworn/starforged/assets.json');
                const data = await response.json();
                // Flatten library
                fullLibrary = Object.values(data).flatMap(category => 
                    Object.values(category.assets).map(a => ({...a, category: category.name}))
                );
                
                await loadMyAssets();
                render();
            } catch(e) {
                document.getElementById('asset-display').innerHTML = "SIGNAL LOST: ASSET DATABASE OFFLINE.";
            }
        }

        async function loadMyAssets() {
            // Get from Google Sheets 'assets' column
            const stats = await getStats(charId);
            try {
                myAssets = JSON.parse(stats.assets || "[]");
            } catch(e) { myAssets = []; }
        }

        async function saveMyAssets() {
            await saveStat(charId, "assets", JSON.stringify(myAssets));
        }

        function render() {
            const container = document.getElementById('asset-display');
            container.innerHTML = "";

            if (currentTab === 'mine') {
                document.getElementById('library-controls').style.display = 'none';
                if (myAssets.length === 0) {
                    container.innerHTML = "<div style='text-align:center; padding:20px; opacity:0.5;'>No assets acquired. Visit the LIBRARY to add one.</div>";
                    return;
                }
                myAssets.forEach((asset, index) => container.appendChild(createAssetCard(asset, index, true)));
            } else {
                document.getElementById('library-controls').style.display = 'block';
                filterLibrary();
            }
        }

        function createAssetCard(asset, index, isOwned) {
            const card = document.createElement('div');
            card.className = 'asset-card';
            
            let abilitiesHtml = asset.abilities.map((ab, i) => `
                <div class="ability ${isOwned && asset.enabledAbilities?.includes(i) ? '' : (isOwned ? 'locked' : '')}" 
                     onclick="${isOwned ? `toggleAbility(${index}, ${i})` : ''}">
                    ● ${ab.text || ab.description}
                </div>
            `).join('');

            card.innerHTML = `
                <div class="asset-type">${asset.category || ''}</div>
                ${isOwned ? `<button class="delete-btn" onclick="removeAsset(${index})">✕</button>` : `<button class="add-btn" onclick="addAsset('${asset._id}')">ACQUIRE</button>`}
                <div class="asset-name">${asset.name}</div>
                <div class="abilities">${abilitiesHtml}</div>
            `;
            return card;
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            render();
        }

        function filterLibrary() {
            if (currentTab !== 'lib') return;
            const term = document.getElementById('asset-search').value.toLowerCase();
            const container = document.getElementById('asset-display');
            container.innerHTML = "";
            
            fullLibrary.filter(a => a.name.toLowerCase().includes(term) || a.category?.toLowerCase().includes(term))
                .slice(0, 15) // Performance cap
                .forEach(asset => container.appendChild(createAssetCard(asset, null, false)));
        }

        async function addAsset(id) {
            const asset = fullLibrary.find(a => a._id === id);
            if (asset) {
                myAssets.push({ ...asset, enabledAbilities: [0] }); // Starts with 1st ability
                await saveMyAssets();
                switchTab('mine');
            }
        }

        async function removeAsset(index) {
            if(confirm("Discard this asset?")) {
                myAssets.splice(index, 1);
                await saveMyAssets();
                render();
            }
        }

        async function toggleAbility(aIndex, abIndex) {
            const asset = myAssets[aIndex];
            if (!asset.enabledAbilities) asset.enabledAbilities = [0];
            
            if (asset.enabledAbilities.includes(abIndex)) {
                asset.enabledAbilities = asset.enabledAbilities.filter(i => i !== abIndex);
            } else {
                asset.enabledAbilities.push(abIndex);
            }
            await saveMyAssets();
            render();
        }

        init();
    </script>
</body>
</html>

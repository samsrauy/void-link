<div id="tracker-scope">
    <style>
        #tracker-scope { background: #0b0d12; color: #bcdee7; font-family: 'Exo 2', sans-serif; padding: 15px; height: 100%; overflow-y: auto; }
        #tracker-scope .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #1a1c23; padding-bottom: 5px; }
        #tracker-scope .asset-list { display: flex; flex-direction: column; gap: 15px; }
        
        #tracker-scope .asset-card { 
            background: #161922; border: 1px solid #454d5d; border-left: 4px solid #00ff9d; 
            padding: 15px; border-radius: 4px; position: relative; transition: 0.2s;
        }
        #tracker-scope .asset-name { color: #00ff9d; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block; letter-spacing: 1px; }
        
        #tracker-scope .ability-row { display: flex; gap: 12px; margin-top: 10px; align-items: flex-start; font-size: 0.85rem; line-height: 1.4; }
        #tracker-scope .ability-check { 
            width: 14px; height: 14px; border: 2px solid #454d5d; cursor: pointer; flex-shrink: 0; margin-top: 2px;
        }
        #tracker-scope .ability-check.active { background: #00ff9d; border-color: #00ff9d; box-shadow: 0 0 5px #00ff9d; }
        
        #tracker-scope .remove-btn { 
            position: absolute; top: 10px; right: 10px; color: #ff0055; font-size: 0.7rem; 
            cursor: pointer; opacity: 0.5; font-family: 'Share Tech Mono';
        }
        #tracker-scope .remove-btn:hover { opacity: 1; }
        #tracker-scope #sync-status { font-size: 0.6rem; color: #454d5d; font-family: 'Share Tech Mono'; }
    </style>

    <div class="header">
        <span style="font-size: 0.7rem; letter-spacing: 2px;">ACTIVE ASSET MANIFEST</span>
        <div id="sync-status">SYSTEM ONLINE</div>
    </div>

    <div id="my-assets-container" class="asset-list">
        <div style="opacity:0.5; font-size:0.8rem;">Scanning neural links for installed assets...</div>
    </div>
</div>

<script>
    // --- GLOBAL VOID-LINK MARKDOWN & MODAL ENGINE ---
    if (!window.voidLinkMarkdownEngine) {
        window.voidLinkMarkdownEngine = true;
        window.formatMarkdown = function(txt) {
            if (!txt) return "";
            let html = txt;
            const links = [];
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, (m, text, url) => { links.push({ text, url }); return `%%LINK_${links.length - 1}%%`; });
            html = html.replace(/\*\*(.*?)\*\*/g, '<b style="color:#bcdee7;">$1</b>');
            html = html.replace(/__(.*?)__/g, '<b style="color:#bcdee7;">$1</b>');
            html = html.replace(/(?<!\w)\*(.*?)\*(?!\w)/g, '<i>$1</i>');
            html = html.replace(/(?<!\w)_(.*?)_(?!\w)/g, '<i>$1</i>'); 
            html = html.replace(/\n/g, '<br>');
            html = html.replace(/%%LINK_(\d+)%%/g, (m, i) => `<span style="color:#00ff9d; cursor:pointer; text-decoration:underline dashed; text-underline-offset: 3px;" onclick="showCompendiumModal('${links[i].url}')">${links[i].text}</span>`);
            return html;
        };

        window.showCompendiumModal = function(nodeId) {
            if (!window.dataswornCore) return;
            const node = window.dataswornCore.findNode(nodeId);
            let modal = document.getElementById('compendium-modal');
            if (!modal) {
                modal = document.createElement('div'); modal.id = 'compendium-modal';
                modal.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,5,8,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px);";
                modal.onclick = function(e) { if (e.target === modal) modal.style.display = 'none'; };
                modal.innerHTML = `<div style="background:#161922; border:2px solid #00ff9d; padding:30px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; position:relative; box-shadow: 0 0 30px rgba(0,255,153,0.2); font-family:'Exo 2', sans-serif;"><button onclick="document.getElementById('compendium-modal').style.display='none'" style="position:absolute; top:10px; right:10px; background:transparent; border:none; color:#ff0055; cursor:pointer; font-size:1.2rem; font-family:'Share Tech Mono';">X</button><div id="compendium-modal-tag" style="font-size:0.7rem; color:#ff0055; letter-spacing:2px; margin-bottom:5px; font-family:'Share Tech Mono';"></div><h2 id="compendium-modal-title" style="color:#00ff9d; font-family:'Share Tech Mono'; margin-top:0; border-bottom:1px solid #454d5d; padding-bottom:10px;"></h2><div id="compendium-modal-body" style="color:#aab; font-size:0.9rem; line-height:1.5;"></div></div>`;
                document.body.appendChild(modal);
            }
            if (!node) {
                document.getElementById('compendium-modal-title').innerText = "DATA NOT FOUND"; document.getElementById('compendium-modal-tag').innerText = "ERROR"; document.getElementById('compendium-modal-body').innerHTML = `The neural link to <span style="color:#ff0055;">${nodeId}</span> could not be established.`;
            } else {
                document.getElementById('compendium-modal-title').innerText = (node.name || "DATABANK ENTRY").toUpperCase(); document.getElementById('compendium-modal-tag').innerText = (node.type || "INFO").toUpperCase().replace(/_/g, ' '); document.getElementById('compendium-modal-body').innerHTML = window.formatMarkdown(node.text || node.description || "No data available.");
            }
            modal.style.display = 'flex';
        };
    }

    (function() {
        const scope = document.getElementById('tracker-scope');
        let myAssets = [];

        window.initTracker = async function() {
            try {
                await window.dataswornReady;
                const stats = await window.gLink.loadStatsServer(window.charId) || {};
                myAssets = stats.assets ? JSON.parse(stats.assets) : [];
                renderActiveAssets();
            } catch (e) {
                console.error("Tracker Sync Error:", e);
                scope.querySelector('#sync-status').innerText = "SYNC FAILED";
            }
        };

        function renderActiveAssets() {
            const container = scope.querySelector('#my-assets-container');
            if (myAssets.length === 0) {
                container.innerHTML = `<div style="text-align:center; padding:20px; color:#454d5d; border:1px dashed #454d5d;">NO ASSETS INSTALLED</div>`;
                return;
            }

            container.innerHTML = '';
            myAssets.forEach((entry, index) => {
                const assetData = window.dataswornCore.findNode(entry.id);
                if (!assetData) return;

                const card = document.createElement('div');
                card.className = 'asset-card';
                card.innerHTML = `
                    <div class="remove-btn" onclick="removeAsset(${index})">[UNINSTALL]</div>
                    <span class="asset-name">${assetData.name}</span>
                    ${(assetData.abilities || []).map((ab, i) => `
                        <div class="ability-row">
                            <div class="ability-check ${entry.enabled.includes(i) ? 'active' : ''}" 
                                 onclick="toggleAbility(${index}, ${i})"></div>
                            <span>${window.formatMarkdown(ab.text)}</span>
                        </div>
                    `).join('')}
                `;
                container.appendChild(card);
            });
        }

        window.toggleAbility = async function(assetIdx, abilityIdx) {
            const asset = myAssets[assetIdx];
            if (asset.enabled.includes(abilityIdx)) {
                asset.enabled = asset.enabled.filter(i => i !== abilityIdx);
            } else {
                asset.enabled.push(abilityIdx);
            }
            renderActiveAssets();
            syncAssetChanges();
        };

        window.removeAsset = async function(index) {
            if (confirm("Permanently uninstall this asset?")) {
                myAssets.splice(index, 1);
                renderActiveAssets();
                syncAssetChanges();
            }
        };

        async function syncAssetChanges() {
            scope.querySelector('#sync-status').innerText = "UPLINKING...";
            await window.gLink.saveStatServer(window.charId, "assets", JSON.stringify(myAssets));
            scope.querySelector('#sync-status').innerText = "SYSTEM ONLINE";
        }

        window.addEventListener('assetsChanged', () => {
            initTracker();
        });

        initTracker();
    })();
</script>

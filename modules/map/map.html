<div id="map-scope">
    <style>
        #map-scope { width: 100%; height: 100%; background: #050508; color: #00ff9d; font-family: 'Exo 2', sans-serif; display: flex; position: relative; overflow: hidden; }
        
        /* Tactical Sidebar */
        #map-scope #tactical-sidebar { 
            width: 340px; background: rgba(11, 13, 18, 0.95); border-right: 1px solid #1a1c23; 
            display: flex; flex-direction: column; z-index: 20; padding: 20px; box-sizing: border-box;
            overflow-y: auto; font-size: 0.85rem;
        }
        #map-scope .sidebar-header { font-size: 0.7rem; letter-spacing: 3px; color: #454d5d; border-bottom: 1px solid #1a1c23; padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; }
        
        #map-scope select, #map-scope button { 
            width: 100%; padding: 10px; background: #161922; color: #00ff9d; border: 1px solid #454d5d; 
            margin-bottom: 10px; font-family: 'Share Tech Mono', monospace; cursor: pointer; text-transform: uppercase;
        }
        #map-scope button:hover { background: #00ff9d; color: #000; }
        
        #map-scope .data-card { background: #1a1c23; border: 1px solid #454d5d; padding: 10px; margin-bottom: 10px; border-left: 3px solid #00ff9d; }
        #map-scope .data-title { font-weight: bold; color: #bcdee7; font-family: 'Share Tech Mono'; margin-bottom: 5px; font-size: 1rem; }
        #map-scope .data-text { color: #aab; line-height: 1.4; font-size: 0.8rem; margin-bottom: 4px; }
        #map-scope .tag { font-size: 0.6rem; background: #161922; padding: 2px 6px; border-radius: 4px; border: 1px solid #454d5d; display: inline-block; margin-right: 4px; color: #ff0055;}

        /* Main Viewport & Grid */
        #map-viewport { 
            flex-grow: 1; position: relative; overflow: hidden;
            background-image: 
                linear-gradient(rgba(0, 255, 153, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 153, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
        }
        
        #map-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        /* Map Tokens */
        .poi-token { 
            position: absolute; width: 20px; height: 20px; border-radius: 50%; 
            background: #000; border: 2px solid #00ff9d; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(0,255,153,0.2);
            z-index: 10; pointer-events: auto;
        }
        .poi-token:hover { transform: translate(-50%, -50%) scale(1.5); box-shadow: 0 0 15px #00ff9d; }
        .poi-label {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); padding: 2px 5px; font-size: 10px;
            font-family: 'Share Tech Mono'; color: #fff; border: 1px solid #454d5d; pointer-events: none;
            white-space: nowrap;
        }

        /* Starship Token */
        #ship-token {
            position: absolute; width: 24px; height: 24px; 
            background: rgba(0, 255, 153, 0.2); border: 2px solid #fff; 
            transform: translate(-50%, -50%); z-index: 50; cursor: grab;
            display: flex; align-items: center; justify-content: center;
            clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            pointer-events: auto;
        }
        #ship-token:active { cursor: grabbing; border-color: #ff0055; background: rgba(255,0,85,0.3); }

        /* SVG Lines for Passages */
        #passages-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .passage-line { stroke: rgba(0, 255, 153, 0.4); stroke-width: 2; stroke-dasharray: 4; fill: none; }
    </style>

    <div id="tactical-sidebar">
        <div class="sidebar-header">NAV-COMPUTER SETUP</div>
        <select id="region-select">
            <option value="terminus">REGION: TERMINUS</option>
            <option value="outlands" selected>REGION: OUTLANDS</option>
            <option value="expanse">REGION: EXPANSE</option>
        </select>
        <button onclick="generateSector()">GENERATE SECTOR</button>
        <button onclick="clearSector()" style="background: transparent; color: #ff0055; border-color: #ff0055;">PURGE NAV DATA</button>
        
        <div class="sidebar-header" style="margin-top:20px;">SECTOR DATA</div>
        <div id="sector-info-container">
            <div style="opacity: 0.5; text-align: center; margin-top: 20px;">NO SECTOR DATA</div>
        </div>
    </div>

    <div id="map-viewport">
        <svg id="passages-layer"></svg>
        <div id="map-content"></div>
    </div>
</div>

<script>
    (function() {
        const scope = document.getElementById('map-scope');
        const contentLayer = document.getElementById('map-content');
        const passagesLayer = document.getElementById('passages-layer');
        const infoContainer = document.getElementById('sector-info-container');
        const viewport = document.getElementById('map-viewport');
        
        const GRID_SCALE = 60; // Represents 1 unit of distance
        let activeSector = null;

        // Dragging State
        let isDragging = false;
        let shipElement = null;

        const REGION_RULES = {
            'terminus': { settlements: 4, passages: 3 },
            'outlands': { settlements: 3, passages: 2 },
            'expanse':  { settlements: 2, passages: 1 }
        };

        window.initMap = async function() {
            try {
                await window.dataswornReady;
                const stats = await window.gLink.loadStatsServer(window.charId);
                if (stats && stats.sector_data) {
                    activeSector = JSON.parse(stats.sector_data);
                    renderSector();
                }
            } catch (err) {
                console.error("Map Module Link Failure:", err);
            }
        };

        function findOracle(idSnippet) {
            let result = null;
            function search(obj) {
                if (!obj || typeof obj !== 'object' || result) return;
                if (obj._id && obj._id.includes(idSnippet)) { result = obj; return; }
                for (let key in obj) search(obj[key]);
            }
            search(window.datasworn);
            return result;
        }

        function rollOracle(idSnippet, fallback = "Unknown") {
            const oracle = findOracle(idSnippet);
            if (!oracle || !oracle.rows) return fallback;
            const roll = Math.floor(Math.random() * 100) + 1;
            const row = oracle.rows.find(r => roll >= r.floor && roll <= r.ceiling);
            return row ? (row.text || row.result || fallback) : fallback;
        }

        window.generateSector = async function() {
            if (activeSector && !confirm("Warning: This will overwrite current sector nav data. Proceed?")) return;
            
            const region = document.getElementById('region-select').value;
            const rules = REGION_RULES[region];
            infoContainer.innerHTML = "<div>GENERATING...</div>";

            const sector = {
                name: rollOracle("oracles/space/sector_name", "Uncharted Sector"),
                region: region.toUpperCase(),
                trouble: rollOracle("oracles/space/sector_trouble", "Unknown Threat"),
                settlements: [],
                passages: [],
                connection: null,
                ship: { x: 0, y: 0 }
            };

            const bounds = { w: 10, h: 8 };
            const minDistance = 2;

            // Generate Settlements
            for (let i = 0; i < rules.settlements; i++) {
                let x, y, valid;
                let attempts = 0;
                do {
                    valid = true;
                    x = Math.floor(Math.random() * bounds.w) + 1;
                    y = Math.floor(Math.random() * bounds.h) + 1;
                    for (let s of sector.settlements) {
                        if (Math.hypot(s.x - x, s.y - y) < minDistance) { valid = false; break; }
                    }
                    attempts++;
                } while (!valid && attempts < 100);

                const loc = rollOracle("oracles/settlements/location", "Orbital");
                
                sector.settlements.push({
                    id: i,
                    name: rollOracle("oracles/settlements/name", `Outpost ${i}`),
                    x: x, y: y,
                    location: loc,
                    population: rollOracle("oracles/settlements/population", "Few"),
                    authority: rollOracle("oracles/settlements/authority", "None"),
                    projects: rollOracle("oracles/settlements/projects", "Survival"),
                    star: rollOracle("oracles/space/stellar_object", "Main Sequence Star"),
                    planet: loc.toLowerCase().includes("planet") ? rollOracle("oracles/planets/class", "Rocky World") : "N/A"
                });
            }

            // Generate Passages
            let passageCount = 0;
            if (sector.settlements.length > 1) {
                const shuffled = [...sector.settlements].sort(() => 0.5 - Math.random());
                for (let i = 0; i < shuffled.length - 1; i++) {
                    if (passageCount >= rules.passages) break;
                    sector.passages.push([shuffled[i].id, shuffled[i+1].id]);
                    passageCount++;
                }
            }
            while (passageCount < rules.passages) {
                sector.passages.push([Math.floor(Math.random() * sector.settlements.length), "OFF_MAP"]);
                passageCount++;
            }

            // Generate Local Connection
            sector.connection = {
                name: rollOracle("oracles/characters/name", "Unknown Contact"),
                role: rollOracle("oracles/characters/role", "Scavenger"),
                rank: "Dangerous",
                home: sector.settlements[0].name
            };

            // FTL JUMP PLACEMENT (Collision Avoidance)
            let shipX, shipY, validJump;
            do {
                validJump = true;
                shipX = Math.floor(Math.random() * bounds.w) + 1;
                shipY = Math.floor(Math.random() * bounds.h) + 1;
                for (let s of sector.settlements) {
                    if (s.x === shipX && s.y === shipY) { validJump = false; break; }
                }
            } while (!validJump);
            sector.ship = { x: shipX, y: shipY };

            activeSector = sector;
            renderSector();
            
            infoContainer.innerHTML = "<div>UPLINKING TO DRIVE...</div>";
            await window.gLink.saveStatServer(window.charId, "sector_data", JSON.stringify(activeSector));
            await window.gLink.logServer(window.charId, `Sector Generated: ${sector.name} [${sector.region}]`);
        };

        window.clearSector = async function() {
            if(confirm("Purge local sector map data?")) {
                activeSector = null;
                renderSector();
                await window.gLink.saveStatServer(window.charId, "sector_data", "");
            }
        };

        function renderSector() {
            contentLayer.innerHTML = '';
            passagesLayer.innerHTML = '';

            if (!activeSector) {
                infoContainer.innerHTML = `<div style="opacity: 0.5; text-align: center; margin-top: 20px;">NO SECTOR DATA</div>`;
                return;
            }

            // Draw Sidebar Info
            let html = `
                <div class="data-card" style="border-color: #fbbf24;">
                    <div class="data-title">${activeSector.name}</div>
                    <span class="tag">${activeSector.region}</span>
                </div>
                <div class="data-card" style="border-color: #ff0055;">
                    <div class="tag">SECTOR TROUBLE</div>
                    <div class="data-text">${activeSector.trouble}</div>
                </div>
                <div class="data-card" style="border-color: #3b82f6;">
                    <div class="tag">LOCAL CONNECTION</div>
                    <div class="data-text"><b>${activeSector.connection.name}</b> (${activeSector.connection.role})</div>
                    <div class="data-text">Rank: ${activeSector.connection.rank} | At: ${activeSector.connection.home}</div>
                </div>
            `;

            // Draw Settlements
            activeSector.settlements.forEach(s => {
                html += `
                    <div class="data-card">
                        <div class="data-title">${s.name}</div>
                        <div class="data-text"><b>Loc:</b> ${s.location}</div>
                        <div class="data-text"><b>Auth:</b> ${s.authority}</div>
                        <div class="data-text"><b>Proj:</b> ${s.projects}</div>
                        ${s.planet !== 'N/A' ? `<div class="data-text" style="color:#fbbf24;"><b>Planet:</b> ${s.planet}</div>` : ''}
                    </div>
                `;

                const token = document.createElement('div');
                token.className = 'poi-token';
                token.style.left = (s.x * GRID_SCALE) + 'px';
                token.style.top = (s.y * GRID_SCALE) + 'px';
                token.innerHTML = `<div class="poi-label">${s.name}</div>`;
                if (s.planet !== 'N/A') token.style.borderColor = "#fbbf24";
                contentLayer.appendChild(token);
            });

            infoContainer.innerHTML = html;

            // Draw Passages
            activeSector.passages.forEach(p => {
                const s1 = activeSector.settlements.find(x => x.id === p[0]);
                if (!s1) return;

                const x1 = s1.x * GRID_SCALE;
                const y1 = s1.y * GRID_SCALE;

                let x2, y2;
                if (p[1] === "OFF_MAP") {
                    x2 = x1 + (GRID_SCALE * 3);
                    y2 = y1 - (GRID_SCALE * 2);
                } else {
                    const s2 = activeSector.settlements.find(x => x.id === p[1]);
                    x2 = s2.x * GRID_SCALE;
                    y2 = s2.y * GRID_SCALE;
                }

                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', x1);
                line.setAttribute('y1', y1);
                line.setAttribute('x2', x2);
                line.setAttribute('y2', y2);
                line.setAttribute('class', 'passage-line');
                passagesLayer.appendChild(line);
            });

            // Draw Ship Token
            shipElement = document.createElement('div');
            shipElement.id = 'ship-token';
            shipElement.style.left = (activeSector.ship.x * GRID_SCALE) + 'px';
            shipElement.style.top = (activeSector.ship.y * GRID_SCALE) + 'px';
            contentLayer.appendChild(shipElement);

            // Drag Events
            shipElement.onmousedown = () => isDragging = true;
        }

        // Handle Ship Dragging & Snapping globally on the viewport
        viewport.addEventListener('mousemove', (e) => {
            if (!isDragging || !shipElement) return;
            const rect = viewport.getBoundingClientRect();
            // Free move while dragging
            shipElement.style.left = (e.clientX - rect.left) + 'px';
            shipElement.style.top = (e.clientY - rect.top) + 'px';
        });

        viewport.addEventListener('mouseup', async (e) => {
            if (!isDragging || !activeSector) return;
            isDragging = false;
            
            const rect = viewport.getBoundingClientRect();
            const rawX = e.clientX - rect.left;
            const rawY = e.clientY - rect.top;

            // Snap to Grid Mathematics
            const gridX = Math.round(rawX / GRID_SCALE);
            const gridY = Math.round(rawY / GRID_SCALE);

            activeSector.ship.x = gridX;
            activeSector.ship.y = gridY;

            // Snap token into place visually
            shipElement.style.left = (gridX * GRID_SCALE) + 'px';
            shipElement.style.top = (gridY * GRID_SCALE) + 'px';

            // Save to network silently
            await window.gLink.saveStatServer(window.charId, "sector_data", JSON.stringify(activeSector));
        });

        viewport.addEventListener('mouseleave', () => { isDragging = false; });

        initMap();
    })();
</script>

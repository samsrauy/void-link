<div id="map-scope">
    <style>
        #map-scope { width: 100%; height: 100%; background: #050508; color: #00ff9d; font-family: 'Exo 2', sans-serif; display: flex; position: relative; overflow: hidden; transition: all 1s; }
        
        #map-scope #tactical-sidebar { 
            width: 380px; background: rgba(11, 13, 18, 0.95); border-right: 1px solid #1a1c23; 
            display: flex; flex-direction: column; z-index: 20; padding: 20px; box-sizing: border-box;
            overflow-y: auto; font-size: 0.85rem; transition: background 1s, border-color 1s;
        }
        #map-scope .sidebar-header { font-size: 0.7rem; letter-spacing: 3px; color: #454d5d; border-bottom: 1px solid #1a1c23; padding-bottom: 5px; margin-bottom: 15px; text-transform: uppercase; display: flex; justify-content: space-between; transition: color 1s; }
        
        #map-scope select, #map-scope button { 
            width: 100%; padding: 10px; background: #161922; color: #00ff9d; border: 1px solid #454d5d; 
            margin-bottom: 10px; font-family: 'Share Tech Mono', monospace; cursor: pointer; text-transform: uppercase;
        }
        #map-scope button:hover { background: #00ff9d; color: #000; }
        
        #map-scope .data-card { background: #1a1c23; border: 1px solid #454d5d; padding: 10px; margin-bottom: 10px; border-left: 3px solid #00ff9d; }
        #map-scope .data-title { font-weight: bold; color: #bcdee7; font-family: 'Share Tech Mono'; margin-bottom: 5px; font-size: 1rem; }
        #map-scope .data-text { color: #aab; line-height: 1.4; font-size: 0.8rem; margin-bottom: 4px; }
        #map-scope .tag { font-size: 0.6rem; background: #161922; padding: 2px 6px; border-radius: 4px; border: 1px solid #454d5d; display: inline-block; margin-right: 4px; color: #ff0055;}

        #map-scope .editable { border-bottom: 1px dashed #454d5d; cursor: text; outline: none; transition: 0.2s; display: inline-block; min-width: 20px; }
        #map-scope .editable:focus { border-bottom-color: #00ff9d; background: rgba(0,255,153,0.1); }

        /* THE INFINITE, HIDDEN VIEWPORT (Removed smooth scroll for drag-panning) */
        #map-viewport { 
            flex-grow: 1; position: relative; overflow: hidden; 
            background-color: #020204; cursor: grab;
        }
        #map-viewport:active { cursor: grabbing; }

        /* Lock the internal universe size */
        #starscape, #grid-layer, #passages-layer, #map-content, #ruler-layer {
            width: 1800px !important; 
            height: 1400px !important;
        }

        #starscape { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1; transition: background 1s; }
        #map-content { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 10; }
        
        #grid-layer {
            position: absolute; top: 0; left: 0; pointer-events: none; z-index: 2;
            -webkit-mask-image: linear-gradient(to right, black 65%, transparent 100%);
            mask-image: linear-gradient(to right, black 65%, transparent 100%);
        }

        /* --- VOID RED ALERT ANIMATIONS --- */
        @keyframes voidPulse {
            0% { box-shadow: inset 0 0 50px rgba(239, 68, 68, 0.05); }
            100% { box-shadow: inset 0 0 150px rgba(239, 68, 68, 0.4); }
        }
        #map-scope.void-alert #map-viewport {
            animation: voidPulse 1.5s infinite alternate ease-in-out;
        }
        #map-scope.void-alert #tactical-sidebar {
            background: rgba(20, 5, 5, 0.98); 
            border-right: 1px solid rgba(239, 68, 68, 0.4);
        }
        #map-scope.void-alert .sidebar-header {
            color: #ef4444; 
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }

        .poi-token { 
            position: absolute; border-radius: 50%; 
            background: #000; border: 2px solid #00ff9d; transform: translate(-50%, -50%);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s; box-shadow: 0 0 10px rgba(0,255,153,0.3);
            pointer-events: auto; z-index: 15;
        }
        .poi-token:hover { transform: translate(-50%, -50%) scale(1.3); z-index: 30 !important; }
        
        .token-derelict { border-radius: 2px; border-color: #10b981; background: #064e3b; box-shadow: 0 0 10px rgba(16,185,129,0.3); }
        .token-precursor { clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); border-radius: 0; background: #3b0764; box-shadow: none; border: none; }
        .token-asteroid { background: transparent; border: none; color: #9ca3af; font-size: 20px; box-shadow: none; }
        .token-unknown { background: transparent; border: 1px dashed #fff; color: #fff; font-size: 12px; font-weight: bold; font-family: 'Share Tech Mono'; box-shadow: 0 0 10px rgba(255,255,255,0.3); }

        .poi-label {
            position: absolute; top: calc(100% + 5px); left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); padding: 3px 6px; font-size: 10px;
            font-family: 'Share Tech Mono'; color: #fff; border: 1px solid #454d5d; pointer-events: none;
            white-space: nowrap; border-radius: 2px; z-index: 20;
        }

        #ship-token {
            position: absolute; width: 20px; height: 20px; 
            background: rgba(0, 255, 153, 0.2); border: 2px solid #fff; 
            transform: translate(-50%, -50%); cursor: grab;
            display: flex; align-items: center; justify-content: center;
            clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            pointer-events: auto; transition: transform 0.1s; z-index: 40;
        }
        #ship-token:active { cursor: grabbing; border-color: #ff0055; background: rgba(255,0,85,0.3); transform: translate(-50%, -50%) scale(1.2); }

        .npc-ship-token {
            position: absolute; width: 16px; height: 16px; 
            background: rgba(251, 191, 36, 0.2); border: 2px solid #f59e0b; 
            transform: translate(-50%, -50%); 
            display: flex; align-items: center; justify-content: center;
            clip-path: polygon(50% 0%, 100% 100%, 50% 80%, 0% 100%);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.3); pointer-events: auto; z-index: 14;
        }
        .npc-ship-token:hover { transform: translate(-50%, -50%) scale(1.5); box-shadow: 0 0 15px #f59e0b; z-index: 20; }

        #passages-layer { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 5; }
        .passage-line { stroke-width: 2; stroke-dasharray: 4; fill: none; transition: stroke 1s; }
    </style>

    <div id="tactical-sidebar">
        <div class="sidebar-header">
            <span>NAV-COMPUTER SETUP</span>
            <span id="map-status" style="color: #00ff9d; opacity: 0.7;">STANDBY</span>
        </div>
        <select id="region-select">
            <option value="terminus">REGION: TERMINUS</option>
            <option value="outlands" selected>REGION: OUTLANDS</option>
            <option value="expanse">REGION: EXPANSE</option>
            <option value="void">REGION: THE VOID</option>
        </select>
        <button id="btn-generate" onclick="generateSector()">GENERATE NEW SECTOR</button>
        
        <div class="sidebar-header" style="margin-top:20px;">NAV ARCHIVES</div>
        <select id="archive-select">
            <option value="">-- NO ARCHIVES FOUND --</option>
        </select>
        <button id="btn-load" onclick="loadArchivedSector()">LOAD SELECTED</button>

        <div class="sidebar-header" style="margin-top:20px;">LOCAL SENSORS</div>
        <div id="sector-info-container">
            <div style="opacity: 0.5; text-align: center; margin-top: 20px;">STANDBY</div>
        </div>
    </div>

    <div id="map-viewport">
        <div id="starscape"></div>
        <svg id="grid-layer"></svg>
        <svg id="passages-layer"></svg>
        <div id="map-content"></div>
        
        <svg id="ruler-layer" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100;">
            <line id="ruler-line" x1="0" y1="0" x2="0" y2="0" stroke="#ff0055" stroke-width="2" stroke-dasharray="5,5" display="none" />
            <rect id="ruler-bg" fill="#1a1c23" stroke="#454d5d" stroke-width="1" rx="4" display="none" />
            <text id="ruler-text" fill="#ff0055" font-family="'Share Tech Mono', monospace" font-size="12" font-weight="bold" text-anchor="middle" dominant-baseline="middle" display="none"></text>
        </svg>
    </div>
</div>

<script>
    (function() {
        const scope = document.getElementById('map-scope');
        const contentLayer = document.getElementById('map-content');
        const passagesLayer = document.getElementById('passages-layer');
        const infoContainer = document.getElementById('sector-info-container');
        const viewport = document.getElementById('map-viewport');
        const archiveSelect = document.getElementById('archive-select');
        const statusMsg = document.getElementById('map-status');
        
        const rulerLine = document.getElementById('ruler-line');
        const rulerBg = document.getElementById('ruler-bg');
        const rulerText = document.getElementById('ruler-text');
        
        const HEX_RADIUS = 30; 
        
        let activeSector = null;
        let isDragging = false;
        let isPanning = false; // NEW: Map Pan tracker
        let startPanX = 0, startPanY = 0, scrollL = 0, scrollT = 0; // NEW: Pan positions
        let shipElement = null;
        let dragStartX = 0;
        let dragStartY = 0;

        const REGION_RULES = {
            'terminus': { settlements: 6, passages: 4, bhChance: 0.02 },
            'outlands': { settlements: 5, passages: 3, bhChance: 0.15 },
            'expanse':  { settlements: 4, passages: 2, bhChance: 0.30 },
            'void':     { settlements: 4, passages: 1, bhChance: 1.00 }
        };

        const REGION_COLORS = {
            'terminus': { hex: '#00ff9d', grid: 'rgba(0, 255, 153, 0.08)', pass: 'rgba(0, 255, 153, 0.3)' },
            'outlands': { hex: '#facc15', grid: 'rgba(250, 204, 21, 0.08)', pass: 'rgba(250, 204, 21, 0.3)' },
            'expanse':  { hex: '#f97316', grid: 'rgba(249, 115, 22, 0.08)', pass: 'rgba(249, 115, 22, 0.3)' },
            'void':     { hex: '#ef4444', grid: 'rgba(239, 68, 68, 0.08)', pass: 'rgba(239, 68, 68, 0.3)' }
        };

        const charNames = ["Jax", "Kaelen", "Lyra", "Voss", "Sira", "Tark", "Rian", "Cora", "Dax", "Elara", "Zane", "Nova", "Kian"];
        const secPrefix = ["Aegis", "Vanguard", "Helios", "Erebus", "Corsair", "Nova", "Obsidian", "Cygnus", "Talos", "Onyx"];
        const secSuffix = ["Reach", "Expanse", "Drift", "Cluster", "Sector", "Nebula", "Void", "Abyss", "Veil"];

        const locRolls = ["Deep Space Station", "Orbital Habitat", "Asteroid Base", "Planetary Settlement", "Gas Giant Refinery"];
        const planetRolls = ["Desert World", "Ice World", "Furnace World", "Jungle World", "Ocean World", "Rocky World", "Toxic World", "Shattered World"];
        const starRolls = ["Neutron Star", "Red Dwarf Star", "Pulsar", "Main Sequence Star", "White Dwarf Star"];
        const voidNames = ["The Maw", "Abyssal Eye", "Gargantua", "Erebus", "Oblivion Gate", "Tartarus", "Singularity Prime", "The Great Dark"];

        const WIKI_LINKS = {
            "Black Hole": "https://en.wikipedia.org/wiki/Black_hole",
            "Neutron Star": "https://en.wikipedia.org/wiki/Neutron_star",
            "Asteroid Belt": "https://en.wikipedia.org/wiki/Asteroid_belt",
            "Ion Storm": "https://en.wikipedia.org/wiki/Geomagnetic_storm", 
            "Stellar Nebula": "https://en.wikipedia.org/wiki/Nebula",
            "Red Dwarf Star": "https://en.wikipedia.org/wiki/Red_dwarf",
            "Main Sequence Star": "https://en.wikipedia.org/wiki/Main_sequence",
            "White Dwarf Star": "https://en.wikipedia.org/wiki/White_dwarf",
            "Pulsar": "https://en.wikipedia.org/wiki/Pulsar"
        };

        const PLANET_LINKS = {
            "Desert World": "https://en.wikipedia.org/wiki/Desert_planet",
            "Ice World": "https://en.wikipedia.org/wiki/Ice_planet",
            "Furnace World": "https://en.wikipedia.org/wiki/Lava_planet",
            "Jungle World": "https://en.wikipedia.org/wiki/Superhabitable_planet",
            "Ocean World": "https://en.wikipedia.org/wiki/Ocean_planet",
            "Rocky World": "https://en.wikipedia.org/wiki/Terrestrial_planet",
            "Toxic World": "https://en.wikipedia.org/wiki/Carbon_planet",
            "Shattered World": "https://en.wikipedia.org/wiki/Disrupted_planet"
        };

        const dynamicStyle = document.createElement('style');
        dynamicStyle.innerHTML = `
            #map-scope { --theme-color: #00ff9d; --theme-bg: rgba(0,255,153,0.1); color: var(--theme-color); transition: color 0.5s; }
            #map-scope select, #map-scope button { color: var(--theme-color); border-color: #454d5d; transition: all 0.3s; }
            #map-scope button:hover { background: var(--theme-color); color: #000; border-color: var(--theme-color); }
            #map-status { color: var(--theme-color); transition: color 0.5s; }
            #map-scope .data-card { border-left-color: var(--theme-color); transition: border-left-color 0.5s; }
            .poi-token { border-color: var(--theme-color); transition: border-color 0.5s, box-shadow 0.2s, transform 0.2s; }
            .poi-token:hover { box-shadow: 0 0 15px var(--theme-color); }
            .editable:focus { border-bottom-color: var(--theme-color); background: var(--theme-bg); }
        `;
        document.head.appendChild(dynamicStyle);

        window.initMap = async function() {
            try {
                generateStarscape('terminus');
                drawGrid('terminus'); 
                statusMsg.innerText = "LINKING CORE...";
                if(window.dataswornReady) await window.dataswornReady;
                await refreshArchiveList();
                statusMsg.innerText = "STANDBY";
            } catch (err) {
                console.error("Map Module Link Failure:", err);
                statusMsg.innerText = "LINK FAILED";
            }
        };

        function generateStarscape(regionKey = 'terminus') {
            const bg = document.getElementById('starscape');
            bg.innerHTML = '';
            const c = REGION_COLORS[regionKey] || REGION_COLORS['terminus'];
            
            bg.style.backgroundColor = '#020204';
            bg.style.backgroundImage = `radial-gradient(circle at 50% 50%, ${c.grid.replace('0.08', '0.04')} 0%, transparent 100%)`;

            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 2 + 1;
                star.style.position = 'absolute';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.backgroundColor = `rgba(255,255,255,${Math.random() * 0.8 + 0.2})`;
                star.style.borderRadius = '50%';
                bg.appendChild(star);
            }
        }

        function getHexPixel(gx, gy) {
            const hexH = HEX_RADIUS * Math.sqrt(3); 
            const px = gx * (HEX_RADIUS * 1.5); 
            let py = gy * hexH;
            if (gx % 2 !== 0) py += (hexH / 2); 
            return { x: px + HEX_RADIUS, y: py + (hexH / 2) };
        }

        function drawGrid(regionKey = 'terminus') {
            const gridLayer = document.getElementById('grid-layer');
            gridLayer.innerHTML = '';
            const c = REGION_COLORS[regionKey] || REGION_COLORS['terminus'];

            for(let gx=0; gx<=35; gx++) {
                for(let gy=0; gy<=25; gy++) {
                    const center = getHexPixel(gx, gy);
                    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    let points = [];
                    for(let i=0; i<6; i++) {
                        const angle_rad = (Math.PI / 180) * (60 * i);
                        const px = center.x + HEX_RADIUS * Math.cos(angle_rad);
                        const py = center.y + HEX_RADIUS * Math.sin(angle_rad);
                        points.push(`${px},${py}`);
                    }
                    poly.setAttribute('points', points.join(' '));
                    poly.setAttribute('fill', 'none');
                    poly.setAttribute('stroke', c.grid);
                    poly.setAttribute('stroke-width', '1');
                    gridLayer.appendChild(poly);
                }
            }
        }

        async function refreshArchiveList() {
            const list = await window.gLink.getSectorListServer(window.charId);
            if (list && list.length > 0) {
                archiveSelect.innerHTML = list.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            } else {
                archiveSelect.innerHTML = `<option value="">-- NO ARCHIVES --</option>`;
            }
        }

        function rollOracle(idSnippet, fallback = "") {
            return window.dataswornCore ? window.dataswornCore.rollOracle(idSnippet, fallback) : fallback;
        }

        window.editSectorField = async function(fieldPath, newValue, isSettlement = false, settlementIndex = null) {
            if(!activeSector) return;
            if (isSettlement && settlementIndex !== null) activeSector.settlements[settlementIndex][fieldPath] = newValue;
            else {
                let parts = fieldPath.split('.');
                if(parts.length === 1) activeSector[parts[0]] = newValue;
                else if (parts.length === 2) activeSector[parts[0]][parts[1]] = newValue;
            }
            statusMsg.innerText = "UPLINKING...";
            const archiveName = `[${activeSector.region}] ${activeSector.name}`;
            await window.gLink.saveSectorServer(window.charId, activeSector.id, archiveName, JSON.stringify(activeSector));
            
            statusMsg.innerText = "STANDBY";
            refreshArchiveList(); renderSector(); 
        };

        window.generateSector = async function() {
            if (activeSector && !confirm("Initialize new sector scan? Current view will be replaced.")) return;
            
            let region = document.getElementById('region-select').value;
            const rules = REGION_RULES[region];
            statusMsg.innerText = "GENERATING...";

            let sName = rollOracle("sector_name", secPrefix[Math.floor(Math.random()*secPrefix.length)] + " " + secSuffix[Math.floor(Math.random()*secSuffix.length)]);
            
            let isNebula = Math.random() < 0.45;
            let nebulaData = null;
            if (isNebula) {
                const colors = ["rgba(139, 92, 246, 0.5)", "rgba(59, 130, 246, 0.5)", "rgba(16, 185, 129, 0.4)", "rgba(244, 63, 94, 0.5)"];
                nebulaData = {
                    name: "Stellar Nebula",
                    x: Math.floor(Math.random() * 40) + 30, 
                    y: Math.floor(Math.random() * 40) + 30,
                    size: Math.floor(Math.random() * 60) + 50, 
                    color: colors[Math.floor(Math.random() * colors.length)]
                };
            }

            const bounds = { w: 34, h: 22 }; 
            const sector = {
                id: 'sec_' + Date.now(), 
                name: sName, region: region.toUpperCase(),
                trouble: rollOracle("sector_trouble", "Space is vast and unforgiving."),
                nebula: nebulaData,
                settlements: [], passages: [], connection: null,
                ship: { x: 0, y: 0 }
            };

            let idCounter = 0;
            let starCount = 0;
            let voidTriggered = false; 

            const MIN_X = 2; const MAX_X_SAFE = bounds.w - 2; 
            const MIN_Y = 2; const MAX_Y = bounds.h - 2;

            for (let i = 0; i < 3; i++) { 
                if (starCount >= 2) break;
                if (Math.random() > 0.4 && region !== 'void') continue; 
                
                let x = Math.floor(Math.random() * 5) + (bounds.w - 4); 
                let y = Math.floor(Math.random() * (MAX_Y - MIN_Y + 1)) + MIN_Y;
                
                let valid = true;
                for (let s of sector.settlements) {
                    if (Math.hypot(s.x - x, s.y - y) < 5) { valid = false; break; }
                }
                if (!valid) continue;

                let isBlackHole = Math.random() < rules.bhChance;
                if (isBlackHole) voidTriggered = true; 

                let name = isBlackHole 
                    ? "Black Hole (" + rollOracle("anomaly_name", voidNames[Math.floor(Math.random() * voidNames.length)]) + ")"
                    : rollOracle("anomaly_name", starRolls[Math.floor(Math.random() * starRolls.length)]);

                sector.settlements.push({
                    id: idCounter++, x: x, y: y, name: name, location: "Stellar Anomaly",
                    population: "None", authority: "N/A", projects: "N/A", planet: "N/A", renderType: "anomaly"
                });
                starCount++;

                if ((name.includes("Star") || name.includes("Hole") || name.includes("Dwarf")) && Math.random() < 0.25) {
                    if (starCount < 2) {
                        sector.settlements.push({
                            id: idCounter++, x: x - 1, y: y + (Math.random() > 0.5 ? 1 : -1), 
                            name: rollOracle("anomaly_name", starRolls[Math.floor(Math.random() * starRolls.length)]), 
                            location: "Stellar Anomaly", population: "None", authority: "N/A", projects: "N/A", planet: "N/A", renderType: "anomaly"
                        });
                        starCount++;
                    }
                }
            }

            if (voidTriggered && region !== 'void') {
                region = 'void';
                sector.region = 'VOID';
            }

            let numPlanets = Math.floor(Math.random() * rules.settlements) + 1;
            for (let i = 0; i < numPlanets; i++) {
                if (Math.random() > 0.60) continue; 
                
                let attempts = 0, valid = false, x, y;
                while (!valid && attempts < 50) {
                    x = Math.floor(Math.random() * ((MAX_X_SAFE - 6) - MIN_X + 1)) + MIN_X; 
                    y = Math.floor(Math.random() * (MAX_Y - MIN_Y + 1)) + MIN_Y;
                    valid = true;
                    for (let s of sector.settlements) {
                        let reqDist = 2;
                        if (s.renderType === "anomaly") reqDist = s.name.includes("Black Hole") ? 8 : 5;
                        if (Math.hypot(s.x - x, s.y - y) < reqDist) { valid = false; break; }
                    }
                    attempts++;
                }
                if (valid) {
                    let pType = rollOracle("planet_class", planetRolls[Math.floor(Math.random() * planetRolls.length)]);
                    sector.settlements.push({
                        id: idCounter++, x: x, y: y, 
                        name: rollOracle("planet_name", `System ${secPrefix[Math.floor(Math.random()*secPrefix.length)]}`),
                        location: "Uncharted Planet", planet: pType,
                        population: "None", authority: "N/A", projects: "N/A", renderType: "planet"
                    });
                }
            }

            let numAsteroids = Math.floor(Math.random() * rules.settlements) + 1;
            for (let i = 0; i < numAsteroids; i++) {
                if (Math.random() > 0.4) continue;
                
                let x, y, valid = false, attempts = 0;
                while (!valid && attempts < 50) {
                    valid = true;
                    const planets = sector.settlements.filter(s => s.renderType === "planet");
                    if (planets.length > 0 && Math.random() < 0.6) {
                        let target = planets[Math.floor(Math.random() * planets.length)];
                        x = target.x + (Math.random() > 0.5 ? 1 : -1);
                        y = target.y + (Math.random() > 0.5 ? 1 : 0);
                    } else {
                        x = Math.floor(Math.random() * ((MAX_X_SAFE - 6) - MIN_X + 1)) + MIN_X;
                        y = Math.floor(Math.random() * (MAX_Y - MIN_Y + 1)) + MIN_Y;
                    }

                    for (let s of sector.settlements) {
                        if (s.x === x && s.y === y) valid = false; 
                        if (s.renderType === "anomaly" && Math.hypot(s.x - x, s.y - y) < 5) valid = false;
                    }
                    attempts++;
                }
                
                if(valid) {
                    sector.settlements.push({
                        id: idCounter++, x: x, y: y, name: rollOracle("asteroid_name", "Debris Field"), 
                        location: "Asteroid Swarm", planet: "N/A", population: "None", authority: "N/A", projects: "N/A", renderType: "asteroid"
                    });
                }
            }

            for (let i = 0; i < rules.settlements; i++) {
                
                let settlementChance = 0.5;
                if (region === 'void') settlementChance = 0.0; 
                else if (region === 'expanse') settlementChance = 0.4;
                else if (region === 'outlands') settlementChance = 0.6;
                else settlementChance = 0.8; 

                let rnd = Math.random();
                let loc, name, renderType, pType = "N/A", auth = "N/A", proj = "N/A", pop = "None";
                
                if (rnd > settlementChance) {
                    let clutRnd = Math.random();
                    if (clutRnd < 0.4) { loc = "Derelict Spacecraft"; name = "Unknown Ghost Ship"; renderType = "derelict"; }
                    else if (clutRnd < 0.7) { loc = "Precursor Vault"; name = "Alien Construct"; renderType = "precursor"; }
                    else { loc = "Anomalous Signature"; name = "Unknown Contact"; renderType = "unknown"; }
                } else {
                    loc = rollOracle("settlement_location", locRolls[Math.floor(Math.random() * locRolls.length)]);
                    name = rollOracle("settlement_name", `Outpost ${idCounter}`);
                    pType = loc.toLowerCase().includes("planet") ? rollOracle("planet_class", planetRolls[Math.floor(Math.random() * planetRolls.length)]) : "N/A";
                    auth = rollOracle("authority", "None"); proj = rollOracle("settlement_projects", "Survival"); pop = rollOracle("population", "Hundreds");
                    renderType = "settlement";
                }

                let x, y, valid = false, attempts = 0;
                while (!valid && attempts < 50) {
                    x = Math.floor(Math.random() * ((MAX_X_SAFE - 4) - MIN_X + 1)) + MIN_X;
                    y = Math.floor(Math.random() * (MAX_Y - MIN_Y + 1)) + MIN_Y;
                    valid = true;
                    
                    for (let s of sector.settlements) {
                        if (s.x === x && s.y === y) valid = false;
                        if (Math.hypot(s.x - x, s.y - y) < 2) valid = false;
                        if (s.renderType === "anomaly") {
                            let reqDist = 5; 
                            if (s.name.includes("Black Hole")) reqDist = (renderType === "settlement") ? 8 : 4; 
                            if (Math.hypot(s.x - x, s.y - y) < reqDist) valid = false; 
                        }
                    }
                    attempts++;
                }

                if (valid) {
                    sector.settlements.push({
                        id: idCounter++, x: x, y: y, name: name, location: loc,
                        population: pop, authority: auth, projects: proj, planet: pType, renderType: renderType
                    });
                }
            }

            const trueSettlements = sector.settlements.filter(s => s.renderType === "settlement" || s.renderType === "planet");
            let passageCount = 0;
            if (trueSettlements.length > 1) {
                const shuffled = [...trueSettlements].sort(() => 0.5 - Math.random());
                for (let i = 0; i < shuffled.length - 1; i++) {
                    if (passageCount >= rules.passages) break;
                    sector.passages.push([shuffled[i].id, shuffled[i+1].id]);
                    passageCount++;
                }
            }

            let connIsShip = Math.random() < 0.3;
            sector.connection = {
                name: rollOracle("character_name", charNames[Math.floor(Math.random()*charNames.length)]),
                role: rollOracle("character_role", "Scavenger"), rank: "Dangerous",
                home: connIsShip ? "Independent Starship" : (trueSettlements[0]?.name || "Nomad"),
                isShip: connIsShip,
                x: connIsShip ? Math.floor(Math.random() * ((MAX_X_SAFE - 6) - MIN_X + 1)) + MIN_X : 0, 
                y: connIsShip ? Math.floor(Math.random() * (MAX_Y - MIN_Y + 1)) + MIN_Y : 0
            };

            sector.ship = { x: 5, y: 5 }; 
            
            activeSector = sector;
            renderSector(); 
            
            statusMsg.innerText = "UPLINKING...";
            const archiveName = `[${activeSector.region}] ${activeSector.name}`;
            await window.gLink.saveSectorServer(window.charId, sector.id, archiveName, JSON.stringify(activeSector));
            
            await refreshArchiveList();
            archiveSelect.value = sector.id; 
            statusMsg.innerText = "STANDBY";
        };

        window.loadArchivedSector = async function() {
            const id = archiveSelect.value;
            if (!id) return;
            statusMsg.innerText = "DOWNLOADING...";
            const data = await window.gLink.loadSectorServer(window.charId, id);
            if (data) { activeSector = data; renderSector(); statusMsg.innerText = "STANDBY"; } 
            else { statusMsg.innerText = "ARCHIVE CORRUPTED"; }
        };

        window.highlightMapToken = function(id) {
            const token = document.getElementById(`token-${id}`);
            if (token) { 
                token.dataset.origTransform = token.style.transform;
                token.style.transform = 'translate(-50%, -50%) scale(1.5)'; 
                token.style.zIndex = '50'; 
                token.style.boxShadow = '0 0 25px var(--theme-color)';
            }
        }
        window.unhighlightMapToken = function(id) {
            const token = document.getElementById(`token-${id}`);
            if (token) { 
                token.style.transform = token.dataset.origTransform || 'translate(-50%, -50%)'; 
                token.style.zIndex = ''; 
                token.style.boxShadow = token.dataset.origShadow || '';
            }
        }
        window.highlightSidebarCard = function(id) {
            const card = document.getElementById(`card-${id}`);
            if (card) { card.style.borderColor = 'var(--theme-color)'; card.style.backgroundColor = 'rgba(0,0,0,0.3)'; card.scrollIntoView({behavior: "smooth", block: "nearest"}); }
        }
        window.unhighlightSidebarCard = function(id) {
            const card = document.getElementById(`card-${id}`);
            if (card) { card.style.borderColor = ''; card.style.backgroundColor = ''; }
        }

        window.panToHex = function(event, gx, gy) {
            if (event && (event.target.isContentEditable || event.target.tagName.toLowerCase() === 'a' || event.target.tagName.toLowerCase() === 'input')) return;
            const targetPixel = getHexPixel(gx, gy);
            const vWidth = viewport.clientWidth;
            const vHeight = viewport.clientHeight;
            viewport.scrollTo({
                left: targetPixel.x - (vWidth / 2),
                top: targetPixel.y - (vHeight / 2),
                behavior: 'smooth'
            });
        };

        function renderSector() {
            contentLayer.innerHTML = '';
            passagesLayer.innerHTML = '';
            infoContainer.innerHTML = '';

            if (!activeSector) return;
            const regKey = activeSector.region.toLowerCase();
            const rColor = REGION_COLORS[regKey] || REGION_COLORS['terminus'];

            scope.style.setProperty('--theme-color', rColor.hex);
            scope.style.setProperty('--theme-bg', rColor.grid.replace('0.08', '0.1'));

            // TRIGGER VOID RED ALERT
            if (regKey === 'void') {
                scope.classList.add('void-alert');
            } else {
                scope.classList.remove('void-alert');
            }

            drawGrid(regKey);
            const bg = document.getElementById('starscape');
            generateStarscape(regKey); 
            
            if (activeSector.nebula) {
                const neb = document.createElement('div');
                neb.style.position = 'absolute';
                neb.style.left = activeSector.nebula.x + '%';
                neb.style.top = activeSector.nebula.y + '%';
                neb.style.width = activeSector.nebula.size + 'vw';
                neb.style.height = activeSector.nebula.size + 'vw';
                neb.style.transform = 'translate(-50%, -50%)';
                neb.style.background = `radial-gradient(circle, ${activeSector.nebula.color} 0%, transparent 65%)`;
                neb.style.filter = 'blur(40px)';
                neb.style.pointerEvents = 'none';
                neb.style.zIndex = '0';
                bg.appendChild(neb);
            }

            let html = `
                <div class="data-card" style="border-left-color: ${rColor.hex};">
                    <div class="data-title editable" contenteditable="true" spellcheck="false" onblur="editSectorField('name', this.innerText)">${activeSector.name}</div>
                    <span class="tag" style="background: ${rColor.grid.replace('0.08', '0.2')}; color: ${rColor.hex}; border-color: ${rColor.hex};">${activeSector.region}</span>
                    ${activeSector.nebula ? `<span class="tag" style="background:#4c1d95; color:#ddd; border-color:#8b5cf6;">NEBULA DETECTED</span>` : ''}
                </div>
                <div class="data-card" style="border-left-color: #ff0055;">
                    <div class="tag">SECTOR TROUBLE</div>
                    <div class="data-text editable" contenteditable="true" spellcheck="false" onblur="editSectorField('trouble', this.innerText)">${activeSector.trouble}</div>
                </div>
                
                <div id="card-npc" class="data-card" style="border-left-color: #3b82f6; transition: 0.3s; cursor: crosshair;" onmouseenter="highlightMapToken('npc')" onmouseleave="unhighlightMapToken('npc')" onclick="panToHex(event, activeSector.connection.x, activeSector.connection.y)">
                    <div class="tag" style="border-color:#3b82f6; color:#3b82f6;">LOCAL CONNECTION</div>
                    <div class="data-text">
                        <b class="editable" contenteditable="true" spellcheck="false" onblur="editSectorField('connection.name', this.innerText)">${activeSector.connection.name}</b> 
                        (<span class="editable" contenteditable="true" spellcheck="false" onblur="editSectorField('connection.role', this.innerText)">${activeSector.connection.role}</span>)
                    </div>
                    <div class="data-text">Rank: ${activeSector.connection.rank} | At: ${activeSector.connection.home}</div>
                </div>
            `;

            activeSector.settlements.forEach((s, idx) => {
                let wikiUrl = WIKI_LINKS[s.name] || (s.location === "Stellar Anomaly" && WIKI_LINKS[Object.keys(WIKI_LINKS).find(k => s.name.includes(k))]);
                let titleHtml = wikiUrl 
                    ? `<div class="data-title"><a href="${wikiUrl}" target="_blank" style="color: ${rColor.hex}; text-decoration: none; border-bottom: 1px dashed ${rColor.hex};">${s.name} ↗</a></div>`
                    : `<div class="data-title editable" contenteditable="true" spellcheck="false" onblur="editSectorField('name', this.innerText, true, ${idx})">${s.name}</div>`;

                let planetHtml = '';
                if (s.planet !== 'N/A') {
                    let pUrl = PLANET_LINKS[s.planet];
                    planetHtml = pUrl 
                        ? `<div class="data-text" style="color:#fbbf24;"><b>Planet:</b> <a href="${pUrl}" target="_blank" style="color:#fbbf24; text-decoration: none; border-bottom: 1px dashed #fbbf24;">${s.planet} ↗</a></div>`
                        : `<div class="data-text" style="color:#fbbf24;"><b>Planet:</b> ${s.planet}</div>`;
                }

                html += `
                    <div id="card-${s.id}" class="data-card" style="transition: 0.3s; cursor: crosshair;" onmouseenter="highlightMapToken(${s.id})" onmouseleave="unhighlightMapToken(${s.id})" onclick="panToHex(event, ${s.x}, ${s.y})">
                        ${titleHtml}
                        <div class="data-text"><b>Loc:</b> ${s.location}</div>
                        ${s.authority !== 'N/A' ? `<div class="data-text"><b>Auth:</b> <span class="editable" contenteditable="true" spellcheck="false" onblur="editSectorField('authority', this.innerText, true, ${idx})">${s.authority}</span></div>` : ''}
                        ${s.projects !== 'N/A' ? `<div class="data-text"><b>Proj:</b> <span class="editable" contenteditable="true" spellcheck="false" onblur="editSectorField('projects', this.innerText, true, ${idx})">${s.projects}</span></div>` : ''}
                        ${planetHtml}
                    </div>
                `;

                const token = document.createElement('div');
                token.id = `token-${s.id}`;
                token.className = 'poi-token';
                const pos = getHexPixel(s.x, s.y);
                token.style.left = pos.x + 'px';
                token.style.top = pos.y + 'px';

                token.onmouseenter = () => highlightSidebarCard(s.id);
                token.onmouseleave = () => unhighlightSidebarCard(s.id);

                let tWidth = 16; let tHeight = 16;
                let shadowStr = `0 0 10px ${rColor.hex}`;

                if (s.renderType === 'derelict') { token.classList.add('token-derelict'); token.style.borderColor = "#10b981"; shadowStr = "0 0 10px rgba(16,185,129,0.3)"; }
                else if (s.renderType === 'precursor') { token.classList.add('token-precursor'); token.style.backgroundColor = '#a855f7'; token.style.borderColor = 'transparent'; shadowStr="none";}
                else if (s.renderType === 'asteroid') { token.classList.add('token-asteroid'); token.innerText = '✱'; tWidth = 24; tHeight = 24; token.style.borderColor = 'transparent'; shadowStr="none";}
                else if (s.renderType === 'unknown') { token.classList.add('token-unknown'); token.innerText = '?'; token.style.borderColor = "#fff"; shadowStr = "0 0 10px rgba(255,255,255,0.3)";}
                else if (s.renderType === 'planet') { token.style.borderColor = "#3b82f6"; shadowStr = "0 0 10px rgba(59,130,246,0.5)"; }
                else if (s.renderType === 'anomaly') {
                    if (s.name.includes("Black Hole")) { 
                        tWidth = 80; tHeight = 80; token.style.borderColor = "#8b5cf6"; token.style.backgroundColor = "#000"; shadowStr = "0 0 40px #8b5cf6"; 
                    } else if (s.name.includes("White Dwarf")) { 
                        tWidth = 45; tHeight = 45; token.style.borderColor = "#ffffff"; token.style.backgroundColor = "#e2e8f0"; shadowStr = "0 0 35px #ffffff"; 
                    } else if (s.name.includes("Star")) { 
                        tWidth = 120; tHeight = 120; token.style.borderColor = "#fcd34d"; token.style.backgroundColor = "#b45309"; shadowStr = "0 0 60px #fcd34d"; 
                    } else if (s.name.includes("Pulsar") || s.name.includes("Neutron")) {
                        tWidth = 40; tHeight = 40; token.style.borderColor = "#38bdf8"; token.style.backgroundColor = "#fff"; shadowStr = "0 0 30px #38bdf8"; 
                    } else { 
                        token.style.borderColor = "#a8a29e"; shadowStr = "0 0 10px rgba(168,162,158,0.3)"; 
                    }
                }

                token.style.width = tWidth + 'px'; token.style.height = tHeight + 'px';
                token.style.boxShadow = shadowStr; token.dataset.origShadow = shadowStr; 

                const labelDiv = document.createElement('div');
                labelDiv.className = 'poi-label'; labelDiv.innerText = s.name;
                token.appendChild(labelDiv); contentLayer.appendChild(token);
            });

            infoContainer.innerHTML = html;

            activeSector.passages.forEach(p => {
                const s1 = activeSector.settlements.find(x => x.id === p[0]);
                if (!s1) return;
                const pos1 = getHexPixel(s1.x, s1.y);
                let pos2 = p[1] === "OFF_MAP" ? { x: pos1.x + (HEX_RADIUS * 6), y: pos1.y - (HEX_RADIUS * 4) } : getHexPixel(activeSector.settlements.find(x => x.id === p[1]).x, activeSector.settlements.find(x => x.id === p[1]).y);
                
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', pos1.x); line.setAttribute('y1', pos1.y);
                line.setAttribute('x2', pos2.x); line.setAttribute('y2', pos2.y);
                line.setAttribute('class', 'passage-line');
                line.setAttribute('stroke', rColor.pass); 
                passagesLayer.appendChild(line);
            });

            if (activeSector.connection && activeSector.connection.isShip) {
                const npcShip = document.createElement('div');
                npcShip.id = 'token-npc'; 
                npcShip.className = 'npc-ship-token';
                const nPos = getHexPixel(activeSector.connection.x, activeSector.connection.y);
                npcShip.style.left = nPos.x + 'px'; npcShip.style.top = nPos.y + 'px';
                
                npcShip.onmouseenter = () => highlightSidebarCard('npc');
                npcShip.onmouseleave = () => unhighlightSidebarCard('npc');

                const nLabel = document.createElement('div'); nLabel.className = 'poi-label'; nLabel.innerText = activeSector.connection.name;
                npcShip.appendChild(nLabel); contentLayer.appendChild(npcShip);
            }

            shipElement = document.createElement('div');
            shipElement.id = 'ship-token';
            const shipPos = getHexPixel(activeSector.ship.x, activeSector.ship.y);
            shipElement.style.left = shipPos.x + 'px'; shipElement.style.top = shipPos.y + 'px';
            contentLayer.appendChild(shipElement);

            shipElement.onmousedown = () => { 
                isDragging = true; dragStartX = parseFloat(shipElement.style.left); dragStartY = parseFloat(shipElement.style.top); 
            };
        }

        // --- NEW MAP PANNING AND DRAGGING LOGIC ---
        viewport.addEventListener('mousedown', (e) => {
            // Ignore if clicking a map token, the ship, or a label
            if (e.target.closest('.poi-token') || e.target.closest('.npc-ship-token') || e.target.id === 'ship-token' || e.target.classList.contains('poi-label')) {
                return; 
            }
            // Otherwise, start panning the camera
            isPanning = true;
            viewport.style.cursor = 'grabbing';
            startPanX = e.pageX - viewport.offsetLeft;
            startPanY = e.pageY - viewport.offsetTop;
            scrollL = viewport.scrollLeft;
            scrollT = viewport.scrollTop;
        });

        viewport.addEventListener('mousemove', (e) => {
            // Priority 1: Move the ship if we clicked it
            if (isDragging && shipElement) {
                const rect = viewport.getBoundingClientRect();
                const rawX = e.clientX - rect.left + viewport.scrollLeft;
                const rawY = e.clientY - rect.top + viewport.scrollTop;

                shipElement.style.left = rawX + 'px'; shipElement.style.top = rawY + 'px';
                rulerLine.setAttribute('x1', dragStartX); rulerLine.setAttribute('y1', dragStartY);
                rulerLine.setAttribute('x2', rawX); rulerLine.setAttribute('y2', rawY);
                rulerLine.style.display = 'block';

                const midX = (dragStartX + rawX) / 2, midY = (dragStartY + rawY) / 2;
                rulerText.setAttribute('x', midX); rulerText.setAttribute('y', midY);
                rulerText.textContent = (Math.hypot(rawX - dragStartX, rawY - dragStartY) / (HEX_RADIUS * Math.sqrt(3))).toFixed(1) + ' Units';
                rulerText.style.display = 'block';
                rulerBg.setAttribute('x', midX - 35); rulerBg.setAttribute('y', midY - 10);
                rulerBg.setAttribute('width', 70); rulerBg.setAttribute('height', 20);
                rulerBg.style.display = 'block';
                return;
            }

            // Priority 2: Pan the map if we clicked empty space
            if (isPanning) {
                e.preventDefault(); // Stop text highlighting while dragging
                const x = e.pageX - viewport.offsetLeft;
                const y = e.pageY - viewport.offsetTop;
                const walkX = (x - startPanX) * 1.5; // Multiply for faster panning
                const walkY = (y - startPanY) * 1.5;
                viewport.scrollLeft = scrollL - walkX;
                viewport.scrollTop = scrollT - walkY;
            }
        });

        viewport.addEventListener('mouseup', async (e) => {
            if (isPanning) {
                isPanning = false;
                viewport.style.cursor = 'grab';
                return;
            }

            if (!isDragging || !activeSector) return;
            isDragging = false;
            rulerLine.style.display = 'none'; rulerText.style.display = 'none'; rulerBg.style.display = 'none';
            
            const rect = viewport.getBoundingClientRect();
            const rawX = e.clientX - rect.left + viewport.scrollLeft;
            const rawY = e.clientY - rect.top + viewport.scrollTop;
            
            let bestDist = Infinity, bestCoord = { x: activeSector.ship.x, y: activeSector.ship.y }, bestPixel = { x: rawX, y: rawY };

            for(let gx=0; gx<=35; gx++) {
                for(let gy=0; gy<=25; gy++) {
                    const hPos = getHexPixel(gx, gy);
                    const dist = Math.hypot(hPos.x - rawX, hPos.y - rawY);
                    if(dist < bestDist) { bestDist = dist; bestCoord = { x: gx, y: gy }; bestPixel = hPos; }
                }
            }
            activeSector.ship.x = bestCoord.x; activeSector.ship.y = bestCoord.y;
            shipElement.style.left = bestPixel.x + 'px'; shipElement.style.top = bestPixel.y + 'px';
            statusMsg.innerText = "UPLINKING...";
            
            const archiveName = `[${activeSector.region}] ${activeSector.name}`;
            await window.gLink.saveSectorServer(window.charId, activeSector.id, archiveName, JSON.stringify(activeSector));
            
            statusMsg.innerText = "STANDBY";
        });

        viewport.addEventListener('mouseleave', () => { 
            isDragging = false; 
            isPanning = false;
            viewport.style.cursor = 'grab';
            rulerLine.style.display = 'none'; rulerText.style.display = 'none'; rulerBg.style.display = 'none';
        });

        initMap();
    })();
</script>

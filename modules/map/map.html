<div id="map-scope">
    <style>
        #map-scope { width: 100%; height: 100%; background: #050508; color: #00ff9d; font-family: 'Share Tech Mono', monospace; display: flex; position: relative; overflow: hidden; }
        #map-scope #tactical-sidebar { width: 300px; background: rgba(10, 10, 14, 0.95); border-right: 1px solid #00ff9d; display: flex; flex-direction: column; z-index: 20; }
        #map-scope .poi-card { background: #161922; border: 1px solid #454d5d; padding: 10px; margin-bottom: 10px; border-left: 3px solid #ff0055; }
        #map-scope #map-viewport { flex-grow: 1; position: relative; cursor: crosshair; background-image: radial-gradient(circle at 1px 1px, rgba(0, 255, 153, 0.08) 1px, transparent 0); background-size: 60px 60px; }
        #map-scope #ship-token { width: 40px; height: 40px; position: absolute; cursor: grab; z-index: 100; filter: drop-shadow(0 0 8px #00ff9d); }
        #map-scope .poi-token { width: 30px; height: 30px; position: absolute; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 50; font-size: 1.5rem; }
    </style>

    <div id="tactical-sidebar">
        <div style="padding: 15px; border-bottom: 1px solid #1a1c23;">
            <div style="font-size: 0.6rem; opacity: 0.5;">CURRENT SECTOR</div>
            <div id="sector-coords" style="color:#00ff9d; margin-bottom:10px;">SEC: [0, 0]</div>
            <div id="poi-name" style="font-size: 1.2rem; color: #ff0055;">NO TARGET</div>
        </div>
        <div id="poi-details" style="padding: 15px; overflow-y: auto; flex-grow: 1; font-size: 0.8rem;">Select POI for analysis.</div>
        <div style="padding: 15px;"><button style="background: #ff0055; color: #fff; border: none; padding: 10px; width: 100%; cursor: pointer;" onclick="generateSector()">SCAN NEW SECTOR</button></div>
    </div>

    <div style="flex-grow: 1; position: relative; display: flex; flex-direction: column;">
        <div style="padding: 10px 20px; background: rgba(10, 10, 14, 0.9); border-bottom: 1px solid #00ff9d; display: flex; justify-content: space-between;">
            <div>NAV-OS // <span id="map-status">READY</span></div>
            <div id="coords-display">LOC: [0, 0]</div>
        </div>
        <div id="map-viewport">
            <div id="ship-token"><svg viewBox="0 0 100 100"><polygon points="50,10 90,90 50,70 10,90" fill="#00ff9d"/></svg></div>
        </div>
    </div>
</div>

<script>
    (function() {
        const scope = document.getElementById('map-scope');
        const ship = scope.querySelector('#ship-token');
        const viewport = scope.querySelector('#map-viewport');
        const gridScale = 60;
        const sectorSize = 10;
        let activeSector = { x: -1, y: -1 };
        let isDragging = false;

        window.initMap = async function() {
            try {
                const stats = await loadStats(window.charId);
                const coords = stats.map_coords ? stats.map_coords.split(',').map(Number) : [0, 0];
                updateMapPosition(coords[0], coords[1], false);
            } catch (e) { scope.querySelector('#map-status').innerText = "LINK ERROR"; }
        };

        window.updateMapPosition = async function(x, y, shouldSave = true) {
            const secX = Math.floor(x / sectorSize);
            const secY = Math.floor(y / sectorSize);
            ship.style.left = ((x % sectorSize) * gridScale + 10) + 'px';
            ship.style.top = ((y % sectorSize) * gridScale + 10) + 'px';
            scope.querySelector('#coords-display').innerText = `LOC: [${x}, ${y}]`;
            scope.querySelector('#sector-coords').innerText = `SEC: [${secX}, ${secY}]`;

            if (secX !== activeSector.x || secY !== activeSector.y) {
                activeSector = { x: secX, y: secY };
                await loadMapSectorData();
            }
            if (shouldSave) saveStat(window.charId, "map_coords", `${x},${y}`);
        };

        window.loadMapSectorData = async function() {
            const stats = await loadStats(window.charId);
            const sectorData = stats[`sector_${activeSector.x}_${activeSector.y}`];
            const pois = sectorData ? JSON.parse(sectorData) : [];
            viewport.querySelectorAll('.poi-token').forEach(e => e.remove());
            pois.forEach(poi => {
                const el = document.createElement('div');
                el.className = 'poi-token';
                el.style.color = poi.type === 'star' ? '#fbbf24' : '#3b82f6';
                el.style.left = (poi.x * gridScale + 15) + 'px';
                el.style.top = (poi.y * gridScale + 15) + 'px';
                el.innerHTML = poi.type === 'star' ? '★' : '●';
                el.onclick = () => {
                    scope.querySelector('#poi-name').innerText = poi.name.toUpperCase();
                    scope.querySelector('#poi-details').innerHTML = `<div class="poi-card">${poi.desc}</div>`;
                };
                viewport.appendChild(el);
            });
        };

        ship.onmousedown = () => isDragging = true;
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = viewport.getBoundingClientRect();
            ship.style.left = (e.clientX - rect.left - 20) + 'px';
            ship.style.top = (e.clientY - rect.top - 20) + 'px';
        });
        window.addEventListener('mouseup', () => {
            if (!isDragging) return;
            isDragging = false;
            const lx = Math.round((parseInt(ship.style.left)-10) / gridScale);
            const ly = Math.round((parseInt(ship.style.top)-10) / gridScale);
            updateMapPosition((activeSector.x * sectorSize) + lx, (activeSector.y * sectorSize) + ly);
        });

        initMap();
    })();
</script>

<style>
    #player-ship { opacity: 0; pointer-events: none; }
    #player-ship.active { opacity: 1; }
    
    .status-overlay {
        position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: rgba(255, 0, 85, 0.2); border: 1px solid #ff0055;
        color: #ff0055; padding: 10px 20px; font-size: 0.7rem; 
        text-transform: uppercase; letter-spacing: 2px; z-index: 100;
        animation: blink 2s infinite;
    }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
</style>

<div id="status-msg" class="status-overlay">Awaiting Entry Vector...</div>

<script>
    let isInitialized = false;

    async function initMap() {
        const stats = await getStats(charId);
        const savedPos = stats.ship_pos;
        
        // Only show the ship if we have real coordinates (not 0,0 or null)
        if (savedPos && savedPos !== "0,0") {
            const [x, y] = savedPos.split(',');
            updateShipUI(x, y);
            document.getElementById('status-msg').style.display = 'none';
            isInitialized = true;
        } else {
            // Ship is hidden, waiting for first click
            document.getElementById('player-ship').classList.remove('active');
            document.getElementById('status-msg').innerText = "Select Sector Entry Point";
        }
        renderRegion();
    }

    async function handleLocationClick(loc) {
        if (!isInitialized) {
            // INITIAL POSITION LOGIC
            isInitialized = true;
            document.getElementById('status-msg').style.display = 'none';
            document.getElementById('player-ship').classList.add('active');
            
            await saveStat(charId, "history_entry", `SYSTEM: Trans-space entry at ${loc.name}`);
        } else {
            // NORMAL TRAVEL LOGIC (This is where the Jump Button will go later)
            const currentPos = (await getStats(charId)).ship_pos;
            if (currentPos === `${loc.x},${loc.y}`) return; // Already here
            
            await saveStat(charId, "history_entry", `NAV: Adjusting course to ${loc.name}`);
        }

        // Move ship and save
        updateShipUI(loc.x, loc.y);
        await saveStat(charId, "ship_pos", `${loc.x},${loc.y}`);
    }

    function updateShipUI(x, y) {
        const ship = document.getElementById('player-ship');
        ship.classList.add('active');
        ship.style.left = x + "%";
        ship.style.top = y + "%";
    }

    // Update your renderRegion function to use the new handler
    function renderRegion() {
        const mapArea = document.getElementById('map-area');
        const list = document.getElementById('manifest-list');
        mapArea.innerHTML = "";
        list.innerHTML = "";

        SECTOR_DATA[currentRegion].forEach(loc => {
            const dot = document.createElement('div');
            dot.className = 'waypoint';
            dot.style.left = loc.x + "%";
            dot.style.top = loc.y + "%";
            // USE THE NEW HANDLER
            dot.onclick = () => handleLocationClick(loc);
            
            dot.innerHTML = `<div class="waypoint-label">${loc.name}</div>`;
            mapArea.appendChild(dot);

            const entry = document.createElement('div');
            entry.className = 'manifest-entry';
            entry.innerHTML = `<strong>${loc.name}</strong><br><small>${loc.type}</small>`;
            entry.onclick = () => handleLocationClick(loc);
            list.appendChild(entry);
        });
    }
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <title>Starforged Nav-Computer</title>
    <style>
        body { overflow: hidden; margin: 0; background: #050508; font-family: 'Courier New', monospace; color: white; }
        #map-canvas { display: block; cursor: crosshair; }
        
        /* UI Overlays */
        .map-overlay { position: absolute; top: 15px; left: 15px; pointer-events: none; z-index: 10; }
        .region-badge { background: var(--accent); color: black; padding: 3px 10px; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; border-radius: 3px; box-shadow: 0 0 10px rgba(var(--accent-rgb), 0.3); }
        .coords { color: rgba(255,255,255,0.4); font-size: 0.6rem; margin-top: 8px; letter-spacing: 1px; }

        /* Controls */
        .map-controls { 
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 10px; z-index: 10; background: rgba(0,0,0,0.85); 
            padding: 12px; border: 1px solid var(--border); border-radius: 8px;
            backdrop-filter: blur(5px); align-items: center;
        }
        
        select, button { 
            background: #111; color: white; border: 1px solid var(--border); 
            padding: 6px 12px; font-size: 0.7rem; cursor: pointer; border-radius: 4px; 
            transition: all 0.2s;
        }
        button:hover { background: var(--accent); color: black; border-color: var(--accent); }
        .btn-archive { border-color: #4ade80; color: #4ade80; }
        .btn-archive:hover { background: #4ade80; color: black; }
        
        /* Legend */
        .legend { 
            position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.7); 
            padding: 12px; border: 1px solid var(--border); font-size: 0.6rem; 
            pointer-events: none; border-radius: 4px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .legend-icon { width: 10px; height: 10px; border-radius: 2px; }

        #sync-indicator { font-size: 0.5rem; opacity: 0.3; margin-top: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="map-overlay">
        <div id="region-display" class="region-badge">Initializing Nav-Core...</div>
        <div id="mouse-coords" class="coords">SCANNING...</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="legend-icon" style="background:#facc15"></div> Settlement (Charted)</div>
        <div class="legend-item"><div class="legend-icon" style="background:#5dade2"></div> Uncharted Waypoint</div>
        <div class="legend-item"><div class="legend-icon" style="border:1.5px solid #4ade80"></div> Active Passage</div>
    </div>

    <canvas id="map-canvas"></canvas>

    <div class="map-controls">
        <div style="display:flex; flex-direction:column; gap:5px;">
            <select id="region-select">
                <option value="terminus">Terminus (3 Passages)</option>
                <option value="outlands" selected>Outlands (2 Passages)</option>
                <option value="expanse">Expanse (1 Passage)</option>
            </select>
            <button onclick="generateSector()">Scan New Sector</button>
        </div>

        <div style="width: 1px; height: 40px; background: var(--border); margin: 0 10px;"></div>

        <div style="display:flex; flex-direction:column; gap:5px;">
            <select id="vault-select" onchange="loadFromArchive(this.value)">
                <option value="">-- Known Sectors --</option>
            </select>
            <button class="btn-archive" onclick="saveToArchive()">Archive Current Map</button>
        </div>
        
        <button onclick="syncMap()" title="Manual Refresh">🔄</button>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        let sectorData = { region: 'outlands', stars: [], paths: [], archiveName: 'Unknown Sector' };
        
        const REGION_RULES = {
            'terminus': { passages: 3, settlements: 5, waypoints: 10 },
            'outlands': { passages: 2, settlements: 3, waypoints: 8 },
            'expanse':  { passages: 1, settlements: 2, waypoints: 6 }
        };

        async function init() {
            const game = new URLSearchParams(window.location.search).get('game') || 'starforged';
            document.body.classList.add(`theme-${game}`);
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', (e) => {
                document.getElementById('mouse-coords').innerText = `REL_X: ${Math.round(e.offsetX)} REL_Y: ${Math.round(e.offsetY)}`;
            });
            
            resize();
            // Start heartbeat to keep synced with other players
            startHeartbeat(syncMap, 45000);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }

        async function syncMap() {
            const data = await loadStats(charId);
            
            // Sync the Archive Dropdown
            if (data.sector_vault) {
                const vault = JSON.parse(data.sector_vault);
                updateVaultUI(vault);
            }

            // Sync Active Map State
            if (data.map_state) {
                sectorData = JSON.parse(data.map_state);
                document.getElementById('region-display').innerText = sectorData.archiveName || sectorData.region;
                draw();
            } else {
                generateSector(); // First time setup
            }
        }

        async function generateSector() {
            const region = document.getElementById('region-select').value;
            const rules = REGION_RULES[region];
            const stars = [];
            const paths = [];

            // Generate Objects
            const total = rules.settlements + rules.waypoints;
            for (let i = 0; i < total; i++) {
                const isSettle = i < rules.settlements;
                stars.push({
                    id: i,
                    name: isSettle ? "SETTLEMENT-" + (i+1) : "WAYPOINT-" + i,
                    x: Math.random() * (canvas.width - 200) + 100,
                    y: Math.random() * (canvas.height - 200) + 100,
                    type: isSettle ? 'settlement' : 'waypoint'
                });
            }

            // Generate Charted Passages
            const settles = stars.filter(s => s.type === 'settlement');
            for (let i = 0; i < rules.passages; i++) {
                if (i < settles.length - 1) {
                    paths.push({ from: settles[i].id, to: settles[i+1].id });
                } else if (settles.length > 0) {
                    paths.push({ 
                        from: settles[0].id, 
                        to: 'edge', 
                        ex: Math.random() > 0.5 ? 0 : canvas.width, 
                        ey: Math.random() * canvas.height 
                    });
                }
            }

            sectorData = { region, stars, paths, archiveName: region.toUpperCase() + "-" + Math.floor(Math.random()*999) };
            await saveStat(charId, "map_state", JSON.stringify(sectorData));
            draw();
        }

        async function saveToArchive() {
            const name = prompt("Name this sector for the archives?", sectorData.archiveName);
            if (!name) return;

            sectorData.archiveName = name;
            const data = await loadStats(charId);
            let vault = JSON.parse(data.sector_vault || "[]");

            // Avoid duplicate names
            vault = vault.filter(s => s.archiveName !== name);
            vault.push(sectorData);

            await saveStat(charId, "sector_vault", JSON.stringify(vault));
            await saveStat(charId, "map_state", JSON.stringify(sectorData)); // Set as active
            syncMap();
        }

        async function loadFromArchive(name) {
            if (!name) return;
            const data = await loadStats(charId);
            const vault = JSON.parse(data.sector_vault || "[]");
            const target = vault.find(s => s.archiveName === name);

            if (target) {
                sectorData = target;
                await saveStat(charId, "map_state", JSON.stringify(sectorData));
                draw();
                document.getElementById('region-display').innerText = sectorData.archiveName;
            }
        }

        function updateVaultUI(vault) {
            const select = document.getElementById('vault-select');
            const currentVal = select.value;
            select.innerHTML = '<option value="">-- Known Sectors --</option>';
            vault.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.archiveName;
                opt.innerText = s.archiveName;
                select.appendChild(opt);
            });
            select.value = currentVal;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw Nav Grid
            ctx.strokeStyle = "rgba(255,255,255,0.03)";
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=100) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

            // Draw Passages
            ctx.setLineDash([]);
            ctx.lineWidth = 2;
            ctx.strokeStyle = "#4ade80";
            sectorData.paths.forEach(p => {
                const s1 = sectorData.stars.find(s => s.id === p.from);
                if (!s1) return;
                ctx.beginPath();
                ctx.moveTo(s1.x, s1.y);
                if (p.to === 'edge') ctx.lineTo(p.ex, p.ey);
                else {
                    const s2 = sectorData.stars.find(s => s.id === p.to);
                    if (s2) ctx.lineTo(s2.x, s2.y);
                }
                ctx.stroke();
            });

            // Draw Stars
            sectorData.stars.forEach(s => {
                const isSettle = s.type === 'settlement';
                
                // Glow effect
                ctx.shadowBlur = 12;
                ctx.shadowColor = isSettle ? "#facc15" : "#5dade2";
                
                ctx.fillStyle = isSettle ? "#facc15" : "#5dade2";
                if (isSettle) {
                    ctx.fillRect(s.x - 6, s.y - 6, 12, 12);
                } else {
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = "rgba(255,255,255,0.8)";
                ctx.font = "bold 9px 'Courier New'";
                ctx.fillText(s.name, s.x + 15, s.y + 4);
            });
        }

        init();
    </script>
</body>
</html>

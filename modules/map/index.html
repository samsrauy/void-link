<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; overflow: hidden; margin: 0; }
        #navigation-deck { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle, #0a0a1a 0%, #000 100%); }
        
        /* The Ship Icon */
        #player-ship { 
            position: absolute; width: 24px; height: 24px; 
            border: 2px solid #ff0055; border-radius: 50%; 
            transform: translate(-50%, -50%); /* Center on coordinates */
            transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0; z-index: 20; 
            box-shadow: 0 0 15px #ff0055;
        }
        #player-ship.active { opacity: 1; }

        /* Waypoints */
        .waypoint { 
            position: absolute; width: 10px; height: 10px; 
            background: #00ff9d; border-radius: 50%; 
            cursor: pointer; z-index: 10; 
            box-shadow: 0 0 8px #00ff9d;
        }
        .waypoint-label { 
            position: absolute; top: 15px; left: 50%; 
            transform: translateX(-50%); font-size: 0.6rem; 
            white-space: nowrap; text-transform: uppercase; opacity: 0.7;
        }

        .status-overlay { 
            position: absolute; bottom: 20px; left: 50%; 
            transform: translateX(-50%); background: rgba(0,0,0,0.8); 
            border: 1px solid #00ff9d; color: #00ff9d; 
            padding: 8px 15px; font-size: 0.7rem; letter-spacing: 1px;
        }
    </style>
</head>
<body class="theme-starforged">
    <div id="navigation-deck">
        <div id="map-area"></div>
        <div id="player-ship"></div>
        <div id="status-msg" class="status-overlay">Establishing Neural Link...</div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        // Sector Data
        const SECTOR_LOCS = [
            { name: "Ironholde", x: 25, y: 40 },
            { name: "Vanguard Station", x: 60, y: 20 },
            { name: "The Shattered Reach", x: 80, y: 70 },
            { name: "Deep Settlement 9", x: 15, y: 85 }
        ];

        let isInitialized = false;

        async function initMap() {
            // Neural Link Guard: Wait for sync.js discovery [cite: 14]
            if (!GAS_URL) {
                setTimeout(initMap, 1000);
                return;
            }

            const stats = await loadStats(charId);
            
            if (stats && stats.ship_pos) {
                const [x, y] = stats.ship_pos.split(',');
                updateShipUI(x, y);
                document.getElementById('status-msg').style.display = 'none';
                isInitialized = true;
            } else {
                document.getElementById('status-msg').innerText = "AWAITING ENTRY VECTOR";
            }
            
            renderWaypoints();
        }

        function renderWaypoints() {
            const area = document.getElementById('map-area');
            area.innerHTML = ""; 
            SECTOR_LOCS.forEach(loc => {
                const dot = document.createElement('div');
                dot.className = 'waypoint';
                dot.style.left = loc.x + "%"; 
                dot.style.top = loc.y + "%";
                dot.onclick = () => handleMove(loc);
                dot.innerHTML = `<div class="waypoint-label">${loc.name}</div>`;
                area.appendChild(dot);
            });
        }

        async function handleMove(loc) {
            updateShipUI(loc.x, loc.y);
            document.getElementById('status-msg').style.display = 'none';
            
            // Save coordinates to the 'ship_pos' column [cite: 17]
            await saveStat(charId, "ship_pos", `${loc.x},${loc.y}`);
            
            // Log move to unified history via Code.gs [cite: 27]
            const logMsg = isInitialized ? `NAV: Relocated to ${loc.name}` : `NAV: Initial jump to ${loc.name}`;
            await saveStat(charId, "history_entry", logMsg);
            
            isInitialized = true;
        }

        function updateShipUI(x, y) {
            const ship = document.getElementById('player-ship');
            ship.classList.add('active');
            ship.style.left = x + "%";
            ship.style.top = y + "%";
        }

        initMap();
    </script>
</body>
</html>

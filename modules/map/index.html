<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; overflow: hidden; margin: 0; }
        #navigation-deck { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%); }
        
        /* Scanline effect for flavor */
        #navigation-deck::after { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06)); z-index: 2; background-size: 100% 2px, 3px 100%; pointer-events: none; }

        /* The Ship Icon */
        #player-ship { 
            position: absolute; width: 30px; height: 30px; 
            border: 2px solid #ff0055; border-radius: 50%; 
            transform: translate(-50%, -50%); 
            transition: all 2.5s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0; z-index: 20; 
            box-shadow: 0 0 20px #ff0055, inset 0 0 10px #ff0055;
        }
        #player-ship::before { content: '▲'; position: absolute; top: -15px; left: 7px; font-size: 10px; color: #ff0055; }
        #player-ship.active { opacity: 1; }

        /* Waypoints */
        .waypoint { 
            position: absolute; width: 12px; height: 12px; 
            background: #00ff9d; border-radius: 50%; 
            cursor: pointer; z-index: 10; 
            box-shadow: 0 0 10px #00ff9d;
            transition: 0.3s;
        }
        .waypoint:hover { transform: scale(1.5); box-shadow: 0 0 20px #00ff9d; }
        .waypoint-label { 
            position: absolute; top: 18px; left: 50%; 
            transform: translateX(-50%); font-size: 0.65rem; 
            white-space: nowrap; text-transform: uppercase; opacity: 0.7;
            letter-spacing: 1px; pointer-events: none;
        }

        .status-overlay { 
            position: absolute; bottom: 30px; left: 30px; 
            background: rgba(0,0,0,0.85); 
            border: 1px solid #454d5d; color: #bcdee7; 
            padding: 12px; font-size: 0.7rem; width: 250px;
            border-left: 3px solid #00ff9d; z-index: 30;
        }
        .status-title { color: #00ff9d; font-weight: bold; display: block; margin-bottom: 5px; letter-spacing: 2px; }
    </style>
</head>
<body class="theme-starforged">
    <div id="navigation-deck">
        <div id="map-area"></div>
        <div id="player-ship"></div>
        
        <div id="status-display" class="status-overlay">
            <span class="status-title">SYSTEM STATUS</span>
            <div id="status-msg">Establishing Neural Link to Nav-Computer...</div>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script src="../../js/datasworn.js"></script>
    <script>
        const SECTOR_LOCS = [
            { name: "Ironholde", x: 25, y: 40, type: "Settlement" },
            { name: "Vanguard Station", x: 60, y: 20, type: "Outpost" },
            { name: "The Shattered Reach", x: 80, y: 70, type: "Anomaly" },
            { name: "Deep Settlement 9", x: 15, y: 85, type: "Settlement" }
        ];

        let isInitialized = false;

        async function initMap() {
            // THE DUAL GUARD: Wait for sync engine AND datasworn assets
            const isSyncReady = (typeof GAS_URL !== 'undefined' && typeof loadStats === 'function');
            const isDataReady = (typeof datasworn !== 'undefined' && datasworn !== null);

            if (!isSyncReady || !isDataReady) {
                console.log("NAV: Synchronizing with ship's core...");
                setTimeout(initMap, 500);
                return;
            }

            const stats = await loadStats(charId);
            
            if (stats && stats.ship_pos) {
                const [x, y] = stats.ship_pos.split(',');
                updateShipUI(x, y);
                updateStatus("STABLE ORBIT", "Sensors active. Navigation deck online.");
                isInitialized = true;
            } else {
                updateStatus("DRIFTING", "Awaiting entry vector. Select a waypoint to initiate jump.");
            }
            
            renderWaypoints();
        }

        function updateStatus(title, msg) {
            const container = document.getElementById('status-display');
            container.querySelector('.status-title').innerText = title;
            document.getElementById('status-msg').innerText = msg;
        }

        function renderWaypoints() {
            const area = document.getElementById('map-area');
            area.innerHTML = ""; 
            SECTOR_LOCS.forEach(loc => {
                const dot = document.createElement('div');
                dot.className = 'waypoint';
                dot.style.left = loc.x + "%"; 
                dot.style.top = loc.y + "%";
                dot.onclick = () => handleJump(loc);
                dot.innerHTML = `<div class="waypoint-label">${loc.name}</div>`;
                area.appendChild(dot);
            });
        }

        async function handleJump(loc) {
            updateStatus("JUMP INITIALIZED", `Calculating vector to ${loc.name}...`);
            updateShipUI(loc.x, loc.y);
            
            // 1. Synchronize Coordinates
            await saveStat(charId, "ship_pos", `${loc.x},${loc.y}`);
            
            // 2. Log to Unified History
            const logEntry = isInitialized ? `NAV: Jump successful to ${loc.name}` : `NAV: Initial vector established at ${loc.name}`;
            await saveStat(charId, "history_entry", logEntry);
            
            // 3. Optional: Trigger a Neural Roll (Face Danger/Undertake a Journey)
            // if(confirm("Roll Undertake a Journey?")) {
            //    await triggerNeuralRoll("Undertake a Journey", 2, 0); // Assuming Wits +2
            // }

            setTimeout(() => {
                updateStatus("STABLE ORBIT", `Location: ${loc.name}. Scanners detecting ${loc.type}.`);
            }, 2500);

            isInitialized = true;
        }

        function updateShipUI(x, y) {
            const ship = document.getElementById('player-ship');
            ship.classList.add('active');
            ship.style.left = x + "%";
            ship.style.top = y + "%";
        }

        initMap();
    </script>
</body>
</html>

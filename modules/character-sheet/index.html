<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; padding: 20px; overflow-y: auto; }
        .section-title { font-size: 0.7rem; letter-spacing: 3px; color: #454d5d; border-bottom: 1px solid #1a1c23; padding-bottom: 5px; margin: 20px 0 10px 0; text-transform: uppercase; }
        
        /* Stats Table */
        .stat-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-btn { background: #161922; border: 1px solid #454d5d; padding: 10px; text-align: center; cursor: pointer; border-radius: 4px; }
        .stat-btn:hover { border-color: #00ff9d; background: rgba(0,255,153,0.05); }
        .stat-val { display: block; font-size: 1.8rem; font-weight: bold; color: #bcdee7; }
        .stat-label { font-size: 0.6rem; text-transform: uppercase; opacity: 0.6; }

        /* Resource Tracks */
        .track-row { display: flex; align-items: center; justify-content: space-between; background: #161922; padding: 8px 15px; margin-bottom: 5px; border-radius: 4px; }
        .track-label { font-size: 0.8rem; font-weight: bold; width: 80px; }
        .track-dots { display: flex; gap: 4px; }
        .dot { width: 14px; height: 14px; border: 1px solid #454d5d; cursor: pointer; }
        .dot.active { background: #00ff9d; box-shadow: 0 0 5px #00ff9d; border-color: #00ff9d; }
        
        #roll-overlay { background: #000; border: 1px solid #00ff9d; padding: 15px; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <div id="char-display" style="font-size: 1.2rem; letter-spacing: 5px; margin-bottom: 20px;">LINKING...</div>

    <div class="stat-grid">
        <div class="stat-btn" onclick="triggerRoll('Edge')"><span class="stat-label">Edge</span><span id="v-edge" class="stat-val">2</span></div>
        <div class="stat-btn" onclick="triggerRoll('Heart')"><span class="stat-label">Heart</span><span id="v-heart" class="stat-val">2</span></div>
        <div class="stat-btn" onclick="triggerRoll('Iron')"><span class="stat-label">Iron</span><span id="v-iron" class="stat-val">2</span></div>
        <div class="stat-btn" onclick="triggerRoll('Shadow')"><span class="stat-label">Shadow</span><span id="v-shadow" class="stat-val">2</span></div>
        <div class="stat-btn" onclick="triggerRoll('Wits')"><span class="stat-label">Wits</span><span id="v-wits" class="stat-val">2</span></div>
    </div>

    <div class="section-title">Condition Tracks</div>
    <div id="tracks-container">
        </div>

    <div class="section-title">Momentum</div>
    <div id="momentum-container" class="track-row" style="background: #000; border: 1px solid #454d5d;">
        </div>

    <div id="roll-overlay">
        <div id="roll-res" style="font-size: 1.2rem; font-weight: bold;">RESULT</div>
        <div id="roll-details" style="font-family: monospace; opacity: 0.7; margin-top: 5px;">Dice details...</div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        let charData = {};

        async function init() {
            const data = await loadStats(charId);
            if (!data) return;
            charData = data;
            document.getElementById('char-display').innerText = charId.toUpperCase();
            
            ['edge','heart','iron','shadow','wits'].forEach(s => document.getElementById(`v-${s}`).innerText = data[s]);

            renderResource('health', 0, 5, data.health);
            renderResource('spirit', 0, 5, data.spirit);
            renderResource('supply', 0, 5, data.supply);
            renderResource('momentum', -6, 10, data.momentum);
        }

        function renderResource(name, min, max, current) {
            const container = (name === 'momentum') ? document.getElementById('momentum-container') : document.createElement('div');
            if(name !== 'momentum') {
                container.className = 'track-row';
                document.getElementById('tracks-container').appendChild(container);
            }
            
            container.innerHTML = `<span class="track-label">${name.toUpperCase()}</span><div class="track-dots"></div>`;
            const dotBox = container.querySelector('.track-dots');

            for (let i = min; i <= max; i++) {
                const dot = document.createElement('div');
                dot.className = `dot ${i <= current ? 'active' : ''}`;
                dot.onclick = async () => {
                    charData[name] = i;
                    await saveStat(charId, name, i);
                    location.reload(); // Refresh to update visuals
                };
                dotBox.appendChild(dot);
            }
        }

        function triggerRoll(stat) {
            const val = parseInt(charData[stat.toLowerCase()]);
            const roll = rollDice(val);
            const overlay = document.getElementById('roll-overlay');
            overlay.style.display = 'block';
            document.getElementById('roll-res').innerText = roll.result;
            document.getElementById('roll-res').style.color = roll.result.includes("MISS") ? "#ff0055" : "#00ff9d";
            document.getElementById('roll-details').innerText = `${stat} Roll: ${roll.details}`;
            
            saveStat(charId, "history_entry", `${stat} Roll: ${roll.result}`);
        }

        init();
    </script>
</body>
</html>

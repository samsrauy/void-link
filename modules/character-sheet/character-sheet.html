<div id="sheet-container">
    <style>
        /* BASE SHEET STYLES */
        #sheet-container { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; padding: 15px; box-sizing: border-box; position: relative; overflow-x: hidden; min-height: 100vh; }
        .section-title { font-size: 0.7rem; letter-spacing: 3px; color: #454d5d; border-bottom: 1px solid #1a1c23; padding-bottom: 5px; margin: 20px 0 10px 0; text-transform: uppercase; }
        
        /* INPUT STYLING */
        .term-input { background: #0b0d12; border: 1px solid #454d5d; color: #fff; padding: 8px; font-family: 'Share Tech Mono'; width: 100%; box-sizing: border-box; outline: none; transition: 0.2s; text-align: center; }
        .term-input:focus { border-color: #00ff9d; }
        .term-input::placeholder { color: #454d5d; }

        /* STATS GRID */
        .stat-grid { display: flex; justify-content: space-between; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; }
        .stat-box { flex: 1; min-width: 50px; background: #161922; border: 1px solid #454d5d; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .stat-label { font-size: 0.6rem; color: #454d5d; margin-bottom: 5px; letter-spacing: 1px; }
        
        /* ROLL OVERLAY */
        #roll-overlay { display: none; margin-top: 15px; background: #161922; border: 1px solid #00ff9d; padding: 15px; text-align: center; }
        #roll-res { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        #roll-details { font-size: 0.8rem; color: #bcdee7; }
    </style>

    <div class="section-title">CORE STATS</div>
    <div class="stat-grid">
        <div class="stat-box">
            <div class="stat-label">EDGE</div>
            <input type="number" id="stat-edge" class="term-input" value="1" onchange="updateStat('edge', this.value)">
        </div>
        <div class="stat-box">
            <div class="stat-label">HEART</div>
            <input type="number" id="stat-heart" class="term-input" value="1" onchange="updateStat('heart', this.value)">
        </div>
        <div class="stat-box">
            <div class="stat-label">IRON</div>
            <input type="number" id="stat-iron" class="term-input" value="1" onchange="updateStat('iron', this.value)">
        </div>
        <div class="stat-box">
            <div class="stat-label">SHADOW</div>
            <input type="number" id="stat-shadow" class="term-input" value="1" onchange="updateStat('shadow', this.value)">
        </div>
        <div class="stat-box">
            <div class="stat-label">WITS</div>
            <input type="number" id="stat-wits" class="term-input" value="1" onchange="updateStat('wits', this.value)">
        </div>
    </div>

    <div class="section-title">CONDITION METERS</div>
    <div class="stat-grid">
        <div class="stat-box">
            <div class="stat-label">HEALTH</div>
            <input type="number" id="meter-health" class="term-input" value="5" min="0" max="5" onchange="updateStat('health', this.value)">
        </div>
        <div class="stat-box">
            <div class="stat-label">SPIRIT</div>
            <input type="number" id="meter-spirit" class="term-input" value="5" min="0" max="5" onchange="updateStat('spirit', this.value)">
        </div>
        <div class="stat-box">
            <div class="stat-label">SUPPLY</div>
            <input type="number" id="meter-supply" class="term-input" value="5" min="0" max="5" onchange="updateStat('supply', this.value)">
        </div>
    </div>

    <div class="section-title">MOMENTUM STATUS</div>
    <div class="stat-grid" id="momentum-grid">
        <div class="stat-box" style="flex: 2; border-color: #00ff9d;">
            <div class="stat-label" style="color: #00ff9d;">CURRENT MOMENTUM</div>
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px 0;">
                <button onclick="changeMomentum(-1)" class="term-input" style="width: 40px; cursor: pointer; font-size: 1.2rem;">-</button>
                <span id="mom-current" style="font-size: 2rem; color: #00ff9d; font-weight: bold;">2</span>
                <button onclick="changeMomentum(1)" class="term-input" style="width: 40px; cursor: pointer; font-size: 1.2rem;">+</button>
            </div>
            <button onclick="executeBurnMomentum()" class="term-input" style="background: rgba(255, 0, 85, 0.1); border-color: #ff0055; color: #ff0055; cursor: pointer; font-weight: bold; margin-top: 5px;">
                BURN MOMENTUM
            </button>
        </div>

        <div style="flex: 3; display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
            <div class="stat-box">
                <div class="stat-label">IMPACTS</div>
                <input type="number" id="mom-impacts" class="term-input" value="0" min="0" onchange="updateMomImpacts(this.value)">
            </div>
            <div class="stat-box" style="opacity: 0.5; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #454d5d; border-style: dashed;">
                SYSTEM ALIGNED
            </div>
            <div class="stat-box">
                <div class="stat-label">RESET (OVR)</div>
                <input type="number" id="mom-reset-ovr" class="term-input" placeholder="Auto" onchange="updateMomOverride('reset', this.value)">
            </div>
            <div class="stat-box">
                <div class="stat-label">MAX (OVR)</div>
                <input type="number" id="mom-max-ovr" class="term-input" placeholder="Auto" onchange="updateMomOverride('max', this.value)">
            </div>
        </div>
    </div>

    <div class="section-title">NEURAL UPLINK (ROLL)</div>
    <div class="stat-grid">
        <div class="stat-box" style="flex: 2;">
            <div class="stat-label">STAT/MODIFIER VALUE</div>
            <input type="number" id="dice-modifier" class="term-input" value="0" style="font-size: 1.5rem;">
        </div>
        <div class="stat-box" style="flex: 1; justify-content: center;">
            <button onclick="executeActionRoll()" class="term-input" style="height: 100%; font-weight: bold; background: #00ff9d; color: #000; cursor: pointer;">
                EXECUTE ACTION
            </button>
        </div>
        <div class="stat-box" style="flex: 1; justify-content: center;">
            <button onclick="executeD100Roll()" class="term-input" style="height: 100%; cursor: pointer;">
                D100 ORACLE
            </button>
        </div>
    </div>

    <div id="roll-overlay">
        <div id="roll-res">STANDBY</div>
        <div id="roll-details">Awaiting input...</div>
    </div>

</div>

<script>
    (async function() {
        // --- 1. DATA INITIALIZATION ---
        const savedData = window.charData || {};

        // Hydrate Basic Stats
        const statFields = ['edge', 'heart', 'iron', 'shadow', 'wits'];
        statFields.forEach(stat => {
            if (savedData[stat]) document.getElementById(`stat-${stat}`).value = savedData[stat];
        });

        // Hydrate Meters
        const meterFields = ['health', 'spirit', 'supply'];
        meterFields.forEach(meter => {
            if (savedData[meter]) document.getElementById(`meter-${meter}`).value = savedData[meter];
        });

        // --- 2. STANDARD STAT SYNC ---
        window.updateStat = async function(field, value) {
            if (window.gLink) {
                await window.gLink.saveStatServer(window.charId, field, value);
            }
        };

        // --- 3. MOMENTUM STATE MANAGER ---
        window.momState = {
            current: savedData.momentum !== undefined ? parseInt(savedData.momentum) : 2,
            impacts: savedData.impacts !== undefined ? parseInt(savedData.impacts) : 0,
            resetOver: (savedData.mom_reset_ovr !== "" && savedData.mom_reset_ovr !== undefined) ? parseInt(savedData.mom_reset_ovr) : null,
            maxOver: (savedData.mom_max_ovr !== "" && savedData.mom_max_ovr !== undefined) ? parseInt(savedData.mom_max_ovr) : null
        };

        window.getMomMax = () => {
            if (window.momState.maxOver !== null) return window.momState.maxOver;
            return Math.max(10 - window.momState.impacts, 0);
        };

        window.getMomReset = () => {
            if (window.momState.resetOver !== null) return window.momState.resetOver;
            if (window.momState.impacts === 0) return 2;
            if (window.momState.impacts === 1) return 1;
            return 0;
        };

        window.renderMomentum = () => {
            document.getElementById('mom-current').innerText = window.momState.current;
            document.getElementById('mom-impacts').value = window.momState.impacts;
            
            const resetInput = document.getElementById('mom-reset-ovr');
            resetInput.value = window.momState.resetOver !== null ? window.momState.resetOver : '';
            resetInput.placeholder = `Auto (${window.getMomReset()})`;

            const maxInput = document.getElementById('mom-max-ovr');
            maxInput.value = window.momState.maxOver !== null ? window.momState.maxOver : '';
            maxInput.placeholder = `Auto (${window.getMomMax()})`;
        };

        window.changeMomentum = async (delta) => {
            let newVal = window.momState.current + delta;
            let max = window.getMomMax();
            if (newVal > max) newVal = max;
            if (newVal < -6) {
                newVal = -6;
                alert("CRITICAL WARNING: Momentum at -6. You must apply this cost to Health, Spirit, or Supply instead.");
            }
            window.momState.current = newVal;
            window.renderMomentum();
            await window.updateStat('momentum', newVal);
        };

        window.executeBurnMomentum = async () => {
            if (window.momState.current <= 0) {
                alert("DENIED: You must have positive momentum to burn it.");
                return;
            }
            let burnedValue = window.momState.current;
            let resetValue = window.getMomReset();
            window.momState.current = resetValue;
            window.renderMomentum();
            await window.updateStat('momentum', resetValue);
            
            if (window.gLink && typeof window.gLink.logServer === 'function') {
                await window.gLink.logServer(window.charId, `[BURNED MOMENTUM] Replaced action score with +${burnedValue}. Resetting meter to +${resetValue}.`);
            }
            alert(`Momentum Burned! Action score acts as +${burnedValue}. Momentum reset to +${resetValue}.`);
        };

        window.updateMomImpacts = async (val) => {
            let impacts = parseInt(val) || 0;
            window.momState.impacts = impacts;
            let max = window.getMomMax();
            if (window.momState.current > max) {
                window.momState.current = max;
                await window.updateStat('momentum', max);
            }
            window.renderMomentum();
            await window.updateStat('impacts', impacts);
        };

        window.updateMomOverride = async (type, val) => {
            let parsed = val === '' ? null : parseInt(val);
            if (type === 'reset') {
                window.momState.resetOver = parsed;
                await window.updateStat('mom_reset_ovr', parsed !== null ? parsed : "");
            } else {
                window.momState.maxOver = parsed;
                let max = window.getMomMax();
                if (window.momState.current > max) {
                    window.momState.current = max;
                    await window.updateStat('momentum', max);
                }
                await window.updateStat('mom_max_ovr', parsed !== null ? parsed : "");
            }
            window.renderMomentum();
        };

        // --- 4. DICE LOGIC ---
        window.tempNeuralRoll = async function(statValue) {
            let actionDie = Math.floor(Math.random() * 6) + 1;
            let d1 = Math.floor(Math.random() * 10) + 1;
            let d2 = Math.floor(Math.random() * 10) + 1;

            if (window.momState.current < 0 && actionDie === Math.abs(window.momState.current)) {
                actionDie = 0;
                if (window.gLink && typeof window.gLink.logServer === 'function') {
                    window.gLink.logServer(window.charId, `[SYSTEM ALERT] Negative Momentum triggered. Action die canceled.`);
                }
            }

            let score = actionDie + statValue;
            let result = "MISS";
            if (score > d1 && score > d2) result = "STRONG HIT";
            else if (score > d1 || score > d2) result = "WEAK HIT";
            if (d1 === d2) result = "MATCH: " + result;

            return { s: score, d1: d1, d2: d2, result: result, actionDie: actionDie };
        };

        window.executeActionRoll = async function() {
            const mod = parseInt(document.getElementById('dice-modifier').value) || 0;
            const overlay = document.getElementById('roll-overlay');
            const resText = document.getElementById('roll-res');
            const detailsText = document.getElementById('roll-details');
            
            overlay.style.display = 'block'; 
            resText.innerText = "CALCULATING...";
            
            try { 
                const r = await tempNeuralRoll(mod); 
                resText.innerText = r.result; 
                resText.style.color = r.result.includes("MISS") ? "#ff0055" : (r.result.includes("STRONG") ? "#00ff9d" : "#3b82f6"); 
                
                let details = `Action: ${r.s} vs Challenge(${r.d1}, ${r.d2})`;
                if (r.actionDie === 0) details += " [DIE CANCELED BY NEG MOMENTUM]";
                detailsText.innerText = details;

                if (window.gLink && typeof window.gLink.logServer === 'function') {
                    await window.gLink.logServer(window.charId, `[ROLL] Action: +${mod} | Result: ${r.result} | (${r.actionDie}+${mod}=${r.s}) vs [${r.d1}, ${r.d2}]`);
                }
            } catch(e) {
                console.error(e);
                resText.innerText = "ERROR";
            }
        };

        window.executeD100Roll = async function() {
            const overlay = document.getElementById('roll-overlay');
            const resText = document.getElementById('roll-res');
            
            overlay.style.display = 'block'; 
            const roll = Math.floor(Math.random()*100)+1;
            resText.innerText = `ROLLED: ${roll}`; 
            resText.style.color = "#bcdee7";
            document.getElementById('roll-details').innerText = "D100 Oracle";
            
            if (window.gLink && typeof window.gLink.logServer === 'function') {
                await window.gLink.logServer(window.charId, `[ORACLE ROLL] D100: ${roll}`);
            }
        };

        // Render initial UI state
        window.renderMomentum();
    })();
</script>

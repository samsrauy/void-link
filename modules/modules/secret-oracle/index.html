<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #050508; color: #00ff9d; font-family: 'Share Tech Mono', monospace; padding: 20px; overflow: hidden; }
        .terminal { border: 1px solid #00ff9d; height: 90vh; display: flex; flex-direction: column; background: rgba(0, 255, 153, 0.03); box-shadow: inset 0 0 20px rgba(0, 255, 153, 0.1); }
        
        #output { flex-grow: 1; padding: 20px; overflow-y: auto; font-size: 0.9rem; line-height: 1.6; text-shadow: 0 0 5px rgba(0, 255, 153, 0.5); }
        .input-area { display: flex; border-top: 1px solid #00ff9d; background: #000; }
        
        input { flex-grow: 1; background: transparent; border: none; color: #00ff9d; padding: 15px; font-family: 'Share Tech Mono', monospace; outline: none; }
        button { background: #00ff9d; color: #000; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #00442a; color: #00ff9d; cursor: wait; }

        .ai-msg { margin-bottom: 15px; color: #bcdee7; border-left: 2px solid #bcdee7; padding-left: 10px; }
        .user-msg { margin-bottom: 15px; opacity: 0.6; }
        .system-msg { color: #ff0055; margin-bottom: 15px; font-size: 0.7rem; letter-spacing: 2px; }
    </style>
</head>
<body class="theme-starforged">

    <div class="terminal">
        <div id="output">
            <div class="system-msg">>> NEURAL LINK ESTABLISHED...</div>
            <div class="system-msg">>> STANDING BY FOR SUBSPACE QUERY...</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ask the Void..." onkeypress="if(event.key === 'Enter') askOracle()">
            <button id="send-btn" onclick="askOracle()">Query</button>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        const output = document.getElementById('output');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');

        async function askOracle() {
            const prompt = input.value.trim();
            
            // Neural Link Guard
            if (!GAS_URL) {
                appendMsg("LINK ERROR: Handshake not yet complete.", 'system-msg');
                return;
            }
            if (!prompt) return;

            // UI Feedback
            input.value = "";
            btn.disabled = true;
            appendMsg(prompt, 'user-msg');
            const loadingId = appendMsg("COMMUNICATION IN PROGRESS...", 'system-msg');

            try {
                // Queries the Gemini-powered oracle in Code.gs [cite: 15, 38]
                const response = await fetch(`${GAS_URL}?oracle=${encodeURIComponent(prompt)}`);
                const text = await response.text();
                
                // Remove loading message
                const loader = document.getElementById(loadingId);
                if(loader) loader.remove();
                
                // Display AI response
                appendMsg(text, 'ai-msg');
                
                // Log the interaction to the History Log via Thin-Sync 
                await saveStat(charId, "history_entry", `ORACLE QUERY: ${prompt}`);

            } catch (e) {
                appendMsg("SIGNAL LOST: UNABLE TO REACH CORES.", 'system-msg');
                console.error(e);
            } finally {
                btn.disabled = false;
                output.scrollTop = output.scrollHeight;
            }
        }

        function appendMsg(text, className) {
            const id = "msg-" + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = className;
            div.innerText = (className === 'user-msg' ? "> " : "") + text;
            output.appendChild(div);
            output.scrollTop = output.scrollHeight;
            return id;
        }
    </script>
</body>
</html>

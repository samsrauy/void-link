<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #050508; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 10px; overflow-x: hidden; }
        
        /* Navigation Tabs */
        .tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 10px; position: sticky; top: 0; background: #050508; z-index: 5; flex-wrap: wrap; }
        .tab { padding: 8px 12px; cursor: pointer; font-size: 0.65rem; border: 1px solid transparent; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .tab.active { border: 1px solid #333; border-bottom: 1px solid #050508; opacity: 1; color: var(--accent); font-weight: bold; }
        
        /* Layout Panels */
        .panel { display: none; padding-bottom: 40px; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* UI Elements */
        select, button { background: #111; border: 1px solid #444; color: white; padding: 8px; width: 100%; margin-bottom: 8px; font-size: 0.75rem; border-radius: 4px; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        button:hover { background: var(--accent); color: black; border-color: var(--accent); }

        /* Display Cards */
        .output-card { background: rgba(255,255,255,0.03); padding: 12px; border-left: 2px solid var(--accent); margin-top: 10px; font-size: 0.85rem; line-height: 1.5; border-radius: 0 4px 4px 0; }
        .sync-btn { border: 1px solid #444; color: #888; background: none; margin-top: 10px; font-size: 0.6rem; padding: 4px; width: auto; float: right; }
        .npc-name { font-size: 1.1rem; color: var(--accent); margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 5px; text-transform: uppercase; }
        
        .truth-item { margin-bottom: 15px; padding: 10px; border: 1px solid #222; background: #00000044; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="showPanel('moves')">Moves</div>
        <div class="tab" onclick="showPanel('oracles')">Oracles</div>
        <div class="tab" onclick="showPanel('npcs')">NPCs</div>
        <div class="tab" onclick="showPanel('truths')">Truths</div>
        <div class="tab" onclick="showPanel('initiate')">INIT</div>
    </div>

    <div id="moves" class="panel active">
        <select id="move-cat" onchange="loadMoves()"></select>
        <select id="move-list" onchange="displayMove()"></select>
        <div id="move-display"></div>
    </div>

    <div id="oracles" class="panel">
        <select id="ora-cat" onchange="loadOracleTables()"></select>
        <select id="ora-list"></select>
        <button onclick="rollOracle()">ROLL d100</button>
        <div id="ora-display"></div>
    </div>

    <div id="npcs" class="panel">
        <button onclick="generateNPC()">GENERATE CONTACT/FOE</button>
        <div id="npc-display" class="output-card">Awaiting lifesign scan...</div>
    </div>

    <div id="truths" class="panel">
       <div id="truth-list"></div>
    </div>

    <div id="initiate" class="panel">
        <div style="font-size:0.65rem; opacity:0.6; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px; color:var(--accent);">NEURAL LINK INITIALIZATION</div>
        
        <button onclick="rollCreation('background')">ROLL BACKGROUND</button>
        <div id="create-bg" class="output-card" style="font-size:0.75rem; margin-bottom:10px;">Awaiting background data...</div>
        
        <button onclick="rollCreation('starship')">ROLL STARSHIP NAME</button>
        <div id="create-ship" class="output-card" style="font-size:0.75rem; margin-bottom:10px;">Awaiting hull identification...</div>

        <button style="background:var(--accent); color:black; margin-top:15px; height: 50px;" onclick="finalizeCharacter()">INITIALIZE CHARACTER ROW</button>
        <div id="init-status" style="font-size:0.7rem; color:var(--accent); margin-top:15px; text-align:center; font-weight: bold;"></div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        let datasworn = null;
        const DATA_URL = "https://raw.githubusercontent.com/rsek/datasworn/main/bundles/starforged.json";

        async function init() {
            try {
                const res = await fetch(DATA_URL);
                datasworn = await res.json();
                
                // Populate Moves
                const moveCat = document.getElementById('move-cat');
                Object.keys(datasworn.moves).forEach(k => moveCat.add(new Option(datasworn.moves[k].name, k)));
                loadMoves();

                // Populate Oracle Categories
                const oraCat = document.getElementById('ora-cat');
                Object.keys(datasworn.oracles).forEach(k => oraCat.add(new Option(datasworn.oracles[k].name, k)));
                loadOracleTables();
                
                renderTruths();
            } catch (e) {
                console.error("Failed to load Datasworn:", e);
            }
        }

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(id).classList.add('active');
            
            // Highlight the correct tab based on the onclick attribute
            const clickedTab = Array.from(document.querySelectorAll('.tab')).find(t => t.getAttribute('onclick').includes(id));
            if (clickedTab) clickedTab.classList.add('active');
        }
        
        /* --- MOVES LOGIC --- */
        function loadMoves() {
            const cat = document.getElementById('move-cat').value;
            const list = document.getElementById('move-list');
            list.innerHTML = "";
            Object.keys(datasworn.moves[cat].contents).forEach(k => list.add(new Option(datasworn.moves[cat].contents[k].name, k)));
            displayMove();
        }
        function displayMove() {
            const cat = document.getElementById('move-cat').value;
            const key = document.getElementById('move-list').value;
            const move = datasworn.moves[cat].contents[key];
            document.getElementById('move-display').innerHTML = `<div class="output-card">${move.text.replace(/\n/g, '<br>')}</div>`;
        }

        /* --- ORACLE LOGIC --- */
        function loadOracleTables() {
            const cat = document.getElementById('ora-cat').value;
            const list = document.getElementById('ora-list');
            list.innerHTML = "";
            const contents = datasworn.oracles[cat].contents || {};
            Object.keys(contents).forEach(k => list.add(new Option(contents[k].name, k)));
        }
        function rollOracle() {
            const cat = document.getElementById('ora-cat').value;
            const key = document.getElementById('ora-list').value;
            const table = datasworn.oracles[cat].contents[key];
            const roll = Math.floor(Math.random() * 100) + 1;
            const row = table.rows.find(r => roll >= r.floor && roll <= r.ceiling);
            document.getElementById('ora-display').innerHTML = `
                <div class="output-card">
                    <div style="color:var(--accent); font-weight:bold;">${row.text}</div>
                    <div style="font-size:0.6rem; opacity:0.5; margin-top:5px;">Rolled: ${roll} on ${table.name}</div>
                    <button class="sync-btn" onclick="logToHistory('ORACLE: ${table.name} -> ${row.text}')">LOG RESULT</button>
                    <div style="clear:both;"></div>
                </div>`;
        }

        /* --- NPC LOGIC --- */
        function generateNPC() {
            const roll = (c, t) => {
                const tab = datasworn.oracles[c].contents[t];
                const r = Math.floor(Math.random() * 100) + 1;
                return tab.rows.find(row => r >= row.floor && r <= row.ceiling).text;
            };
            const name = roll('characters', 'name');
            const role = roll('characters', 'role');
            const goal = roll('characters', 'goal');
            const desc = roll('characters', 'descriptor');
            document.getElementById('npc-display').innerHTML = `
                <div class="npc-name">${name}</div>
                <div>${desc} ${role}</div>
                <div style="margin-top:10px; font-style:italic; opacity: 0.8;">Goal: ${goal}</div>
                <button class="sync-btn" onclick="logToHistory('NPC DISCOVERED: ${name} (${desc} ${role}) Goal: ${goal}')">LOG NPC</button>
                <div style="clear:both;"></div>`;
        }

        /* --- TRUTHS LOGIC --- */
        function renderTruths() {
            const truths = datasworn.setting_truths;
            document.getElementById('truth-list').innerHTML = Object.keys(truths).map(k => `
                <div class="truth-item">
                    <div style="font-size:0.65rem; color:var(--accent); margin-bottom:5px; font-weight:bold;">${truths[k].name}</div>
                    <select onchange="saveTruth('${k}', this.value)">
                        <option>Select a Truth...</option>
                        ${truths[k].table.rows.map(r => `<option value="${r.text}">${r.text.substring(0,40)}...</option>`).join('')}
                    </select>
                </div>`).join('');
        }
        async function saveTruth(cat, val) {
            await saveStat(charId, "history_entry", `WORLD TRUTH: ${datasworn.setting_truths[cat].name} -> ${val}`);
            alert("Truth updated in shared log.");
        }

        async function logToHistory(text) {
            await saveStat(charId, "history_entry", text);
            alert("Logged to history.");
        }

        /* --- CHARACTER CREATION LOGIC --- */
        function rollCreation(type) {
            const getResult = (pathArray) => {
                let current = datasworn.oracles;
                pathArray.forEach(key => {
                    if (current[key]) current = current[key];
                    else if (current.contents && current.contents[key]) current = current.contents[key];
                });
                const r = Math.floor(Math.random() * 100) + 1;
                const row = current.rows.find(row => r >= row.floor && r <= row.ceiling);
                return row ? row.text : "Error reading data...";
            };

            if (type === 'background') {
                document.getElementById('create-bg').innerText = getResult(['characters', 'background']);
            }
            if (type === 'starship') {
                document.getElementById('create-ship').innerText = getResult(['space', 'starship_name']);
            }
        }

        async function finalizeCharacter() {
            const status = document.getElementById('init-status');
            status.innerText = "UPLINKING TO DATABASE...";
            
            const bg = document.getElementById('create-bg').innerText;
            const ship = document.getElementById('create-ship').innerText;

            // Stats to initialize
            const initialStats = {
                "health": 5, "spirit": 5, "supply": 5, "momentum": 2, "xp": 0,
                "edge": 2, "heart": 2, "iron": 2, "shadow": 2, "wits": 2
            };

            for (const [stat, val] of Object.entries(initialStats)) {
                await saveStat(charId, stat, val);
            }
            
            await saveStat(charId, "history_entry", `CHARACTER INITIALIZED: ${charId}. Background: ${bg}. Starship: ${ship}.`);
            
            status.innerText = "SUCCESS: NEURAL LINK ESTABLISHED.";
            alert("Character template created in Google Sheet!");
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #050508; color: #e0e0e0; font-family: 'Courier New', monospace; padding: 10px; overflow-x: hidden; }
        .tabs { display: flex; border-bottom: 1px solid #333; margin-bottom: 10px; position: sticky; top: 0; background: #050508; z-index: 5; flex-wrap: wrap; }
        .tab { padding: 8px 12px; cursor: pointer; font-size: 0.65rem; border: 1px solid transparent; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .tab.active { border: 1px solid #333; border-bottom: 1px solid #050508; opacity: 1; color: var(--accent); font-weight: bold; }
        .panel { display: none; padding-bottom: 40px; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        select, button { background: #111; border: 1px solid #444; color: white; padding: 8px; width: 100%; margin-bottom: 8px; font-size: 0.75rem; border-radius: 4px; outline: none; }
        button { cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        button:hover { background: var(--accent); color: black; }
        .output-card { background: rgba(255,255,255,0.03); padding: 12px; border-left: 2px solid var(--accent); margin-top: 10px; font-size: 0.8rem; line-height: 1.5; min-height: 20px; }
        .sync-btn { border: 1px solid #444; color: #888; background: none; margin-top: 10px; font-size: 0.6rem; padding: 4px; width: auto; float: right; }
        .npc-name { font-size: 1.1rem; color: var(--accent); margin-bottom: 5px; border-bottom: 1px solid #222; padding-bottom: 5px; text-transform: uppercase; }
        #init-status { padding: 10px; font-size: 0.7rem; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="showPanel('moves')">Moves</div>
        <div class="tab" onclick="showPanel('oracles')">Oracles</div>
        <div class="tab" onclick="showPanel('npcs')">NPCs</div>
        <div class="tab" onclick="showPanel('truths')">Truths</div>
        <div class="tab" onclick="showPanel('init')">INIT</div>
    </div>

    <div id="moves" class="panel active">
        <select id="move-cat" onchange="loadMoves()"></select>
        <select id="move-list" onchange="displayMove()"></select>
        <div id="move-display"></div>
    </div>

    <div id="oracles" class="panel">
        <select id="ora-cat" onchange="loadOracleTables()"></select>
        <select id="ora-list"></select>
        <button onclick="rollOracle()">ROLL d100</button>
        <div id="ora-display"></div>
    </div>

    <div id="npcs" class="panel">
        <button onclick="generateNPC()">GENERATE CONTACT/FOE</button>
        <div id="npc-display" class="output-card">Awaiting sensor sweep...</div>
    </div>

    <div id="truths" class="panel">
       <div id="truth-list">Loading world parameters...</div>
    </div>

    <div id="init" class="panel">
        <div style="font-size:0.6rem; opacity:0.6; margin-bottom:10px; border-bottom:1px solid #333; padding-bottom:5px;">CHARACTER INITIALIZATION</div>
        <button onclick="rollCreation('background')">GENERATE BACKGROUND</button>
        <div id="create-bg" class="output-card">...</div>
        <button onclick="rollCreation('starship')">GENERATE SHIP NAME</button>
        <div id="create-ship" class="output-card">...</div>
        <button style="background:var(--accent); color:black; margin-top:15px;" onclick="finalizeCharacter()">SET BASE STATS & LOG</button>
        <div id="init-status"></div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        let datasworn = null;
        const DATA_URL = "https://cdn.jsdelivr.net/gh/rsek/datasworn@main/pkg/nodejs/@datasworn/starforged/json/starforged.json";

        async function init() {
            try {
                const res = await fetch(DATA_URL);
                if (!res.ok) throw new Error("Data Link Offline");
                datasworn = await res.json();
                
                populateMoves();
                populateOracleCats();
                renderTruths();
                console.log("Compendium Sync Complete.");
            } catch (e) {
                console.error("Init Error:", e);
                document.getElementById('move-display').innerHTML = `<div style="color:red">ERROR: DATABASE OFFLINE</div>`;
            }
        }

        function showPanel(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            
            document.getElementById(id).classList.add('active');
            
            // Highlight the correct tab based on the function argument
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => { 
                if(t.innerText.toLowerCase() === id) t.classList.add('active'); 
            });
        }

        function populateMoves() {
            if(!datasworn) return;
            const moveCat = document.getElementById('move-cat');
            moveCat.innerHTML = "";
            for (let key in datasworn.moves) {
                moveCat.add(new Option(datasworn.moves[key].name, key));
            }
            loadMoves();
        }

        function loadMoves() {
            const catKey = document.getElementById('move-cat').value;
            const list = document.getElementById('move-list');
            list.innerHTML = "";
            const contents = datasworn.moves[catKey].contents;
            for (let key in contents) {
                list.add(new Option(contents[key].name, key));
            }
            displayMove();
        }

        function displayMove() {
            const catKey = document.getElementById('move-cat').value;
            const moveKey = document.getElementById('move-list').value;
            const move = datasworn.moves[catKey].contents[moveKey];
            document.getElementById('move-display').innerHTML = `<div class="output-card">${move.text.replace(/\n/g, '<br>')}</div>`;
        }

        function populateOracleCats() {
            if(!datasworn) return;
            const oraCat = document.getElementById('ora-cat');
            oraCat.innerHTML = "";
            for (let key in datasworn.oracles) {
                oraCat.add(new Option(datasworn.oracles[key].name, key));
            }
            loadOracleTables();
        }

        function loadOracleTables() {
            const catKey = document.getElementById('ora-cat').value;
            const list = document.getElementById('ora-list');
            list.innerHTML = "";
            const contents = datasworn.oracles[catKey].contents || {};
            for (let key in contents) {
                list.add(new Option(contents[key].name, key));
            }
        }

        function rollOracle() {
            if(!datasworn) return;
            const catKey = document.getElementById('ora-cat').value;
            const tableKey = document.getElementById('ora-list').value;
            const table = datasworn.oracles[catKey].contents[tableKey];
            
            const roll = Math.floor(Math.random() * 100) + 1;
            const row = table.rows.find(r => roll >= r.floor && roll <= r.ceiling);
            
            if(!row) return;

            document.getElementById('ora-display').innerHTML = `
                <div class="output-card">
                    <div style="color:var(--accent); font-weight:bold;">${row.text}</div>
                    <div style="font-size:0.6rem; opacity:0.5; margin-top:5px;">Result: ${roll} | Table: ${table.name}</div>
                    <button class="sync-btn" onclick="logToHistory('ORACLE: ${table.name} -> ${row.text}')">LOG RESULT</button>
                    <div style="clear:both;"></div>
                </div>`;
        }

        function generateNPC() {
            if(!datasworn) return;
            const getRoll = (c, t) => {
                const tab = datasworn.oracles[c].contents[t];
                const r = Math.floor(Math.random() * 100) + 1;
                return tab.rows.find(row => r >= row.floor && r <= row.ceiling).text;
            };
            
            const name = getRoll('characters', 'name');
            const role = getRoll('characters', 'role');
            const goal = getRoll('characters', 'goal');
            const desc = getRoll('characters', 'descriptor');
            
            document.getElementById('npc-display').innerHTML = `
                <div class="npc-name">${name}</div>
                <div>${desc} ${role}</div>
                <div style="margin-top:8px; font-size:0.75rem; opacity: 0.7;">Goal: ${goal}</div>
                <button class="sync-btn" onclick="logToHistory('NPC: ${name} (${desc} ${role})')">LOG NPC</button>
                <div style="clear:both;"></div>`;
        }

        function renderTruths() {
            if(!datasworn) return;
            const truths = datasworn.setting_truths;
            document.getElementById('truth-list').innerHTML = Object.keys(truths).map(k => `
                <div style="margin-bottom:12px; border-bottom:1px solid #222; padding-bottom:8px;">
                    <div style="font-size:0.6rem; color:var(--accent); margin-bottom:4px;">${truths[k].name.toUpperCase()}</div>
                    <select onchange="saveTruth('${k}', this.value)">
                        <option>Choose Option...</option>
                        ${truths[k].table.rows.map(r => `<option value="${r.text}">${r.text.substring(0,45)}...</option>`).join('')}
                    </select>
                </div>`).join('');
        }

        async function saveTruth(cat, val) {
            await saveStat(charId, "history_entry", `WORLD-DATA: ${datasworn.setting_truths[cat].name} -> ${val}`);
            document.getElementById('init-status').innerText = "WORLD PARAMETERS UPDATED.";
        }

        async function logToHistory(text) {
            await saveStat(charId, "history_entry", text);
        }

        // CRITICAL FIX FOR THE "NaN" / "Undefined" ERRORS
        function rollCreation(type) {
            if(!datasworn) {
                console.warn("Neural Link: Database not yet loaded.");
                return;
            }

            try {
                let cat = (type === 'background') ? 'characters' : 'ship'; 
                let table = (type === 'background') ? 'background' : 'name';
                
                const category = datasworn.oracles[cat];
                if (!category) throw new Error("Category not found: " + cat);
                
                const tab = category.contents[table];
                if (!tab) throw new Error("Table not found: " + table);

                const r = Math.floor(Math.random() * 100) + 1;
                const row = tab.rows.find(row => r >= row.floor && r <= row.ceiling);
                
                if (!row) throw new Error("Roll result out of range");

                if (type === 'background') document.getElementById('create-bg').innerText = row.text;
                else document.getElementById('create-ship').innerText = row.text;

            } catch (err) {
                console.error("Creation Roll Error:", err);
            }
        }

        async function finalizeCharacter() {
            const status = document.getElementById('init-status');
            status.innerHTML = "UPLINKING CHARACTER DATA...";
            
            const bg = document.getElementById('create-bg').innerText;
            const ship = document.getElementById('create-ship').innerText;
            
            // Check if user actually rolled first
            if(bg === "..." || ship === "...") {
                status.innerHTML = "<span style='color:red'>ERROR: COMPLETE GENERATION FIRST</span>";
                return;
            }
            
            const stats = {"health":5,"spirit":5,"supply":5,"momentum":2,"edge":2,"heart":2,"iron":2,"shadow":2,"wits":2};
            
            for (const [s, v] of Object.entries(stats)) { 
                await saveStat(charId, s, v); 
            }
            
            await saveStat(charId, "history_entry", `INIT: ${charId} | BG: ${bg} | Ship: ${ship}`);
            status.innerHTML = "NEURAL LINK ESTABLISHED. LOG UPDATED.";
        }

        init();
    </script>
</body>
</html>

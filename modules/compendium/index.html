<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; padding: 20px; }
        .compendium-container { display: flex; flex-direction: column; height: 95vh; }
        .search-bar { background: #161922; border: 1px solid #454d5d; color: #00ff9d; padding: 10px; margin-bottom: 15px; width: 100%; box-sizing: border-box; }
        
        .browser-layout { display: grid; grid-template-columns: 250px 1fr; gap: 20px; flex-grow: 1; overflow: hidden; }
        .side-nav { overflow-y: auto; border-right: 1px solid #1a1c23; padding-right: 10px; }
        .view-pane { overflow-y: auto; padding: 20px; background: rgba(22, 25, 34, 0.5); border-radius: 4px; }

        .nav-group { margin-bottom: 15px; }
        .nav-group h4 { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .nav-item { display: block; width: 100%; text-align: left; background: none; border: none; color: #bcdee7; padding: 5px; cursor: pointer; font-size: 0.85rem; }
        .nav-item:hover { color: #00ff9d; background: rgba(0, 255, 153, 0.05); }

        .move-card h2 { color: #00ff9d; margin-top: 0; }
        .move-stats { color: #ff0055; font-weight: bold; margin-bottom: 15px; }
        .move-text { line-height: 1.6; color: #bcdee7; }
        .roll-btn { background: #00ff9d; color: #000; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="compendium-container">
        <input type="text" class="search-bar" placeholder="SEARCH DATABASE..." onkeyup="filterMoves(this.value)">
        <div class="browser-layout">
            <div id="side-nav" class="side-nav">
                </div>
            <div id="view-pane" class="view-pane">
                <p style="opacity: 0.5;">SELECT A MODULE TO VIEW DATA...</p>
            </div>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script src="../../js/datasworn.js"></script>
    <script>
        let allMoves = [];

        // Schema-compliant recursive finder
        function findInDatasworn(obj, targetType) {
            let results = [];
            if (!obj || typeof obj !== 'object') return results;
            if (obj.type === targetType) results.push(obj);

            const branches = ['collections', 'contents', 'moves', 'categories', 'oracle_collections'];
            for (const key of branches) {
                if (obj[key]) {
                    for (const childKey in obj[key]) {
                        results = results.concat(findInDatasworn(obj[key][childKey], targetType));
                    }
                }
            }
            return results;
        }

        function init() {
            if (typeof datasworn === 'undefined') {
                setTimeout(init, 500);
                return;
            }

            const categories = findInDatasworn(datasworn.moves, 'move_category');
            const nav = document.getElementById('side-nav');
            
            categories.forEach(cat => {
                const group = document.createElement('div');
                group.className = 'nav-group';
                group.innerHTML = `<h4>${cat.name}</h4>`;
                
                const moves = Object.values(cat.moves);
                moves.forEach(move => {
                    allMoves.push(move);
                    const btn = document.createElement('button');
                    btn.className = 'nav-item';
                    btn.innerText = move.name;
                    btn.onclick = () => displayMove(move);
                    group.appendChild(btn);
                });
                nav.appendChild(group);
            });
        }

        function displayMove(move) {
            const pane = document.getElementById('view-pane');
            pane.innerHTML = `
                <div class="move-card">
                    <h2>${move.name}</h2>
                    <div class="move-stats">${move.stats ? 'STATS: ' + Object.keys(move.stats).join(' / ') : 'SPECIAL MOVE'}</div>
                    <div class="move-text">${move.text}</div>
                    <button class="roll-btn" onclick="executeMove('${move.name}')">EXECUTE MOVE</button>
                </div>
            `;
        }

        async function executeMove(name) {
            if (typeof saveStat === 'function') {
                await saveStat(charId, "history_entry", `MOVE: ${name} triggered.`);
                alert(`${name} Logged to neural link.`);
            }
        }

        function filterMoves(term) {
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => {
                item.style.display = item.innerText.toLowerCase().includes(term.toLowerCase()) ? 'block' : 'none';
            });
        }

        init();
    </script>
</body>
</html>

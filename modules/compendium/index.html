<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #bcdee7; font-family: 'Exo 2', sans-serif; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #454d5d; padding-bottom: 10px; }
        .tab-btn { background: #1a1c23; border: 1px solid #454d5d; color: #00ff9d; padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 1px; }
        .tab-btn.active { background: #00ff9d; color: #000; border-color: #00ff9d; }
        
        .search-bar { width: 100%; padding: 12px; background: #161922; border: 1px solid #454d5d; color: #00ff9d; margin-bottom: 20px; box-sizing: border-box; font-family: 'Share Tech Mono'; outline: none; }
        .search-bar:focus { border-color: #00ff9d; box-shadow: 0 0 10px rgba(0, 255, 153, 0.2); }

        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .compendium-card { background: #1a1c23; border: 1px solid #454d5d; border-radius: 4px; padding: 15px; display: flex; flex-direction: column; transition: 0.2s; }
        .compendium-card:hover { border-color: #00ff9d; }
        
        .card-tag { font-size: 0.6rem; color: #ff0055; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; opacity: 0.8; }
        .card-title { font-weight: bold; color: #00ff9d; margin-bottom: 10px; display: block; border-bottom: 1px solid #2d333f; padding-bottom: 5px; letter-spacing: 1px; }
        .card-text { font-size: 0.85rem; line-height: 1.5; color: #bcdee7; flex-grow: 1; }
        
        /* Oracle Button Styling */
        .oracle-roll-btn { margin-top: 15px; background: none; border: 1px solid #00ff9d; color: #00ff9d; padding: 8px; font-family: 'Exo 2'; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .oracle-roll-btn:hover { background: #00ff9d; color: #000; }

        .inline-link { background: rgba(0, 255, 153, 0.1); border: none; border-bottom: 1px dashed #00ff9d; color: #00ff9d; cursor: pointer; padding: 0 2px; font-family: inherit; }
        .inline-link:hover { background: #00ff9d; color: #000; }
        
        #status-msg { font-size: 0.6rem; color: #454d5d; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="status-msg">INITIALIZING ENCYCLOPEDIA...</div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('move', this)">Moves</button>
        <button class="tab-btn" onclick="switchTab('oracle_rollable', this)">Oracles</button>
    </div>
    
    <input type="text" id="search" class="search-bar" placeholder="TYPE TO FILTER DATABASE..." oninput="filterResults()">
    
    <div id="compendium-grid" class="content-grid"></div>

    <script src="../../js/sync.js"></script>
    <script src="../../js/datasworn.js"></script>
    <script>
        let currentType = 'move';
        let fullData = [];

        function formatText(text) {
            if (!text) return "";
            // Replace Datasworn IDs with clickable Neural Links
            return text.replace(/\[([^\]]+)\]\(id:([^)]+)\)/g, (match, name, id) => {
                return `<button class="inline-link" onclick="handleMoveLink('${id}', '${name.replace(/'/g, "\\'")}')">${name}</button>`;
            });
        }

        async function handleMoveLink(id, name) {
            // Check if user wants to roll this move
            if (confirm(`EXECUTE NEURAL ROLL: ${name.toUpperCase()}?`)) {
                if (typeof triggerNeuralRoll === 'function') {
                    // Logic: Compendium rolls are "naked" (stat 0, adds 0) by default 
                    // unless we add a stat-picker later.
                    await triggerNeuralRoll(name, 0, 0);
                }
            }
        }

        async function handleOracleRoll(oracleName, oracleId) {
            // Simplified Oracle Logic for now
            const roll = Math.floor(Math.random() * 100) + 1;
            const logMsg = `ORACLE: ${oracleName} rolled ${roll}`;
            await saveStat(charId, "history_entry", logMsg);
            alert(`${oracleName}: Result ${roll} (Logged to Archive)`);
        }

        function findItems(obj, type) {
            let results = [];
            if (!obj || typeof obj !== 'object') return results;
            if (obj.type === type) results.push(obj);
            for (let k in obj) { 
                if (typeof obj[k] === 'object') results = results.concat(findItems(obj[k], type)); 
            }
            return results;
        }

        async function init() {
            // DUAL GUARD: Wait for Data and Sync Engine
            const isSyncReady = (typeof GAS_URL !== 'undefined' && typeof loadStats === 'function');
            const isDataReady = (typeof datasworn !== 'undefined' && datasworn !== null);

            if (!isSyncReady || !isDataReady) {
                console.log("Compendium: Waiting for uplink...");
                setTimeout(init, 500);
                return;
            }

            document.getElementById('status-msg').innerText = "DATABASE ONLINE";
            loadData();
        }

        function loadData() {
            fullData = findItems(datasworn, currentType);
            filterResults();
        }

        function switchTab(type, btn) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadData();
        }

        function filterResults() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('compendium-grid');
            const filtered = fullData.filter(item => item.name.toLowerCase().includes(query));

            grid.innerHTML = filtered.map(item => `
                <div class="compendium-card">
                    <div class="card-tag">${currentType.replace('_', ' ')}</div>
                    <span class="card-title">${item.name.toUpperCase()}</span>
                    <div class="card-text">${formatText(item.text || item.description || "No description available.")}</div>
                    ${currentType === 'oracle_rollable' ? 
                        `<button class="oracle-roll-btn" onclick="handleOracleRoll('${item.name}', '${item._id}')">CONSULT ORACLE</button>` : 
                        ''
                    }
                </div>
            `).join('');
        }

        init();
    </script>
</body>
</html>

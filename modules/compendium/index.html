<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #bcdee7; font-family: 'Exo 2', sans-serif; padding: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #454d5d; padding-bottom: 10px; }
        .tab-btn { background: #1a1c23; border: 1px solid #454d5d; color: #00ff9d; padding: 8px 15px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .tab-btn.active { background: #00ff9d; color: #000; border-color: #00ff9d; }
        .search-bar { width: 100%; padding: 12px; background: #161922; border: 1px solid #00ff9d; color: #00ff9d; margin-bottom: 20px; box-sizing: border-box; font-family: 'Exo 2'; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .compendium-card { background: #1a1c23; border: 1px solid #454d5d; border-radius: 4px; padding: 15px; }
        .card-tag { font-size: 0.6rem; color: #ff0055; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .card-title { font-weight: bold; color: #00ff9d; margin-bottom: 10px; display: block; border-bottom: 1px solid #2d333f; padding-bottom: 5px; }
        .card-text { font-size: 0.85rem; line-height: 1.5; color: #bcdee7; }
        .inline-link { background: rgba(0, 255, 153, 0.1); border: none; border-bottom: 1px dashed #00ff9d; color: #00ff9d; cursor: pointer; padding: 0 2px; }
        .inline-link:hover { background: #00ff9d; color: #000; }
    </style>
</head>
<body>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('move', this)">Moves</button>
        <button class="tab-btn" onclick="switchTab('oracle_rollable', this)">Oracles</button>
    </div>
    <input type="text" id="search" class="search-bar" placeholder="SEARCH DATABASE..." oninput="filterResults()">
    <div id="compendium-grid" class="content-grid"></div>

    <script src="../../js/sync.js"></script>
    <script src="../../js/datasworn.js"></script>
    <script>
        let currentType = 'move';
        let fullData = [];

        function formatText(text) {
            if (!text) return "";
            return text.replace(/\[([^\]]+)\]\(id:([^)]+)\)/g, (match, name, id) => {
                return `<button class="inline-link" onclick="handleLink('${id}', '${name.replace(/'/g, "\\'")}')">${name}</button>`;
            });
        }

        async function handleLink(id, name) {
            if (confirm(`INITIATE NEURAL ROLL: ${name.toUpperCase()}?`)) {
                if (typeof triggerNeuralRoll === 'function') await triggerNeuralRoll(name, 0, 0);
            }
        }

        function findItems(obj, type) {
            let results = [];
            if (!obj || typeof obj !== 'object') return results;
            if (obj.type === type) results.push(obj);
            for (let k in obj) { if (typeof obj[k] === 'object') results = results.concat(findItems(obj[k], type)); }
            return results;
        }

        async function init() {
            if (typeof datasworn === 'undefined' || datasworn === null) {
                setTimeout(init, 500);
                return;
            }
            loadData();
        }

        function loadData() {
            fullData = findItems(datasworn, currentType);
            filterResults();
        }

        function switchTab(type, btn) {
            currentType = type;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadData();
        }

        function filterResults() {
            const query = document.getElementById('search').value.toLowerCase();
            const grid = document.getElementById('compendium-grid');
            const filtered = fullData.filter(item => item.name.toLowerCase().includes(query));

            grid.innerHTML = filtered.map(item => `
                <div class="compendium-card">
                    <div class="card-tag">${currentType}</div>
                    <span class="card-title">${item.name.toUpperCase()}</span>
                    <div class="card-text">${formatText(item.text || item.description || "No description available.")}</div>
                </div>
            `).join('');
        }
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #e2e4e9; padding: 10px; font-family: 'Exo 2', sans-serif; }
        .tabs { display: flex; border-bottom: 1px solid #454d5d; margin-bottom: 10px; }
        .tab { padding: 8px 12px; cursor: pointer; font-size: 0.65rem; opacity: 0.5; text-transform: uppercase; }
        .tab.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: bold; }
        .panel { display: none; }
        .panel.active { display: block; }
        select, button { width: 100%; margin-bottom: 8px; background: #1a1c23; color: white; border: 1px solid #454d5d; padding: 8px; font-size: 0.75rem; }
        .output-card { background: rgba(255,255,255,0.05); padding: 12px; border-left: 3px solid var(--accent); margin-top: 10px; font-size: 0.8rem; line-height: 1.4; }
        .sync-btn { font-size: 0.6rem; padding: 4px 8px; width: auto; float: right; margin-top: 5px; border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body class="theme-starforged">
    <div class="tabs">
        <div class="tab active" onclick="showTab('moves')">Moves</div>
        <div class="tab" onclick="showTab('oracles')">Oracles</div>
        <div class="tab" onclick="showTab('npcs')">NPCs</div>
    </div>

    <div id="moves" class="panel active">
        <select id="move-cat" onchange="loadMoves()"></select>
        <select id="move-list" onchange="displayMove()"></select>
        <div id="move-display"></div>
    </div>

    <div id="oracles" class="panel">
        <select id="ora-cat" onchange="loadOracleTables()"></select>
        <select id="ora-list"></select>
        <button onclick="rollOracle()">EXECUTE d100 ROLL</button>
        <div id="ora-display"></div>
    </div>

    <div id="npcs" class="panel">
        <button onclick="generateNPC()">GENERATE CONTACT/FOE</button>
        <div id="npc-display" class="output-card">Awaiting sensor sweep...</div>
    </div>

    <script src="../../js/datasworn.js"></script>
    <script src="../../js/sync.js"></script>

    <script>
        let datasworn = null;

        async function init() {
            // Neural Link Guard: Wait for sync.js discovery
            if (!GAS_URL) {
                console.log("Compendium: Waiting for handshake...");
                setTimeout(init, 1000);
                return;
            }

            datasworn = await DATASWORN_CONFIG.fetchData();
            if (datasworn) {
                populateMoves();
                populateOracleCats();
                console.log("Compendium: Neural Link Established.");
            } else {
                document.getElementById('move-display').innerHTML = "CORE DATA OFFLINE";
            }
        }

        function showTab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // --- MOVES LOGIC ---
        function populateMoves() {
            const mCat = document.getElementById('move-cat');
            for (let key in datasworn.moves) {
                mCat.add(new Option(datasworn.moves[key].name, key));
            }
            loadMoves();
        }

        function loadMoves() {
            const catKey = document.getElementById('move-cat').value;
            const list = document.getElementById('move-list');
            list.innerHTML = "";
            const contents = datasworn.moves[catKey].contents;
            for (let key in contents) {
                list.add(new Option(contents[key].name, key));
            }
            displayMove();
        }

        function displayMove() {
            const catKey = document.getElementById('move-cat').value;
            const moveKey = document.getElementById('move-list').value;
            const move = datasworn.moves[catKey].contents[moveKey];
            const text = move.text || move.description || "No data available.";
            document.getElementById('move-display').innerHTML = `
                <div class="output-card">
                    <strong>${move.name}</strong><br><br>
                    ${text.replace(/\n/g, '<br>')}
                </div>`;
        }

        // --- ORACLES LOGIC ---
        function populateOracleCats() {
            const oraCat = document.getElementById('ora-cat');
            for (let key in datasworn.oracles) {
                oraCat.add(new Option(datasworn.oracles[key].name, key));
            }
            loadOracleTables();
        }

        function loadOracleTables() {
            const catKey = document.getElementById('ora-cat').value;
            const list = document.getElementById('ora-list');
            list.innerHTML = "";
            const cat = datasworn.oracles[catKey];

            if (cat.contents) {
                for (let k in cat.contents) list.add(new Option(cat.contents[k].name, `direct/0/${k}`));
            }
            if (cat.collections) {
                for (let ck in cat.collections) {
                    for (let tk in cat.collections[ck].contents) {
                        list.add(new Option(`${cat.collections[ck].name}: ${cat.collections[ck].contents[tk].name}`, `sub/${ck}/${tk}`));
                    }
                }
            }
        }

        async function rollOracle() {
            const catKey = document.getElementById('ora-cat').value;
            const path = document.getElementById('ora-list').value.split('/');
            const type = path[0];
            const subKey = path[1];
            const tableKey = path[2];

            let table = (type === 'direct') 
                ? datasworn.oracles[catKey].contents[tableKey] 
                : datasworn.oracles[catKey].collections[subKey].contents[tableKey];
            
            const roll = Math.floor(Math.random() * 100) + 1;
            const row = DATASWORN_CONFIG.getResult(table, roll);
            const result = row.text || row.result;

            document.getElementById('ora-display').innerHTML = `
                <div class="output-card">
                    <div style="color:var(--accent); font-weight:bold; font-size:1rem;">${result}</div>
                    <div style="font-size:0.6rem; opacity:0.5; margin-top:5px;">Roll: ${roll} | Source: ${table.name}</div>
                    <button class="sync-btn" onclick="saveStat(charId, 'history_entry', 'ORACLE [${table.name}]: ${result}')">LOG TO HISTORY</button>
                </div>`;
        }

        async function generateNPC() {
            const rollOn = (cat, sub, tab) => {
                const table = datasworn.oracles[cat].collections[sub].contents[tab];
                const r = Math.floor(Math.random() * 100) + 1;
                return DATASWORN_CONFIG.getResult(table, r).text;
            };
            
            try {
                const name = rollOn('characters', 'name', 'given');
                const roleTable = datasworn.oracles.characters.contents.role;
                const role = DATASWORN_CONFIG.getResult(roleTable, Math.floor(Math.random() * 100) + 1).text;
                
                document.getElementById('npc-display').innerHTML = `
                    <div style="color:var(--accent); font-weight:bold;">${name}</div>
                    <div style="font-size:0.75rem; margin-bottom:10px;">${role}</div>
                    <button class="sync-btn" onclick="saveStat(charId, 'history_entry', 'NPC GENERATED: ${name}, ${role}')">LOG ENCOUNTER</button>
                `;
            } catch (e) {
                console.error("NPC Gen Error", e);
            }
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: transparent; color: #a855f7; font-family: 'Courier New', monospace; padding: 10px; }
        .oracle-container { 
            border: 1px solid #a855f744; 
            background: rgba(0,0,0,0.9); 
            padding: 15px; 
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(168, 85, 247, 0.1);
        }
        .header { font-size: 0.6rem; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.7; color: #a855f7; }
        
        #oracle-display { 
            min-height: 80px; 
            font-size: 0.9rem; 
            line-height: 1.5; 
            margin-bottom: 15px; 
            color: #d8b4fe;
            border-left: 2px solid #a855f7;
            padding-left: 10px;
        }

        .input-wrap { display: flex; gap: 5px; border-top: 1px solid #a855f722; pt: 10px; }
        input { 
            flex: 1; background: transparent; border: none; color: #fff; 
            font-family: 'Exo 2', sans-serif; font-size: 0.8rem; outline: none;
        }
        button { 
            background: #a855f7; color: #000; border: none; 
            padding: 4px 10px; cursor: pointer; font-weight: bold; font-size: 0.7rem;
        }
        button:hover { background: #fff; }
        .loading { font-style: italic; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div class="oracle-container">
        <div class="header">VOID-LINK: SECRET ORACLE</div>
        <div id="oracle-display">Enter a inquiry to begin decryption...</div>
        
        <div class="input-wrap">
            <input type="text" id="oracle-input" placeholder="Query the void..." onkeydown="if(event.key==='Enter') invokeOracle()">
            <button onclick="invokeOracle()">SEND</button>
        </div>
    </div>

    <script src="../../js/sync.js"></script>
    <script>
        async function invokeOracle() {
            const input = document.getElementById('oracle-input');
            const display = document.getElementById('oracle-display');
            const query = input.value.trim();

            if (!query) return;

            // Visual feedback
            input.value = "";
            display.innerHTML = '<span class="loading">DECRYPTING TRANSMISSION...</span>';

            try {
                // We use the GAS_URL from sync.js and the 'oracle' param from our new Code.gs
                const response = await fetch(`${GAS_URL}?id=${charId}&oracle=${encodeURIComponent(query)}`);
                
                if (!response.ok) throw new Error("Link Severed");
                
                const text = await response.text();
                display.innerHTML = text;

                // Log the consultation to the character's history log
                await saveStat(charId, "history_entry", `Oracle Consulted: "${query}"`);
                
            } catch (e) {
                display.innerHTML = '<span style="color: #ef4444;">ERROR: VOID-LINK UNSTABLE. RE-DEPLOY SCRIPT.</span>';
                console.error("Oracle Error:", e);
            }
        }
    </script>
</body>
</html>

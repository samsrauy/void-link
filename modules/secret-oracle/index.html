<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #050508; color: #d8b4fe; font-family: 'Courier New', monospace; padding: 15px; border: 1px solid #4b0082; }
        
        .oracle-header { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; color: #a855f7; margin-bottom: 15px; display: flex; justify-content: space-between; }
        
        .input-area { display: flex; flex-direction: column; gap: 10px; }
        textarea { 
            background: #000; border: 1px solid #4b0082; color: #e0e7ff; 
            padding: 10px; font-size: 0.8rem; resize: none; height: 60px; outline: none;
        }
        
        .query-btn { 
            background: #4b0082; color: white; border: none; padding: 8px; 
            cursor: pointer; font-size: 0.7rem; font-weight: bold; transition: 0.3s;
        }
        .query-btn:hover { background: #6366f1; box-shadow: 0 0 15px rgba(99, 102, 241, 0.4); }

        #response-box { 
            margin-top: 20px; min-height: 100px; font-size: 0.85rem; line-height: 1.6;
            border-left: 2px solid #4b0082; padding-left: 15px; font-style: italic;
        }

        /* Animation for AI "Thinking" */
        .thinking { animation: pulse 2s infinite; opacity: 0.6; }
        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 5px #4b0082; color: #d8b4fe; }
            50% { text-shadow: 0 0 20px #a855f7; color: #ffffff; }
        }

        .transmit-btn { 
            margin-top: 15px; width: 100%; background: none; border: 1px solid #a855f7; 
            color: #a855f7; font-size: 0.6rem; padding: 5px; cursor: pointer; display: none;
        }
        .transmit-btn:hover { background: rgba(168, 85, 247, 0.1); }
    </style>
</head>
<body>

    <div class="oracle-header">
        <span>✦ Void-Link Terminal</span>
        <span id="status-light" style="color:#4ade80">● Online</span>
    </div>

    <div class="input-area">
        <textarea id="user-query" placeholder="Formulate your inquiry to the Void..."></textarea>
        <button class="query-btn" onclick="invokeOracle()">CONSULT THE ORACLE</button>
    </div>

    <div id="response-box">Awaiting transmission...</div>
    <button id="transmit-btn" class="transmit-btn" onclick="syncToHistory()">LOG TO CREW CHRONICLE</button>

    <script src="../../js/sync.js"></script>
    <script>
        async function invokeOracle() {
            const query = document.getElementById('user-query').value;
            const box = document.getElementById('response-box');
            const btn = document.getElementById('transmit-btn');
            
            if (!query) return;

            box.innerText = "Interpreting cosmic interference...";
            box.classList.add('thinking');
            btn.style.display = "none";

            // Calls the Google Apps Script function
            google.script.run
                .withSuccessHandler(response => {
                    box.classList.remove('thinking');
                    box.innerText = response;
                    btn.style.display = "block";
                })
                .withFailureHandler(err => {
                    box.classList.remove('thinking');
                    box.innerText = "Connection lost. The Void is silent.";
                })
                .askSecretOracle(query);
        }

        async function syncToHistory() {
            const query = document.getElementById('user-query').value;
            const response = document.getElementById('response-box').innerText;
            const entry = `VOID ORACLE » Q: "${query}" | A: "${response}"`;
            
            await saveStat(charId, "history_entry", entry);
            alert("Transmission Logged.");
        }
    </script>
</body>
</html>

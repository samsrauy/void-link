<div id="asset-scope">
    <style>
        #asset-scope { 
            background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; 
            padding: 20px; height: 100%; display: flex; flex-direction: column;
        }
        #asset-scope .header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-bottom: 1px solid #1a1c23; padding-bottom: 10px; 
        }
        #asset-scope select { 
            background: #161922; border: 1px solid #454d5d; color: #00ff9d; 
            padding: 8px; border-radius: 4px; outline: none; cursor: pointer; 
            text-transform: uppercase; font-family: 'Share Tech Mono'; 
        }
        #asset-scope .asset-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; overflow-y: auto; flex-grow: 1; padding-right: 10px;
        }
        #asset-scope .asset-card { 
            background: #1a1c23; border: 1px solid #454d5d; border-radius: 8px; 
            padding: 15px; display: flex; flex-direction: column; min-height: 350px;
            position: relative; border-top: 3px solid #00ff9d;
        }
        #asset-scope .asset-type { font-size: 0.6rem; color: #ff0055; text-transform: uppercase; letter-spacing: 1px; }
        #asset-scope .asset-name { font-size: 1.1rem; margin: 5px 0; color: #bcdee7; font-family: 'Share Tech Mono'; }
        #asset-scope .ability { font-size: 0.85rem; margin-bottom: 10px; line-height: 1.4; color: #aab; }
        #asset-scope .install-btn { 
            width: 100%; background: #00ff9d; color: #000; border: none; 
            padding: 12px; font-weight: bold; cursor: pointer; margin-top: auto;
            font-family: 'Share Tech Mono'; transition: 0.2s;
        }
        #asset-scope .install-btn:hover { background: #fff; }
        #asset-scope .install-btn:disabled { background: #454d5d; color: #1a1c23; cursor: not-allowed; }
    </style>

    <div class="header">
        <div>
            <h3 style="margin:0;">ASSET REPOSITORY</h3>
            <span id="status-msg" style="font-size: 0.6rem; color: #454d5d;">NEURAL LINK STABLE</span>
        </div>
        <select id="category-select" onchange="renderAssets(this.value)"></select>
    </div>

    <div id="asset-grid" class="asset-grid">
        <div style="padding: 20px;">INITIALIZING DATASWORN CORE...</div>
    </div>
</div>

<script>
    // --- GLOBAL VOID-LINK MARKDOWN & MODAL ENGINE ---
    if (!window.voidLinkMarkdownEngine) {
        window.voidLinkMarkdownEngine = true;
        window.formatMarkdown = function(txt) {
            if (!txt) return "";
            let html = txt;
            const links = [];
            html = html.replace(/\[(.*?)\]\((.*?)\)/g, (m, text, url) => { links.push({ text, url }); return `%%LINK_${links.length - 1}%%`; });
            html = html.replace(/\*\*(.*?)\*\*/g, '<b style="color:#bcdee7;">$1</b>');
            html = html.replace(/__(.*?)__/g, '<b style="color:#bcdee7;">$1</b>');
            html = html.replace(/(?<!\w)\*(.*?)\*(?!\w)/g, '<i>$1</i>');
            html = html.replace(/(?<!\w)_(.*?)_(?!\w)/g, '<i>$1</i>'); 
            html = html.replace(/\n/g, '<br>');
            html = html.replace(/%%LINK_(\d+)%%/g, (m, i) => `<span style="color:#00ff9d; cursor:pointer; text-decoration:underline dashed; text-underline-offset: 3px;" onclick="showCompendiumModal('${links[i].url}')">${links[i].text}</span>`);
            return html;
        };

        window.showCompendiumModal = function(nodeId) {
            if (!window.dataswornCore) return;
            const cleanId = nodeId.replace(/^[a-zA-Z]+:/, '');
            const node = window.dataswornCore.findNode(cleanId);
            
            let modal = document.getElementById('compendium-modal');
            if (!modal) {
                modal = document.createElement('div'); modal.id = 'compendium-modal';
                modal.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(5,5,8,0.9); z-index:9999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(5px);";
                modal.onclick = function(e) { if (e.target === modal) modal.style.display = 'none'; };
                modal.innerHTML = `<div style="background:#161922; border:2px solid #00ff9d; padding:30px; max-width:500px; width:90%; max-height:80vh; overflow-y:auto; position:relative; box-shadow: 0 0 30px rgba(0,255,153,0.2); font-family:'Exo 2', sans-serif;"><button onclick="document.getElementById('compendium-modal').style.display='none'" style="position:absolute; top:10px; right:10px; background:transparent; border:none; color:#ff0055; cursor:pointer; font-size:1.2rem; font-family:'Share Tech Mono';">X</button><div id="compendium-modal-tag" style="font-size:0.7rem; color:#ff0055; letter-spacing:2px; margin-bottom:5px; font-family:'Share Tech Mono';"></div><h2 id="compendium-modal-title" style="color:#00ff9d; font-family:'Share Tech Mono'; margin-top:0; border-bottom:1px solid #454d5d; padding-bottom:10px;"></h2><div id="compendium-modal-body" style="color:#aab; font-size:0.9rem; line-height:1.5;"></div></div>`;
                document.body.appendChild(modal);
            }
            if (!node) {
                document.getElementById('compendium-modal-title').innerText = "DATA NOT FOUND"; document.getElementById('compendium-modal-tag').innerText = "ERROR"; document.getElementById('compendium-modal-body').innerHTML = `The neural link to <span style="color:#ff0055;">${cleanId}</span> could not be established.`;
            } else {
                document.getElementById('compendium-modal-title').innerText = (node.name || "DATABANK ENTRY").toUpperCase(); document.getElementById('compendium-modal-tag').innerText = (node.type || "INFO").toUpperCase().replace(/_/g, ' '); document.getElementById('compendium-modal-body').innerHTML = window.formatMarkdown(node.text || node.description || "No data available.");
            }
            modal.style.display = 'flex';
        };
    }

    (async function initAssetBrowser() {
        const grid = document.getElementById('asset-grid');
        const catSelect = document.getElementById('category-select');

        try {
            await window.dataswornReady;
            
            const collections = window.dataswornCore.getAssets();

            if (!collections) {
                throw new Error("Data Core is active, but the 'assets' library could not be mapped.");
            }

            catSelect.innerHTML = Object.keys(collections).sort().map(key => 
                `<option value="${key}">${(collections[key].name || key).toUpperCase()}</option>`
            ).join('');

            window.renderAssets = (catKey) => {
                const assets = collections[catKey].contents;
                if (!assets) {
                    grid.innerHTML = `<div style="color:#ff0055;">No assets found.</div>`;
                    return;
                }
                
                grid.innerHTML = Object.values(assets).map(asset => {
                    const assetId = asset._id || asset.$id || asset.id;
                    return `
                        <div class="asset-card">
                            <div class="asset-type">${collections[catKey].name || 'ASSET'}</div>
                            <div class="asset-name">${asset.name}</div>
                            <div style="font-size:0.7rem; margin-bottom:10px; color:#454d5d;">ID: ${assetId}</div>
                            
                            <div class="abilities-list">
                                ${(asset.abilities || []).map((ab, i) => `
                                    <div class="ability">
                                        <span style="color:#00ff9d;">${i === 0 ? '●' : '○'}</span> ${window.formatMarkdown(ab.text)}
                                    </div>
                                `).join('')}
                            </div>

                            <button class="install-btn" onclick="claimAsset('${assetId}', '${asset.name.replace(/'/g, "\\'")}')">
                                INSTALL ASSET
                            </button>
                        </div>
                    `;
                }).join('');
            };

            renderAssets(catSelect.value);

        } catch (err) {
            console.error("Asset Browser Failure:", err);
            grid.innerHTML = `<div style="color:#ff0055; padding:20px;">DETACHED FROM CORE: ${err.message}</div>`;
        }

        window.claimAsset = async function(assetId, name) {
            if (confirm(`Authorize installation of ${name}?`)) {
                document.getElementById('status-msg').innerText = "TRANSMITTING...";
                
                if (window.gLink && typeof window.gLink.logServer === 'function') {
                    await window.gLink.logServer(window.charId, `Installed Asset: [${name}]`);
                }

                const stats = await window.gLink.loadStatsServer(window.charId) || {};
                let myAssets = stats.assets ? JSON.parse(stats.assets) : [];
                
                if (!myAssets.find(a => a.id === assetId)) {
                    myAssets.push({ id: assetId, enabled: [] });
                    await window.gLink.saveStatServer(window.charId, "assets", JSON.stringify(myAssets));
                    window.dispatchEvent(new CustomEvent('assetsChanged'));
                }

                document.getElementById('status-msg').innerText = "MANIFEST UPDATED";
                alert(`${name} successfully uplinked to character profile.`);
            }
        };
    })();
</script>

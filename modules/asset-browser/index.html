<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #e2e4e9; padding: 15px; font-family: 'Exo 2', sans-serif; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        select { background: #1a1c23; color: var(--accent); border: 1px solid #454d5d; padding: 8px; font-size: 0.8rem; text-transform: uppercase; }
        
        /* Asset Card Styling */
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .asset-card { 
            background: #161922; border: 1px solid #454d5d; border-top: 4px solid var(--accent);
            padding: 15px; position: relative; transition: transform 0.2s;
        }
        .asset-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .asset-type { font-size: 0.6rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }
        .asset-name { font-size: 1.1rem; font-weight: bold; margin: 5px 0; color: var(--accent); }
        .asset-requirement { font-style: italic; font-size: 0.75rem; margin-bottom: 10px; opacity: 0.8; }
        
        .ability { font-size: 0.8rem; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.1); }
        .ability-text { line-height: 1.4; }
        
        .equip-btn { 
            margin-top: 15px; width: 100%; background: transparent; 
            border: 1px solid var(--accent); color: var(--accent); 
            padding: 5px; cursor: pointer; font-size: 0.7rem; font-weight: bold;
        }
        .equip-btn:hover { background: var(--accent); color: #000; }
    </style>
</head>
<body class="theme-starforged">
    <header>
        <div class="controls">
            <select id="asset-category" onchange="populateSubCategories()"></select>
            <select id="asset-subcategory" onchange="renderAssets()"></select>
        </div>
    </header>

    <div id="asset-display" class="asset-grid"></div>

    <script src="../../js/datasworn.js"></script>
    <script src="../../js/sync.js"></script>
    <script>
        let datasworn = null;

        async function init() {
            // Use the global DATASWORN_CONFIG from datasworn.js 
            datasworn = await DATASWORN_CONFIG.fetchData();
            if (datasworn && datasworn.assets) {
                populateCategories();
            } else {
                document.getElementById('asset-display').innerHTML = "DATASWORN LINK SEVERED";
            }
        }

        function populateCategories() {
            const catSelect = document.getElementById('asset-category');
            for (const key in datasworn.assets) {
                const option = new Option(datasworn.assets[key].name, key);
                catSelect.add(option);
            }
            populateSubCategories();
        }

        function populateSubCategories() {
            const catKey = document.getElementById('asset-category').value;
            const subSelect = document.getElementById('asset-subcategory');
            subSelect.innerHTML = "";
            
            const collections = datasworn.assets[catKey].collections;
            for (const key in collections) {
                const option = new Option(collections[key].name, key);
                subSelect.add(option);
            }
            renderAssets();
        }

        function renderAssets() {
            const catKey = document.getElementById('asset-category').value;
            const subKey = document.getElementById('asset-subcategory').value;
            const display = document.getElementById('asset-display');
            display.innerHTML = "";

            const assets = datasworn.assets[catKey].collections[subKey].contents;

            for (const id in assets) {
                const asset = assets[id];
                const card = document.createElement('div');
                card.className = 'asset-card';
                
                let abilitiesHTML = '';
                asset.abilities.forEach((ability, index) => {
                    abilitiesHTML += `
                        <div class="ability">
                            <div class="ability-text">
                                <strong>[${index + 1}]</strong> ${ability.text.replace(/\n/g, '<br>')}
                            </div>
                        </div>`;
                });

                card.innerHTML = `
                    <div class="asset-type">${catKey} / ${subKey}</div>
                    <div class="asset-name">${asset.name}</div>
                    ${asset.requirement ? `<div class="asset-requirement">${asset.requirement}</div>` : ''}
                    ${abilitiesHTML}
                    <button class="equip-btn" onclick="equipAsset('${id}', '${asset.name}')">ADD TO SHIP MANIFEST</button>
                `;
                display.appendChild(card);
            }
        }

        async function equipAsset(assetId, assetName) {
            // Safety: Ensure API discovery is complete before sending 
            if (!GAS_URL) {
                alert("Neural Link establishing... please try again in a moment.");
                return;
            }

            const logMsg = `ASSET ACQUIRED: ${assetName}`;
            // Correctly uses thin-sync history logging 
            await saveStat(charId, "history_entry", logMsg);
            
            alert(`${assetName} logged to history. Open Asset Tracker to finalize installation.`);
        }

        init();
    </script>
</body>
</html>

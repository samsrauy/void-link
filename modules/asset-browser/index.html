<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1a1c23; padding-bottom: 10px; }
        select { background: #161922; border: 1px solid #00ff9d; color: #00ff9d; padding: 8px; border-radius: 4px; outline: none; }
        
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .asset-card { background: #1a1c23; border: 1px solid #454d5d; border-radius: 8px; padding: 15px; position: relative; display: flex; flex-direction: column; }
        .asset-card:hover { border-color: #00ff9d; box-shadow: 0 0 10px rgba(0, 255, 153, 0.1); }
        .asset-card h4 { margin: 0 0 10px 0; color: #00ff9d; text-transform: uppercase; letter-spacing: 1px; }
        .asset-type { font-size: 0.7rem; color: #ff0055; margin-bottom: 10px; font-weight: bold; }
        .ability { font-size: 0.85rem; color: #bcdee7; margin-bottom: 10px; line-height: 1.4; }
        .install-btn { width: 100%; background: #00ff9d; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; margin-top: auto; }
        .install-btn:hover { background: #fff; }
    </style>
</head>
<body>
    <div class="header">
        <h3>NEURAL ASSET REPOSITORY</h3>
        <select id="category-select" onchange="renderAssets(this.value)">
            <option>INITIALIZING CORES...</option>
        </select>
    </div>
    <div id="asset-grid" class="asset-grid">
        </div>

    <script src="../../js/sync.js"></script>
    <script src="../../js/datasworn.js"></script>

    <script>
        console.log("Asset Browser: System Startup...");

        // Recursive search remains the gold standard for Datasworn v3
        function findInDatasworn(obj, targetType) {
            let results = [];
            if (!obj || typeof obj !== 'object') return results;
            if (obj.type === targetType) results.push(obj);

            const branches = ['collections', 'contents', 'assets', 'categories'];
            for (const key of branches) {
                if (obj[key]) {
                    for (const childKey in obj[key]) {
                        results = results.concat(findInDatasworn(obj[key][childKey], targetType));
                    }
                }
            }
            return results;
        }

        function init() {
            // Debug check for the library
            if (typeof datasworn === 'undefined') {
                console.warn("Asset Browser: Waiting for datasworn.js uplink...");
                setTimeout(init, 500);
                return;
            }

            console.log("Asset Browser: Datasworn Link Established.");
            
            try {
                // Find all categories in the assets branch
                const categories = findInDatasworn(datasworn.assets, 'asset_category');
                const select = document.getElementById('category-select');
                
                if (categories.length === 0) {
                    console.error("Asset Browser: No categories found in data.");
                    return;
                }

                select.innerHTML = categories.map(cat => 
                    `<option value="${cat._id}">${cat.name}</option>`
                ).join('');
                
                // Load the first category by default
                renderAssets(categories[0]._id);
            } catch (err) {
                console.error("Asset Browser: Initialization Crash ->", err);
            }
        }

        function renderAssets(catId) {
            const categories = findInDatasworn(datasworn.assets, 'asset_category');
            const category = categories.find(c => c._id === catId);
            const grid = document.getElementById('asset-grid');

            if (!category || !category.assets) {
                grid.innerHTML = "<p style='color:#ff0055'>ERROR: Category contents unreachable.</p>";
                return;
            }

            grid.innerHTML = Object.values(category.assets).map(asset => `
                <div class="asset-card">
                    <div class="asset-type">${category.name}</div>
                    <h4>${asset.name}</h4>
                    <div class="ability"><strong>Requirement:</strong> ${asset.requirement || 'None'}</div>
                    ${asset.abilities.map((ab, i) => `
                        <div class="ability" style="opacity: ${i === 0 ? 1 : 0.6}">● ${ab.text}</div>
                    `).join('')}
                    <button class="install-btn" onclick="claimAsset('${asset._id}', '${asset.name.replace(/'/g, "\\'")}')">INSTALL ASSET</button>
                </div>
            `).join('');
        }

        async function claimAsset(id, name) {
            if (confirm(`Install ${name} to ship systems?`)) {
                // This uses the function from your sync.js
                if (typeof saveStat === 'function') {
                    await saveStat(charId, "history_entry", `ASSET ACQUIRED: ${name}`);
                    alert(`${name} registered to Neural Link.`);
                } else {
                    console.error("Uplink Error: sync.js not responding.");
                }
            }
        }

        // Start the process
        init();
    </script>
</body>
</html>

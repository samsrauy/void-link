<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        body { background: #0b0d12; color: #00ff9d; font-family: 'Exo 2', sans-serif; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #1a1c23; padding-bottom: 10px; }
        select { background: #161922; border: 1px solid #454d5d; color: #00ff9d; padding: 8px; border-radius: 4px; outline: none; cursor: pointer; text-transform: uppercase; font-family: 'Share Tech Mono'; }
        select:focus { border-color: #00ff9d; }
        
        .asset-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .asset-card { background: #1a1c23; border: 1px solid #454d5d; border-radius: 8px; padding: 15px; display: flex; flex-direction: column; min-height: 380px; transition: 0.3s; }
        .asset-card:hover { border-color: #00ff9d; transform: translateY(-2px); }
        .asset-card h4 { margin: 0 0 10px 0; color: #00ff9d; text-transform: uppercase; letter-spacing: 1px; font-size: 1.1rem; }
        .asset-type { font-size: 0.6rem; color: #ff0055; margin-bottom: 10px; font-weight: bold; letter-spacing: 2px; }
        .ability { font-size: 0.85rem; color: #bcdee7; margin-bottom: 12px; line-height: 1.4; }
        
        .inline-link { background: rgba(0, 255, 153, 0.1); border: none; border-bottom: 1px dashed #00ff9d; color: #00ff9d; padding: 0 2px; cursor: pointer; font-family: inherit; font-size: inherit; }

        .install-btn { width: 100%; background: #00ff9d; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; margin-top: auto; text-transform: uppercase; letter-spacing: 1px; }
        .install-btn:hover { background: #fff; }
        .install-btn:disabled { background: #444; cursor: not-allowed; }

        #status-msg { font-size: 0.6rem; color: #454d5d; text-transform: uppercase; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="status-msg">ACCESSING ENCRYPTED REPOSITORY...</div>
    <div class="header">
        <h3 style="margin:0; letter-spacing:2px;">NEURAL ASSET REPOSITORY</h3>
        <select id="category-select" onchange="handleCategoryChange(this.value)">
            <option>UPLINKING...</option>
        </select>
    </div>
    <div id="asset-grid" class="asset-grid"></div>

    <script src="../../js/sync.js"></script>
    <script src="../../js/datasworn.js"></script>
    <script>
        let currentAssets = [];

        function formatDataswornText(text) {
            if (!text) return "";
            return text.replace(/\[([^\]]+)\]\(id:([^)]+)\)/g, (match, name, id) => {
                return `<button class="inline-link" onclick="handleDataswornLink('${id}', '${name.replace(/'/g, "\\'")}')">${name}</button>`;
            });
        }

        async function handleDataswornLink(id, name) {
            if (confirm(`PREVIEW ACTION: ${name.toUpperCase()}?`)) {
                if (typeof triggerNeuralRoll === 'function') await triggerNeuralRoll(name, 0, 0);
            }
        }

        function findInDatasworn(obj, targetType) {
            let results = [];
            if (!obj || typeof obj !== 'object') return results;
            if (obj.type === targetType) results.push(obj);
            for (const key in obj) {
                if (obj[key] && typeof obj[key] === 'object') {
                    results = results.concat(findInDatasworn(obj[key], targetType));
                }
            }
            return results;
        }

        async function init() {
            // DUAL GUARD
            const isSyncReady = (typeof GAS_URL !== 'undefined' && !GAS_URL.includes("YOUR_DEPLOYED"));
            const isDataReady = (typeof datasworn !== 'undefined' && datasworn.assets);

           // If data isn't deep enough yet, wait.
           if (!isSyncReady || !isDataReady) {
               setTimeout(init, 500);
               return;
           }

           // Attempt to find categories
           let categories = findInDatasworn(datasworn, 'asset_category');
    
           // CRITICAL FIX: If datasworn is "Ready" but findInDatasworn returned nothing, 
           // the JSON tree hasn't fully branched yet. Wait longer.
           if (!categories || categories.length === 0) {
               console.log("Asset Browser: Data core online, but categories not yet indexed...");
               setTimeout(init, 1000);
               return;
           }

           document.getElementById('status-msg').innerText = "REPOSITORY DECRYPTED";
    
           // Load current assets for the "Already Installed" check
           const stats = await loadStats(charId);
           if (stats && stats.assets) {
               try { currentAssets = JSON.parse(stats.assets); } catch(e) { currentAssets = []; }
           }

           const select = document.getElementById('category-select');
           categories.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
    
           select.innerHTML = categories.map(cat => `<option value="${cat._id}">${(cat.name || "Unnamed").toUpperCase()}</option>`).join('');
    
           // Final safety check before calling _id
           if (categories[0] && categories[0]._id) {
               renderAssets(categories[0]._id);
           }
        }

        function handleCategoryChange(catId) {
            renderAssets(catId);
        }

        function renderAssets(catId) {
            const grid = document.getElementById('asset-grid');
            const categories = findInDatasworn(datasworn, 'asset_category');
            const category = categories.find(c => c._id === catId);
            if (!category) return;

            const assetList = category.assets || category.contents || {};
            grid.innerHTML = Object.entries(assetList).map(([id, asset]) => {
                const isOwned = currentAssets.some(a => a.id === asset._id);
                return `
                <div class="asset-card">
                    <div class="asset-type">${(category.name || "ASSET").toUpperCase()}</div>
                    <h4>${asset.name}</h4>
                    <div class="ability"><strong>Requirement:</strong> ${formatDataswornText(asset.requirement) || 'None'}</div>
                    ${(asset.abilities || []).map((ab, i) => `
                        <div class="ability" style="opacity: ${i === 0 ? 1 : 0.6}">● ${formatDataswornText(ab.text || ab.description)}</div>
                    `).join('')}
                    <button class="install-btn" 
                        ${isOwned ? 'disabled' : ''} 
                        onclick="claimAsset('${asset._id}', '${asset.name.replace(/'/g, "\\'")}')">
                        ${isOwned ? 'ALREADY INSTALLED' : 'INSTALL ASSET'}
                    </button>
                </div>
            `}).join('');
        }

        async function claimAsset(assetId, name) {
            if (confirm(`Authorize installation of ${name} into ship systems?`)) {
                // 1. Update Local State
                currentAssets.push({ id: assetId, enabled: [0] }); // Enable first ability by default
                
                // 2. Optimistic UI
                renderAssets(document.getElementById('category-select').value);
                
                // 3. Cloud Sync
                document.getElementById('status-msg').innerText = "TRANSMITTING MANIFEST...";
                await saveStat(charId, "assets", JSON.stringify(currentAssets));
                await saveStat(charId, "history_entry", `SYSTEM UPDATE: ${name} installed.`);
                document.getElementById('status-msg').innerText = "MANIFEST UPDATED";
            }
        }
        init();
    </script>
</body>
</html>

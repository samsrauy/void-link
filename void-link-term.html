<div id="terminal-grid">
    <div class="header-bar">
        <h2>STARFORGED // NAV-OS</h2>
        <div id="char-display">ID: AWAITING...</div>
        <button onclick="toggleAssets()">MANIFEST</button>
    </div>
    
    <div id="frame-char" class="module-frame" style="overflow-y: auto;"></div>
    <div id="frame-map" class="module-frame" style="overflow-y: auto;"></div>
    <div id="frame-journal" class="module-frame" style="overflow-y: auto;"></div>
</div>

<div id="asset-drawer">
    <button onclick="toggleAssets()" style="margin: 10px; width: calc(100% - 20px);">CLOSE MANIFEST</button>
    <div id="frame-assets" class="module-frame" style="height: calc(100% - 60px); overflow-y: auto;"></div>
</div>

<script>
    /**
     * MODULE LOADER
     * Fetches HTML from GitHub and injects it into a DIV.
     * Then manually executes any <script> tags found inside.
     */
    async function loadModule(targetId, filename) {
        try {
            const response = await fetch(`https://samsrauy.github.io/void-link/modules/${filename}`);
            if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
            
            const html = await response.text();
            const target = document.getElementById(targetId);
            target.innerHTML = html;
            
            // Execute the scripts within the fragment
            target.querySelectorAll('script').forEach(oldScript => {
                const newScript = document.createElement('script');
                if (oldScript.src) newScript.src = oldScript.src;
                newScript.textContent = oldScript.textContent;
                document.body.appendChild(newScript);
                oldScript.remove();
            });
        } catch (err) {
            console.error(`Failed to uplink module [${filename}]:`, err);
            document.getElementById(targetId).innerHTML = `<div style="color:red; padding:10px;">MODULE OFFLINE: ${filename}</div>`;
        }
    }

    async function bootTerminal() {
        if (!window.charId) {
            document.getElementById('terminal-grid').innerHTML = "<div style='color:red; padding:20px;'>FATAL ERROR: ID MISSING.</div>";
            return;
        }

        document.getElementById('char-display').innerText = `ID: ${window.charId.toUpperCase()}`;

        // Inject modules natively!
        await loadModule('frame-char', 'character-sheet/character-sheet.html');
        await loadModule('frame-assets', 'asset-browser/asset-browser.html');
        // Add Map and Journal once they are ready
    }

    function toggleAssets() {
        document.getElementById('asset-drawer').classList.toggle('open');
    }
</script>

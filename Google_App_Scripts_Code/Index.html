<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <link rel="stylesheet" href="https://samsrauy.github.io/void-link/css/style.css">
    <style>
      body { background-color: #050508; color: #00ff9d; font-family: 'Share Tech Mono', monospace; margin: 0; overflow: hidden; }
      #loading-screen { 
        width: 100vw; height: 100vh; display: flex; align-items: center; 
        justify-content: center; text-align: center; flex-direction: column;
      }
    </style>
  </head>
  <body>
    
    <div id="loading-screen">
      <div id="status-display">INITIALIZING NEURAL LINK...</div>
    </div>

    <div id="starforged-terminal" style="display: none;"></div>

    <script>
      const GITHUB_BASE_URL = "https://samsrauy.github.io/void-link";
      window.charId = "<?= charId ?>"; 

      async function bootSystem() {
          const status = document.getElementById('status-display');

          // 1. IDENTITY GUARD: Redirect if ?id= is missing
          if (!window.charId || window.charId === "" || window.charId === "null") {
              const pilotName = prompt("NEURAL LINK INCOMPLETE. PLEASE ENTER PILOT CALLSIGN:");
              if (pilotName && pilotName.trim() !== "") {
                  const baseUrl = window.location.href.split('?')[0];
                  window.top.location.href = baseUrl + "?id=" + encodeURIComponent(pilotName.trim());
                  return; 
              } else {
                  status.innerHTML = "<span style='color:#ff0055;'>ACCESS DENIED: CALLSIGN REQUIRED.</span>";
                  return;
              }
          }

          // 2. FETCH CORE UI
          try {
              status.innerText = "MOUNTING UI FRAGMENTS...";
              const response = await fetch(`${GITHUB_BASE_URL}/void-link-term.html`);
              if (!response.ok) throw new Error("Connection to GitHub Repository failed.");
              
              const terminalDiv = document.getElementById('starforged-terminal');
              terminalDiv.innerHTML = await response.text();

              // 3. LOAD LOGIC ENGINES (Load JS before reviving HTML scripts)
              status.innerText = "ESTABLISHING DATA UPLINK...";
              await injectScript('js/datasworn.js');
              await injectScript('js/sync.js');

              // 4. REVIVE INJECTED SCRIPTS
              terminalDiv.querySelectorAll('script').forEach(oldScript => {
                  const newScript = document.createElement('script');
                  newScript.textContent = oldScript.textContent;
                  document.body.appendChild(newScript);
                  oldScript.remove();
              });

              // 5. FINALIZE
              document.getElementById('loading-screen').style.display = 'none';
              terminalDiv.style.display = 'block';
              
              if (typeof bootTerminal === 'function') bootTerminal();

          } catch (err) {
              status.innerHTML = `<span style='color:#ff0055;'>CRITICAL BOOT FAILURE:</span><br>${err.message}`;
          }
      }

      async function injectScript(scriptPath) {
          const response = await fetch(`${GITHUB_BASE_URL}/${scriptPath}`);
          const code = await response.text();
          const scriptEl = document.createElement('script');
          scriptEl.textContent = code;
          document.body.appendChild(scriptEl);
      }

      bootSystem();
    </script>
  </body>
</html>

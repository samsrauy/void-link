<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <base href="https://samsrauy.github.io/void-link/">
    <link rel="stylesheet" href="https://samsrauy.github.io/void-link/css/style.css">
    <style>
      body { background-color: #050508; color: #00ff9d; font-family: monospace; margin: 0; overflow: hidden; }
      #loading-screen { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
  </head>
  <body>
    
    <div id="loading-screen">
      <div>
        <p>Authenticating User Credentials...</p>
        <p>Mounting UI Fragments...</p>
      </div>
    </div>

    <div id="starforged-terminal" style="display: none;"></div>

    <script>
      const GITHUB_BASE_URL = "https://samsrauy.github.io/void-link";
      
      // Establish the single source of truth for the Character ID globally
      window.charId = "<?= charId ?>"; 

      function getNonce() {
          return document.currentScript ? document.currentScript.nonce : '';
      }

      async function injectScript(scriptPath) {
          const response = await fetch(`${GITHUB_BASE_URL}/${scriptPath}`);
          const code = await response.text();
          const scriptEl = document.createElement('script');
          scriptEl.textContent = code;
          if (getNonce()) scriptEl.setAttribute("nonce", getNonce());
          document.body.appendChild(scriptEl);
      }

      async function bootSystem() {
          try {
              // Fetch the raw HTML fragment and paint the canvas
              const response = await fetch(`${GITHUB_BASE_URL}/void-link-term.html`);
              if (!response.ok) throw new Error("Failed to load terminal layout.");
              
              const terminalDiv = document.getElementById('starforged-terminal');
              terminalDiv.innerHTML = await response.text();

              // Revive the internal bootloader script cleanly
              terminalDiv.querySelectorAll('script').forEach(deadScript => {
                  const liveScript = document.createElement('script');
                  liveScript.textContent = deadScript.textContent;
                  if (getNonce()) liveScript.setAttribute("nonce", getNonce());
                  document.body.appendChild(liveScript);
                  deadScript.remove();
              });

              // Inject the heavy-lifting engines
              await injectScript('js/datasworn.js');
              await injectScript('js/sync.js');

              // Reveal and Boot
              document.getElementById('loading-screen').style.display = 'none';
              terminalDiv.style.display = 'block';
              
              if (typeof bootTerminal === 'function') {
                  bootTerminal();
              } else {
                  console.warn("bootTerminal function not found in the injected fragment.");
              }

          } catch (err) {
              document.getElementById('loading-screen').innerHTML = `<p style='color:red;'>CRITICAL BOOT FAILURE: ${err.message}</p>`;
          }
      }

      bootSystem();
    </script>
  </body>
</html>

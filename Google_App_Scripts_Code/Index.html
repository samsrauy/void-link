<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <base href="https://samsrauy.github.io/void-link/">
    <style>
      body { background-color: #050508; color: #00ff9d; font-family: monospace; margin: 0; overflow: hidden; }
      #starforged-terminal { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
    </style>
  </head>
  <body>
    <div id="starforged-terminal">
      <div>
        <p>Authenticating User Credentials...</p>
        <p>Establishing Secure Link to Central Core...</p>
      </div>
    </div>

    <script>
      const GITHUB_BASE_URL = "https://samsrauy.github.io/void-link";
      window.charId = "<?= charId ?>"; 
      
      if (window.charId) {
        window.history.replaceState({}, '', '?id=' + window.charId);
      }

      function loadScript(src) {
          return new Promise((resolve, reject) => {
              const s = document.createElement('script');
              s.src = src;
              s.onload = resolve;
              s.onerror = reject;
              document.body.appendChild(s);
          });
      }

      async function initializeTerminal() {
          try {
              // 1. Fetch and inject the pure HTML UI (CSP allows this)
              const response = await fetch(`${GITHUB_BASE_URL}/void-link-term.html`);
              if (!response.ok) throw new Error("Could not fetch terminal blueprint.");
              document.getElementById('starforged-terminal').innerHTML = await response.text();

              // 2. Load the external engines sequentially via src (CSP allows this)
              await loadScript(`${GITHUB_BASE_URL}/js/datasworn.js`);
              await loadScript(`${GITHUB_BASE_URL}/js/sync.js`);
              
              // 3. Load the Terminal Logic we just separated
              await loadScript(`${GITHUB_BASE_URL}/js/term.js`);
              
              // 4. Manually boot the system
              if (typeof bootTerminal === 'function') {
                  bootTerminal();
              } else {
                  throw new Error("Terminal logic (term.js) failed to execute.");
              }

          } catch (err) {
              document.getElementById('starforged-terminal').innerHTML = `<p style='color:red; padding:2rem;'>CRITICAL BOOT FAILURE: ${err.message}</p>`;
          }
      }

      initializeTerminal();
    </script>
  </body>
</html>
